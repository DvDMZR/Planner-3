<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Einsatzplanung 3.0 – v0.6.6</title>

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>

    <!-- Babel für JSX Kompilierung im Browser -->
    <script src="https://unpkg.com/@babel/standalone@7.27.1/babel.min.js"></script>

    <!-- Tailwind CSS (pre-built, no CDN JIT) -->
    <link rel="stylesheet" href="app/tailwind.css">
    <link rel="stylesheet" href="app/style.css">

    <!-- App modules (plain JS, no JSX) -->
    <script src="app/config.js"></script>
    <script src="app/utils.js"></script>
    <script src="app/sharepoint.js"></script>
    <script src="app/filesync.js"></script>
    <script src="app/datalayer.js"></script>

    <!-- App JSX modules (compiled at runtime by Babel) -->
    <script type="text/babel" src="app/components.jsx"></script>
    <script type="text/babel" src="app/modals.jsx"></script>
    <script type="text/babel" src="app/views/project-details.jsx"></script>
    <script type="text/babel" src="app/views/sidebar.jsx"></script>
    <script type="text/babel" src="app/views/resource.jsx"></script>
    <script type="text/babel" src="app/views/timeline.jsx"></script>
    <script type="text/babel" src="app/views/utilization.jsx"></script>
    <script type="text/babel" src="app/views/setup-proj.jsx"></script>
    <script type="text/babel" src="app/views/setup-emp.jsx"></script>
    <script type="text/babel" src="app/views/overview.jsx"></script>
    <script type="text/babel" src="app/views/setup-cats.jsx"></script>
    <script type="text/babel" src="app/views/data.jsx"></script>
    <script type="text/babel" src="app/app.jsx"></script>
</head>
<body>

<style>
  #root:empty::before {
    content: '';
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: #001e1e;
  }
  #root:empty::after {
    content: '';
    position: fixed;
    top: 50%; left: 50%;
    width: 44px; height: 44px;
    margin: -22px 0 0 -22px;
    border: 4px solid #004c4c;
    border-top-color: #007A7A;
    border-radius: 50%;
    animation: _spin 0.8s linear infinite;
  }
  @keyframes _spin { to { transform: rotate(360deg); } }
</style>
<div id="root"></div>

</body>
</html>
