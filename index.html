                                                        const a = empAss.find(x => x.week === w);
                                                        return (
                                                            <td key={w} className="p-1 text-center border-r border-slate-100">
                                                                {a ? (
                                                                    <button
                                                                        onClick={() => { setAssignContext({ empId, week: w, existing: a }); setIsAssignModalOpen(true); }}
                                                                        className="mx-auto w-9 h-7 rounded flex items-center justify-center bg-gea-100 text-gea-700 font-medium leading-none hover:bg-gea-200 transition-colors cursor-pointer">
                                                                        {a.hours ?? Math.round((a.percent ?? 100) / 100 * HOURS_PER_WEEK)}h
                                                                    </button>
                                                                ) : (
                                                                    <div className="mx-auto w-9 h-7 rounded bg-slate-50"></div>
                                                                )}
                                                            </td>
                                                        );
                                                    })}
                                                    <td className="p-2 text-center text-slate-900 font-medium">{empHours}h</td>
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}

                    {/* Cost Items Table */}
                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                        <div className="p-4 bg-slate-50 border-b border-slate-200 flex justify-between items-center">
                            <h3 className="text-slate-900 text-base font-medium">Kostenpunkte</h3>
                            <button onClick={() => { setEditingCostItem(null); setIsCostItemModalOpen(true); }}
                                className="text-gea-600 text-sm font-medium hover:text-gea-700 flex items-center gap-1">
                                <IconPlus size={15}/> Hinzufügen
                            </button>
                        </div>
                        {projCostItems.length === 0 ? (
                            <div className="p-10 text-center text-slate-400 text-sm">
                                Noch keine Kostenpunkte erfasst.
                            </div>
                        ) : (
                            <table className="w-full text-left text-sm">
                                <thead className="bg-slate-50 border-b border-slate-200">
                                    <tr>
                                        <th className="p-3 text-slate-500 font-medium">Mitarbeiter</th>
                                        <th className="p-3 text-slate-500 font-medium">Art</th>
                                        <th className="p-3 text-slate-500 font-medium">Beschreibung</th>
                                        <th className="p-3 text-slate-500 font-medium text-center">KW</th>
                                        <th className="p-3 text-slate-500 font-medium text-right">Std.</th>
                                        <th className="p-3 text-slate-500 font-medium text-right">€/Std.</th>
                                        <th className="p-3 text-slate-500 font-medium text-right">Betrag</th>
                                        <th className="p-3 text-slate-500 font-medium text-right">Details</th>
                                        <th className="p-3"></th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100">
                                    {projCostItems.map(ci => {
                                        const emp = employeeById.get(ci.empId);
                                        return (
                                            <tr key={ci.id} className="hover:bg-slate-50 transition-colors">
                                                <td className="p-3 text-slate-800 font-medium">{emp?.name || '–'}</td>
                                                <td className="p-3">
                                                    <span className={`text-xs px-2 py-0.5 rounded-full font-medium ${
                                                        ci.type === 'Dienstleistung' ? 'bg-blue-100 text-blue-700' :
                                                        ci.type === 'Reisekosten' ? 'bg-amber-100 text-amber-700' :
                                                        'bg-slate-100 text-slate-600'
                                                    }`}>{ci.type}</span>
                                                </td>
                                                <td className="p-3 text-slate-600">{ci.description || '–'}</td>
                                                <td className="p-3 text-slate-500 text-xs">
                                                    {(() => {
                                                        if (ci.dateFrom) {
                                                            const kwF = parseInt(getWeekString(new Date(ci.dateFrom)).split('-W')[1]);
                                                            const kwT = ci.dateTo ? parseInt(getWeekString(new Date(ci.dateTo)).split('-W')[1]) : kwF;
                                                            return kwF === kwT ? `KW${kwF}` : `KW${kwF}–${kwT}`;
                                                        }
                                                        return ci.week ? `KW${ci.week.split('-W')[1]}` : '–';
                                                    })()}
                                                </td>
                                                <td className="p-3 text-right text-slate-600">{ci.hours != null ? `${ci.hours}h` : '–'}</td>
                                                <td className="p-3 text-right text-slate-600">{ci.hourlyRate != null ? `${ci.hourlyRate} €` : '–'}</td>
                                                <td className="p-3 text-right text-slate-900 font-medium">{(ci.amount || 0).toFixed(2)} €</td>
                                                <td className="p-3 text-xs text-slate-400">
                                                    {ci.extraCosts?.length > 0 && (
                                                        <div className="space-y-0.5">
                                                            {ci.extraCosts.map((ec, i) => (
                                                                <div key={i}>{ec.type}: {(ec.amount||0).toFixed(0)}€</div>
                                                            ))}
                                                        </div>
                                                    )}
                                                </td>
                                                <td className="p-3 text-right">
                                                    <button onClick={() => { setEditingCostItem(ci); setIsCostItemModalOpen(true); }}
                                                        className="text-gea-600 text-xs font-medium hover:text-gea-700">Bearbeiten</button>
                                                </td>
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                        )}
                    </div>

                    {/* Summary */}
                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                        <div className="p-4 bg-slate-50 border-b border-slate-200">
                            <h3 className="text-slate-900 text-base font-medium">Zusammenfassung</h3>
                        </div>
                        <div className="p-6 grid grid-cols-2 gap-4 md:grid-cols-4">
                            <div className="rounded-lg border border-slate-200 bg-slate-50/50 p-4">
                                <div className="flex items-center gap-2 mb-2">
                                    <div className="w-7 h-7 rounded-md bg-slate-200 flex items-center justify-center"><IconClock size={14} className="text-slate-500"/></div>
                                    <p className="text-[10px] text-slate-500 font-medium uppercase tracking-wide">Stunden</p>
                                </div>
                                <p className="text-2xl text-slate-900 font-semibold tabular-nums">{totalHours}h</p>
                            </div>
                            <div className="rounded-lg border border-slate-200 bg-slate-50/50 p-4">
                                <div className="flex items-center gap-2 mb-2">
                                    <div className="w-7 h-7 rounded-md bg-blue-100 flex items-center justify-center"><IconUsers size={14} className="text-blue-600"/></div>
                                    <p className="text-[10px] text-slate-500 font-medium uppercase tracking-wide">Lohnkosten</p>
                                </div>
                                <p className="text-2xl text-slate-900 font-semibold tabular-nums">{totalLaborCost.toFixed(2)} €</p>
                                {proj.billable === false && <p className="text-xs text-slate-400 mt-1">nicht berechnet</p>}
                            </div>
                            <div className="rounded-lg border border-slate-200 bg-slate-50/50 p-4">
                                <div className="flex items-center gap-2 mb-2">
                                    <div className="w-7 h-7 rounded-md bg-amber-100 flex items-center justify-center"><IconFileText size={14} className="text-amber-600"/></div>
                                    <p className="text-[10px] text-slate-500 font-medium uppercase tracking-wide">Kostenpunkte</p>
                                </div>
                                <p className="text-2xl text-slate-900 font-semibold tabular-nums">{totalOtherCost.toFixed(2)} €</p>
                            </div>
                            <div className="rounded-xl border-2 border-gea-300 bg-gradient-to-br from-gea-50 to-gea-100 p-4 shadow-sm">
                                <div className="flex items-center gap-2 mb-2">
                                    <div className="w-7 h-7 rounded-md bg-gea-500 flex items-center justify-center"><IconBarChart size={14} className="text-white"/></div>
                                    <p className="text-[10px] text-gea-700 font-medium uppercase tracking-wide">Gesamt</p>
                                </div>
                                <p className="text-2xl text-gea-800 font-bold tabular-nums">{grandTotal.toFixed(2)} €</p>
                            </div>
                        </div>
                        <div className="px-6 pb-5 pt-1 flex items-center gap-4 border-t border-slate-100">
                            <label className="flex items-center gap-2 cursor-pointer select-none">
                                <input type="checkbox" checked={proj.billable !== false}
                                    onChange={() => setProjects(projects.map(p => p.id === proj.id ? {...p, billable: !p.billable} : p))}
                                    className="w-4 h-4 text-gea-600 rounded"/>
                                <span className="text-sm text-slate-700">Arbeitszeit berechnen</span>
                            </label>
                            {proj.billable !== false && (
                                <div className="flex items-center gap-2">
                                    <span className="text-sm text-slate-500">Std.-Satz:</span>
                                    <input type="number" min="0" step="1"
                                        value={proj.hourlyRate ?? DEFAULT_HOURLY_RATE}
                                        onChange={e => setProjects(projects.map(p => p.id === proj.id ? {...p, hourlyRate: parseFloat(e.target.value) || 0} : p))}
                                        className="w-20 p-1.5 border border-slate-300 rounded text-sm text-center font-medium"/>
                                    <span className="text-sm text-slate-400">€/h</span>
                                </div>
                            )}
                        </div>
                    </div>
                </div>

                {isCostItemModalOpen && (
                    <CostItemModal
                        projectId={proj.id}
                        existingItem={editingCostItem}
                        assignments={assignments}
                        employees={employees}
                        costItems={costItems}
                        setCostItems={setCostItems}
                        onClose={() => { setIsCostItemModalOpen(false); setEditingCostItem(null); }}
                    />
                )}
            </div>
        );
    };

    const renderSetupProj = () => {
        if (selectedProjectDetails) {
            return renderProjectDetails();
        }

        const handleEditProject = (p) => {
            setProjForm({ name: p.name, category: p.category || projCategories[0] || '', projectNumber: p.projectNumber || '', address: p.address || '', startWeek: p.startWeek, ibnWeek: p.ibnWeek, color: resolveProjectColor(p.color).id });
            setEditingProjectId(p.id);
            setIsProjFormOpen(true);
        };

        const now = getWeekString(new Date());
        const activeProjects = projects.filter(p => p.ibnWeek >= now);
        const pastProjects = projects.filter(p => p.ibnWeek < now);
        const activeCats = [...new Set(activeProjects.map(p => p.category))];

        const ProjectRow = ({ p }) => {
            const effStatus = computeAutoStatus(p);
            return (
                <tr key={p.id} className="hover:bg-slate-50 transition-colors">
                    <td className="p-4">
                        <button onClick={() => setSelectedProjectDetails(p.id)}
                            className="flex items-center gap-2 text-left group">
                            <div className={`w-3 h-3 rounded-full flex-shrink-0 ${resolveProjectColor(p.color).dot}`}></div>
                            <span className="text-slate-900 font-medium group-hover:text-gea-600 transition-colors">{p.name}</span>
                        </button>
                    </td>
                    <td className="p-4 text-slate-500 font-mono text-xs">{p.projectNumber || '–'}</td>
                    <td className="p-4"><StatusBadge status={effStatus}/></td>
                    <td className="p-4 text-slate-600 text-xs">{p.startWeek} – {p.ibnWeek}</td>
                    <td className="p-4 text-right">
                        <div className="flex justify-end gap-3">
                            <button onClick={() => handleEditProject(p)} className="text-gea-600 text-xs font-medium hover:text-gea-700">Bearbeiten</button>
                            <button onClick={() => {
                                const assCount = (assignmentsByProject.get(p.id) || []).length;
                                const msg = assCount > 0
                                    ? `Projekt „${p.name}" wirklich löschen?\n\n${assCount} Einsatz-Planung(en) werden ebenfalls gelöscht.`
                                    : `Projekt „${p.name}" wirklich löschen?`;
                                if (window.confirm(msg)) {
                                    setProjects(projects.filter(x => x.id !== p.id));
                                    setAssignments(assignments.filter(a => a.reference !== p.id));
                                }
                            }} className="text-rose-600 text-xs font-medium hover:text-rose-700">Löschen</button>
                        </div>
                    </td>
                </tr>
            );
        };

        return (
            <div className="flex-1 overflow-auto p-8 bg-slate-50">
                <div className="max-w-5xl mx-auto space-y-6">
                    <div className="flex items-center justify-between">
                        <h2 className="text-xl text-gea-800 font-semibold">Projekte</h2>
                        <button
                            onClick={() => {
                                setEditingProjectId(null);
                                setProjForm({ name: '', category: projCategories[0] || '', projectNumber: '', startWeek: weeks[0]?.id || '', ibnWeek: weeks[10]?.id || '', color: PROJECT_COLORS[projects.length % PROJECT_COLORS.length].id });
                                setIsProjFormOpen(true);
                            }}
                            className="flex items-center gap-2 bg-gea-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-gea-700 transition-colors shadow-sm">
                            <IconPlus size={16}/> Neues Projekt
                        </button>
                    </div>

                    {/* Active projects by category */}
                    {activeCats.length === 0 && activeProjects.length === 0 && (
                        <div className="text-center text-slate-400 text-sm py-8">Noch keine aktiven Projekte.</div>
                    )}
                    {activeCats.map(cat => {
                        const catProjs = activeProjects.filter(p => p.category === cat);
                        const isCollapsed = collapsedProjCategories[cat];
                        return (
                            <div key={cat} className="bg-white rounded-xl shadow-md border border-slate-300 overflow-hidden">
                                <button onClick={() => toggleProjCategory(cat)}
                                    className="w-full p-4 bg-gea-50 border-b border-gea-200 flex items-center gap-3 hover:bg-gea-100 transition-colors">
                                    <span className="text-gea-500">{isCollapsed ? <IconChevronRight size={18}/> : <IconChevronDown size={18}/>}</span>
                                    <span className="text-gea-900 font-semibold text-lg">{cat}</span>
                                    <span className="ml-2 px-2 py-0.5 bg-white border border-gea-200 rounded-full text-xs text-gea-700 font-semibold">{catProjs.length}</span>
                                </button>
                                {!isCollapsed && (
                                    <table className="w-full text-left text-sm">
                                        <thead className="bg-slate-50 border-b border-slate-200">
                                            <tr>
                                                <th className="p-4 text-slate-700 font-semibold">Name</th>
                                                <th className="p-4 text-slate-700 font-semibold">Nr.</th>
                                                <th className="p-4 text-slate-700 font-semibold">Status</th>
                                                <th className="p-4 text-slate-700 font-semibold">Zeitraum</th>
                                                <th className="p-4"></th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-200">
                                            {catProjs.map(p => <ProjectRow key={p.id} p={p}/>)}
                                        </tbody>
                                    </table>
                                )}
                            </div>
                        );
                    })}

                    {/* Past projects */}
                    {pastProjects.length > 0 && (
                        <div className="bg-white rounded-xl shadow-md border border-slate-300 overflow-hidden">
                            <button onClick={() => setPastProjectsExpanded(e => !e)}
                                className="w-full p-4 bg-slate-100 border-b border-slate-300 flex items-center gap-3 hover:bg-slate-200 transition-colors">
                                <span className="text-slate-500">{pastProjectsExpanded ? <IconChevronDown size={18}/> : <IconChevronRight size={18}/>}</span>
                                <span className="text-slate-700 font-semibold">Vergangene Projekte</span>
                                <span className="ml-2 px-2 py-0.5 bg-white border border-slate-300 rounded-full text-xs text-slate-600 font-semibold">{pastProjects.length}</span>
                            </button>
                            {pastProjectsExpanded && (
                                <table className="w-full text-left text-sm">
                                    <thead className="bg-slate-50 border-b border-slate-200">
                                        <tr>
                                            <th className="p-4 text-slate-700 font-semibold">Name</th>
                                            <th className="p-4 text-slate-700 font-semibold">Nr.</th>
                                            <th className="p-4 text-slate-700 font-semibold">Status</th>
                                            <th className="p-4 text-slate-700 font-semibold">Zeitraum</th>
                                            <th className="p-4"></th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-200 opacity-75">
                                        {pastProjects.map(p => <ProjectRow key={p.id} p={p}/>)}
                                    </tbody>
                                </table>
                            )}
                        </div>
                    )}
                </div>
            </div>
        );
    };

    const renderSetupEmp = () => {
        const handleSaveEmp = () => {
            if(!empForm.name.trim()) return;
            const wh = Math.max(1, parseInt(empForm.weeklyHours) || HOURS_PER_WEEK);
            if (editingEmpId) {
                setEmployees(employees.map(e => e.id === editingEmpId ? { ...e, name: empForm.name, category: empForm.category, weeklyHours: wh } : e));
                setEditingEmpId(null);
            } else {
                setEmployees([...employees, { id: makeId('emp'), name: empForm.name, category: empForm.category, weeklyHours: wh, active: true }]);
            }
            setEmpForm({name: '', category: empCategories[0] || '', weeklyHours: HOURS_PER_WEEK});
        };

        const handleEditEmp = (e) => {
            setEmpForm({ name: e.name, category: e.category, weeklyHours: e.weeklyHours ?? HOURS_PER_WEEK });
            setEditingEmpId(e.id);
        };

        const cancelEditEmp = () => {
            setEditingEmpId(null);
            setEmpForm({name: '', category: empCategories[0] || '', weeklyHours: HOURS_PER_WEEK});
        };

        return (
            <div className="flex-1 overflow-auto p-8 bg-slate-50">
                <div className="max-w-4xl mx-auto space-y-6">
                    
                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                        <div className="p-6 border-b border-slate-200 bg-slate-50">
                            <h2 className="text-xl text-slate-900 font-medium">Mitarbeiterverwaltung</h2>
                        </div>
                        <div className="p-6 flex gap-4 items-end bg-white">
                            <div className="flex-1">
                                <label className="block text-xs text-slate-500 mb-1 font-medium">Name</label>
                                <input type="text" value={empForm.name} onChange={e=>setEmpForm({...empForm, name: e.target.value})} className="w-full p-2 border border-slate-300 rounded text-sm"/>
                            </div>
                            <div className="w-44">
                                <label className="block text-xs text-slate-500 mb-1 font-medium">Kategorie</label>
                                <select value={empForm.category} onChange={e=>setEmpForm({...empForm, category: e.target.value})} className="w-full p-2 border border-slate-300 rounded text-sm">
                                    {empCategories.map(c => <option key={c} value={c}>{c}</option>)}
                                </select>
                            </div>
                            <div className="w-36">
                                <label className="block text-xs text-slate-500 mb-1 font-medium">Std./Woche</label>
                                <input type="number" min="1" max="80" value={empForm.weeklyHours} onChange={e=>setEmpForm({...empForm, weeklyHours: e.target.value})} className="w-full p-2 border border-slate-300 rounded text-sm"/>
                            </div>
                            <div className="flex gap-2">
                                {editingEmpId && (
                                    <button 
                                        onClick={cancelEditEmp}
                                        className="bg-slate-200 text-slate-600 px-4 py-2 rounded text-sm hover:bg-slate-300 h-[38px] font-medium transition-colors">
                                        Abbruch
                                    </button>
                                )}
                                <button 
                                    onClick={handleSaveEmp}
                                    className="bg-gea-600 text-white px-4 py-2 rounded text-sm hover:bg-gea-700 h-[38px] font-medium transition-colors">
                                    {editingEmpId ? 'Speichern' : 'Hinzufügen'}
                                </button>
                            </div>
                        </div>
                    </div>

                    <div className="space-y-4">
                        {empCategories.map(category => {
                            const isCollapsed = collapsedEmpSetup[category];
                            const catEmps = employees.filter(e => e.category === category);

                            return (
                                <div key={category} className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                                    <button
                                        onClick={() => toggleEmpSetup(category)}
                                        className="w-full p-4 bg-slate-50 border-b border-slate-200 flex items-center gap-2 hover:bg-slate-100 transition-colors"
                                    >
                                        <span className="text-slate-500">
                                            {isCollapsed ? <IconChevronRight size={20}/> : <IconChevronDown size={20}/>}
                                        </span>
                                        <h3 className="text-lg text-slate-900 font-medium">{category}</h3>
                                        <span className="ml-2 px-2 py-0.5 bg-white border border-slate-200 rounded-full text-xs text-slate-500 font-medium">
                                            {catEmps.length}
                                        </span>
                                    </button>

                                    {!isCollapsed && (
                                        catEmps.length > 0 ? (
                                            <table className="w-full text-left text-sm">
                                                <thead className="bg-slate-50/50">
                                                    <tr>
                                                        <th className="p-4 text-slate-500 font-medium">Name</th>
                                                        <th className="p-4 text-slate-500 font-medium text-center">Std./Woche</th>
                                                        <th className="p-4 text-slate-500 font-medium">Status</th>
                                                        <th className="p-4"></th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-300">
                                                    {catEmps.map(e => (
                                                        <tr key={e.id} className="hover:bg-slate-50 transition-colors">
                                                            <td className="p-4 text-slate-900 font-medium">{e.name}</td>
                                                            <td className="p-4 text-center">
                                                                <span className="text-sm font-medium text-slate-700">{e.weeklyHours ?? HOURS_PER_WEEK}h</span>
                                                            </td>
                                                            <td className="p-4">
                                                                <span className={`px-2 py-1 rounded text-xs font-medium ${e.active ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-200 text-slate-600'}`}>
                                                                    {e.active ? 'Aktiv' : 'Inaktiv'}
                                                                </span>
                                                            </td>
                                                            <td className="p-4 text-right flex justify-end gap-3">
                                                                <button onClick={() => handleEditEmp(e)} className="text-gea-600 text-xs font-medium hover:text-gea-700">Bearbeiten</button>
                                                                <button onClick={() => setEmployees(employees.map(x => x.id === e.id ? {...x, active: !x.active} : x))} className="text-gea-600 text-xs font-medium hover:text-gea-700">Toggle Status</button>
                                                            </td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        ) : (
                                            <div className="p-4 text-sm text-slate-400 text-center bg-white">
                                                Keine Mitarbeiter in dieser Kategorie.
                                            </div>
                                        )
                                    )}
                                </div>
                            );
                        })}
                    </div>
                </div>
            </div>
        );
    };

    const renderOverview = () => {
        const fmt = n => n.toLocaleString('de-DE', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
        const currentWeekStr = getWeekString(new Date());
        const activeEmps = activeEmployees;
        let activeProjects = 0;
        projects.forEach(p => { if (computeAutoStatus(p) === 'active') activeProjects++; });
        const weekUtils = activeEmps.map(e => getUtilization(e.id, currentWeekStr).total);
        const avgUtil = activeEmps.length > 0 ? Math.round(weekUtils.reduce((a,b)=>a+b,0) / activeEmps.length) : 0;
        const overbookedCount = weekUtils.filter(u => u > 100).length;

        const rows = projects.filter(p => ['active', 'planned'].includes(computeAutoStatus(p))).map(p => {
            const projAss = assignmentsByProject.get(p.id) || [];
            let totalHours = 0, totalLaborCost = 0;
            for (let i = 0; i < projAss.length; i++) {
                const a = projAss[i];
                if (a.type !== 'project') continue;
                const h = a.hours ?? ((a.percent ?? 100) / 100 * HOURS_PER_WEEK);
                totalHours += h;
                if (p.billable !== false) totalLaborCost += h * (p.hourlyRate ?? DEFAULT_HOURLY_RATE);
            }
            const projCosts = costItemsByProject.get(p.id) || [];
            let zusatzkosten = 0;
            for (let i = 0; i < projCosts.length; i++) zusatzkosten += projCosts[i].amount || 0;
            return { p, totalHours, totalLaborCost, zusatzkosten, gesamtkosten: totalLaborCost + zusatzkosten };
        }).sort((a, b) => {
            const statusOrder = { active: 0, missing_costs: 1, planned: 2, completed: 3, costs_submitted: 4 };
            return (statusOrder[computeAutoStatus(a.p)] ?? 5) - (statusOrder[computeAutoStatus(b.p)] ?? 5);
        });

        const totalGesamtkosten = rows.reduce((acc, r) => acc + r.gesamtkosten, 0);
        const totalHoursAll = rows.reduce((acc, r) => acc + r.totalHours, 0);

        return (
            <div className="flex-1 overflow-auto p-8 bg-slate-50">
                <div className="max-w-6xl mx-auto space-y-6">
                    <div className="grid grid-cols-4 gap-4">
                        <div className="bg-white border border-slate-300 border-l-4 border-l-gea-500 rounded-xl p-5 shadow-md">
                            <p className="text-xs text-slate-600 font-semibold uppercase tracking-wide">Aktive Projekte</p>
                            <p className="text-3xl font-bold text-gea-700 mt-1">{activeProjects}</p>
                            <p className="text-xs text-slate-500 mt-1">von {projects.length} gesamt (ohne abgeschl.)</p>
                        </div>
                        <div className="bg-white border border-slate-300 border-l-4 border-l-gea-400 rounded-xl p-5 shadow-md">
                            <p className="text-xs text-slate-600 font-semibold uppercase tracking-wide">Mitarbeiter</p>
                            <p className="text-3xl font-bold text-slate-800 mt-1">{activeEmps.length}</p>
                            <p className="text-xs text-slate-500 mt-1">aktiv</p>
                        </div>
                        <div className={`bg-white border border-l-4 rounded-xl p-5 shadow-md ${avgUtil >= 100 ? 'border-rose-300 border-l-rose-500' : avgUtil >= 80 ? 'border-amber-300 border-l-amber-500' : 'border-slate-300 border-l-emerald-500'}`}>
                            <p className="text-xs text-slate-600 font-semibold uppercase tracking-wide">Ø Auslastung diese KW</p>
                            <p className={`text-3xl font-bold mt-1 ${avgUtil >= 100 ? 'text-rose-600' : avgUtil >= 80 ? 'text-amber-600' : 'text-emerald-600'}`}>{avgUtil}%</p>
                            <p className="text-xs text-slate-500 mt-1">{currentWeekStr}</p>
                        </div>
                        <div className={`bg-white border border-l-4 rounded-xl p-5 shadow-md ${overbookedCount > 0 ? 'border-rose-300 border-l-rose-500' : 'border-slate-300 border-l-slate-400'}`}>
                            <p className="text-xs text-slate-600 font-semibold uppercase tracking-wide">Überlastet diese KW</p>
                            <p className={`text-3xl font-bold mt-1 ${overbookedCount > 0 ? 'text-rose-600' : 'text-slate-800'}`}>{overbookedCount}</p>
                            <p className="text-xs text-slate-500 mt-1">{overbookedCount > 0 ? 'Mitarbeiter >100%' : 'Alles im Rahmen'}</p>
                        </div>
                    </div>
                    <div className="flex items-center justify-between">
                        <h2 className="text-xl text-gea-800 font-semibold">Projektübersicht</h2>
                        <div className="flex items-center gap-4 text-sm text-slate-500">
                            <span>{rows.length} offene / geplante Projekte</span>
                            <span className="text-slate-300">|</span>
                            <span>{fmt(totalHoursAll)} h gesamt</span>
                            <span className="text-slate-300">|</span>
                            <span className="font-medium text-slate-700">{fmt(totalGesamtkosten)} € gesamt</span>
                        </div>
                    </div>
                    <div className="bg-white rounded-xl shadow-md border border-slate-300 overflow-hidden">
                        <table className="w-full text-left text-sm">
                            <thead className="bg-gea-50 border-b-2 border-gea-200">
                                <tr>
                                    <th className="p-4 text-gea-800 font-semibold">Projekt</th>
                                    <th className="p-4 text-gea-800 font-semibold">Status</th>
                                    <th className="p-4 text-gea-800 font-semibold">IBN</th>
                                    <th className="p-4 text-gea-800 font-semibold text-right">Stunden</th>
                                    <th className="p-4 text-gea-800 font-semibold text-right">Lohnkosten</th>
                                    <th className="p-4 text-gea-800 font-semibold text-right">Zusatzkosten</th>
                                    <th className="p-4 text-gea-800 font-semibold text-right">Gesamt</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-200">
                                {rows.map(({ p, totalHours, totalLaborCost, zusatzkosten, gesamtkosten }) => (
                                    <tr key={p.id} className="hover:bg-slate-50 cursor-pointer transition-colors"
                                        onClick={() => { setSelectedProjectDetails(p.id); setActiveTab('setup_proj'); }}>
                                        <td className="p-4">
                                            <div className="flex items-center gap-2">
                                                <div className={`w-2.5 h-2.5 rounded-full flex-shrink-0 ${resolveProjectColor(p.color).dot}`}></div>
                                                <div>
                                                    <div className="font-medium text-slate-900">{p.name}</div>
                                                    <div className="text-xs text-slate-400 font-mono">{p.projectNumber || '–'} · {p.category}</div>
                                                </div>
                                            </div>
                                        </td>
                                        <td className="p-4"><StatusBadge status={computeAutoStatus(p)}/></td>
                                        <td className="p-4 text-slate-500 text-xs font-mono">{p.ibnWeek || '–'}</td>
                                        <td className="p-4 text-right text-slate-700 tabular-nums">{fmt(totalHours)} h</td>
                                        <td className="p-4 text-right text-slate-700 tabular-nums">
                                            {p.billable !== false ? `${fmt(totalLaborCost)} €` : <span className="text-slate-400 text-xs">–</span>}
                                        </td>
                                        <td className="p-4 text-right text-slate-700 tabular-nums">
                                            {zusatzkosten > 0 ? `${fmt(zusatzkosten)} €` : <span className="text-slate-400">–</span>}
                                        </td>
                                        <td className="p-4 text-right font-semibold text-slate-900 tabular-nums">
                                            {gesamtkosten > 0 ? `${fmt(gesamtkosten)} €` : <span className="text-slate-400 font-normal">–</span>}
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                            {rows.length > 0 && (
                                <tfoot className="border-t-2 border-gea-200 bg-gea-50">
                                    <tr>
                                        <td className="p-4 text-gea-800 font-semibold text-sm" colSpan={4}>Gesamt</td>
                                        <td className="p-4 text-right font-semibold text-slate-900 tabular-nums">{fmt(totalHoursAll)} h</td>
                                        <td className="p-4 text-right font-semibold text-slate-900 tabular-nums">{fmt(rows.reduce((a,r)=>a+r.totalLaborCost,0))} €</td>
                                        <td className="p-4 text-right font-semibold text-slate-900 tabular-nums">{fmt(rows.reduce((a,r)=>a+r.zusatzkosten,0))} €</td>
                                        <td className="p-4 text-right font-bold text-gea-700 tabular-nums">{fmt(totalGesamtkosten)} €</td>
                                    </tr>
                                </tfoot>
                            )}
                            {rows.length === 0 && (
                                <tbody><tr><td colSpan={8} className="text-center text-slate-400 text-sm py-12">Keine Projekte vorhanden.</td></tr></tbody>
                            )}
                        </table>
                    </div>
                </div>
            </div>
        );
    };

    const renderSetupCats = () => {
        const COLOR_SWATCHES = [null, ...PROJECT_COLORS.map(c => c.id)];
        const renderSwatch = (colorId) => {
            if (!colorId) return <span className="w-4 h-4 rounded-full border-2 border-slate-300 bg-white inline-block"></span>;
            const c = resolveProjectColor(colorId);
            return <span className={`w-4 h-4 rounded-full ${c.dot} inline-block`}></span>;
        };
        const renderColorPicker = (taskName, metaKey = 'basicTasksMeta') => (
            <div className="flex gap-1 items-center">
                {COLOR_SWATCHES.map((cid, i) => (
                    <button key={i} title={cid || 'Keine Farbe'}
                        onClick={() => setBasicTasksMeta(prev => ({...prev, [taskName]: {...(prev[taskName]||{}), color: cid || undefined}}))}
                        className={`w-5 h-5 rounded-full border-2 transition-all ${(basicTasksMeta[taskName]?.color || null) === cid ? 'border-gea-600 scale-110' : 'border-transparent hover:border-slate-400'} ${cid ? resolveProjectColor(cid).dot : 'bg-white border-slate-300'}`}>
                    </button>
                ))}
            </div>
        );

        return (
            <div className="flex-1 overflow-auto p-8 bg-slate-50">
                <div className="max-w-4xl mx-auto space-y-6">

                    {/* Basic Tasks */}
                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                        <button onClick={() => setExpandedSetupCats(prev => ({...prev, basic: !prev.basic}))}
                            className="w-full p-4 border-b border-slate-200 bg-slate-50 flex justify-between items-center hover:bg-slate-100 transition-colors">
                            <h2 className="text-lg text-slate-900 font-medium">Basic Tasks</h2>
                            <span className="text-slate-500">{expandedSetupCats.basic ? <IconChevronDown size={20}/> : <IconChevronRight size={20}/>}</span>
                        </button>
                        {expandedSetupCats.basic && (
                            <div>
                                <div className="flex border-b border-slate-200 bg-slate-50">
                                    <button onClick={() => setBasicTasksSubTab('aktiv')} className={`px-5 py-2.5 text-sm font-medium border-b-2 transition-colors ${basicTasksSubTab === 'aktiv' ? 'border-gea-600 text-gea-700' : 'border-transparent text-slate-500 hover:text-slate-700'}`}>Aktiv</button>
                                    <button onClick={() => setBasicTasksSubTab('inaktiv')} className={`px-5 py-2.5 text-sm font-medium border-b-2 transition-colors flex items-center gap-1.5 ${basicTasksSubTab === 'inaktiv' ? 'border-gea-600 text-gea-700' : 'border-transparent text-slate-500 hover:text-slate-700'}`}>
                                        Inaktiv {inactiveBasicTasks.length > 0 && <span className="bg-slate-200 text-slate-600 text-xs font-semibold px-1.5 py-0.5 rounded-full">{inactiveBasicTasks.length}</span>}
                                    </button>
                                </div>
                                {basicTasksSubTab === 'aktiv' && (
                                    <ul className="divide-y divide-slate-200">
                                        {basicTasks.filter(t => !basicTasksMeta?.[t]).map(task => (
                                            <li key={task} className="p-4 flex justify-between items-center gap-3 text-sm">
                                                <div className="flex items-center gap-2 min-w-0">
                                                    <span className="text-slate-800 font-medium">{task}</span>
                                                    <span className="text-xs bg-gea-50 text-gea-700 border border-gea-200 px-1.5 py-0.5 rounded flex items-center gap-1"><IconPin size={10}/>Permanent</span>
                                                </div>
                                                <div className="flex items-center gap-2 flex-shrink-0">
                                                    {renderColorPicker(task)}
                                                    <button onClick={() => { setBasicTasks(prev => prev.filter(t => t !== task)); setInactiveBasicTasks(prev => [...prev, { name: task, createdAt: new Date().toISOString() }]); }} className="px-2 py-1 text-xs bg-slate-50 text-slate-600 border border-slate-200 rounded hover:bg-slate-100">Set Inactive</button>
                                                </div>
                                            </li>
                                        ))}
                                    </ul>
                                )}
                                {basicTasksSubTab === 'inaktiv' && (
                                    <div>{inactiveBasicTasks.length === 0 ? <p className="p-6 text-sm text-slate-400 text-center">Keine inaktiven Kategorien</p> :
                                        <ul className="divide-y divide-slate-200">{inactiveBasicTasks.map(task => (
                                            <li key={task.name} className="p-4 flex justify-between items-center text-sm">
                                                <div><span className="text-slate-800">{task.name}</span><span className="ml-2 text-xs text-slate-400">(inaktiv seit {new Date(task.createdAt).toLocaleDateString('de-DE')})</span></div>
                                                <div className="flex gap-2">
                                                    <button onClick={() => { setBasicTasks(prev => [...prev, task.name]); setBasicTasksMeta(prev => ({...prev, [task.name]: {...(prev[task.name]||{}), createdAt: new Date().toISOString(), permanent: false}})); setInactiveBasicTasks(prev => prev.filter(t => t.name !== task.name)); }} className="px-2.5 py-1 text-xs bg-gea-50 text-gea-700 border border-gea-200 rounded hover:bg-gea-100">Reaktivieren</button>
                                                    <button onClick={() => setInactiveBasicTasks(prev => prev.filter(t => t.name !== task.name))} className="px-2.5 py-1 text-xs bg-rose-50 text-rose-600 border border-rose-200 rounded hover:bg-rose-100">Löschen</button>
                                                </div>
                                            </li>
                                        ))}</ul>
                                    }</div>
                                )}
                            </div>
                        )}
                    </div>

                    {/* Other Tasks (user-created) */}
                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                        <button onClick={() => setExpandedSetupCats(prev => ({...prev, other: !prev.other}))}
                            className="w-full p-4 border-b border-slate-200 bg-slate-50 flex justify-between items-center hover:bg-slate-100 transition-colors">
                            <h2 className="text-lg text-slate-900 font-medium">Other Tasks <span className="text-sm text-slate-500 font-normal ml-2">(benutzerdefiniert)</span></h2>
                            <span className="text-slate-500">{expandedSetupCats.other ? <IconChevronDown size={20}/> : <IconChevronRight size={20}/>}</span>
                        </button>
                        {expandedSetupCats.other && (
                            <div>
                                <div className="p-4 flex gap-2 border-b border-slate-200">
                                    <input type="text" value={newBasicTask} onChange={e=>setNewBasicTask(e.target.value)} onKeyDown={e => { if (e.key === 'Enter') { const t = newBasicTask.trim(); if (t && !basicTasks.includes(t)) { setBasicTasks(prev=>[...prev,t]); setBasicTasksMeta(prev=>({...prev,[t]:{createdAt:new Date().toISOString(),permanent:false}})); setNewBasicTask(''); }}}} placeholder="Neuer Other Task" className="flex-1 p-2 border border-slate-300 rounded text-sm"/>
                                    <button onClick={() => { const t=newBasicTask.trim(); if(t&&!basicTasks.includes(t)){setBasicTasks(prev=>[...prev,t]);setBasicTasksMeta(prev=>({...prev,[t]:{createdAt:new Date().toISOString(),permanent:false}}));setNewBasicTask('');} }} className="bg-gea-600 text-white px-3 py-2 rounded text-sm font-medium hover:bg-gea-700">Hinzufügen</button>
                                </div>
                                <ul className="divide-y divide-slate-200">
                                    {basicTasks.filter(t => basicTasksMeta?.[t]).map(task => {
                                        const meta = basicTasksMeta[task] || {};
                                        const isPerm = !!meta.permanent;
                                        const weeksLeft = meta.createdAt && !isPerm ? Math.max(0, BASIC_TASK_EXPIRY_WEEKS - Math.floor((Date.now() - new Date(meta.createdAt).getTime()) / (7*24*60*60*1000))) : null;
                                        return (
                                            <li key={task} className="p-4 flex justify-between items-center gap-3 text-sm">
                                                <div className="flex items-center gap-2 min-w-0 flex-wrap">
                                                    <span className="text-slate-800 font-medium">{task}</span>
                                                    {isPerm ? (
                                                        <span className="text-xs bg-gea-50 text-gea-700 border border-gea-200 px-1.5 py-0.5 rounded flex items-center gap-1"><IconPin size={10}/>Permanent</span>
                                                    ) : weeksLeft !== null && (
                                                        <span className="text-xs text-slate-400">(läuft ab in {weeksLeft} Wo.)</span>
                                                    )}
                                                </div>
                                                <div className="flex items-center gap-2 flex-shrink-0">
                                                    {renderColorPicker(task)}
                                                    <button onClick={() => setBasicTasksMeta(prev => ({...prev, [task]: {...(prev[task]||{}), permanent: !isPerm}}))} className={`px-2 py-1 text-xs border rounded flex items-center gap-1 ${isPerm ? 'bg-gea-50 text-gea-700 border-gea-200 hover:bg-gea-100' : 'bg-slate-50 text-slate-600 border-slate-200 hover:bg-slate-100'}`}><IconPin size={10}/>{isPerm ? 'Permanent' : 'Temporär'}</button>
                                                    <button onClick={() => { setBasicTasks(prev => prev.filter(t => t !== task)); setInactiveBasicTasks(prev => [...prev, { name: task, createdAt: meta.createdAt || new Date().toISOString() }]); }} className="px-2 py-1 text-xs bg-slate-50 text-slate-600 border border-slate-200 rounded hover:bg-slate-100">Set Inactive</button>
                                                    <button onClick={() => setBasicTasks(basicTasks.filter(t => t !== task))} className="text-rose-500 hover:text-rose-700"><IconX size={14}/></button>
                                                </div>
                                            </li>
                                        );
                                    })}
                                    {basicTasks.filter(t => basicTasksMeta?.[t]).length === 0 && <li className="p-6 text-sm text-slate-400 text-center">Noch keine benutzerdefinierten Tasks.</li>}
                                </ul>
                            </div>
                        )}
                    </div>

                    {/* Support Tasks */}
                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                        <button onClick={() => setExpandedSetupCats(prev => ({...prev, support: !prev.support}))}
                            className="w-full p-4 border-b border-slate-200 bg-slate-50 flex justify-between items-center hover:bg-slate-100 transition-colors">
                            <h2 className="text-lg text-slate-900 font-medium">Support</h2>
                            <span className="text-slate-500">{expandedSetupCats.support ? <IconChevronDown size={20}/> : <IconChevronRight size={20}/>}</span>
                        </button>
                        {expandedSetupCats.support && (
                            <ul className="divide-y divide-slate-200">
                                {SUPPORT_TASKS.map(task => {
                                    const isInactive = inactiveSupportTasks.includes(task);
                                    const sc = SUPPORT_CHIP_COLORS[task] || {};
                                    return (
                                        <li key={task} className="p-4 flex justify-between items-center text-sm">
                                            <div className="flex items-center gap-2">
                                                <span className={`w-3 h-3 rounded-full ${sc.dot || 'bg-slate-400'}`}></span>
                                                <span className={`font-medium ${isInactive ? 'text-slate-400 line-through' : 'text-slate-800'}`}>{task}</span>
                                                <span className="text-xs bg-gea-50 text-gea-700 border border-gea-200 px-1.5 py-0.5 rounded flex items-center gap-1"><IconPin size={10}/>Permanent</span>
                                            </div>
                                            <div className="flex gap-2">
                                                {isInactive ? (
                                                    <button onClick={() => setInactiveSupportTasks(prev => prev.filter(t => t !== task))} className="px-2.5 py-1 text-xs bg-gea-50 text-gea-700 border border-gea-200 rounded hover:bg-gea-100">Reaktivieren</button>
                                                ) : (
                                                    <button onClick={() => setInactiveSupportTasks(prev => [...prev, task])} className="px-2.5 py-1 text-xs bg-slate-50 text-slate-600 border border-slate-200 rounded hover:bg-slate-100">Set Inactive</button>
                                                )}
                                            </div>
                                        </li>
                                    );
                                })}
                            </ul>
                        )}
                    </div>

                    {/* Training Tasks */}
                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                        <button onClick={() => setExpandedSetupCats(prev => ({...prev, training: !prev.training}))}
                            className="w-full p-4 border-b border-slate-200 bg-slate-50 flex justify-between items-center hover:bg-slate-100 transition-colors">
                            <h2 className="text-lg text-slate-900 font-medium">Trainings</h2>
                            <span className="text-slate-500">{expandedSetupCats.training ? <IconChevronDown size={20}/> : <IconChevronRight size={20}/>}</span>
                        </button>
                        {expandedSetupCats.training && (
                            <ul className="divide-y divide-slate-200">
                                {TRAINING_TASKS.map(task => {
                                    const isInactive = inactiveTrainingTasks.includes(task);
                                    return (
                                        <li key={task} className="p-4 flex justify-between items-center text-sm">
                                            <div className="flex items-center gap-2">
                                                <span className="w-3 h-3 rounded-full bg-sky-500"></span>
                                                <span className={`font-medium ${isInactive ? 'text-slate-400 line-through' : 'text-slate-800'}`}>{task}</span>
                                                <span className="text-xs bg-gea-50 text-gea-700 border border-gea-200 px-1.5 py-0.5 rounded flex items-center gap-1"><IconPin size={10}/>Permanent</span>
                                            </div>
                                            <div className="flex gap-2">
                                                {isInactive ? (
                                                    <button onClick={() => setInactiveTrainingTasks(prev => prev.filter(t => t !== task))} className="px-2.5 py-1 text-xs bg-gea-50 text-gea-700 border border-gea-200 rounded hover:bg-gea-100">Reaktivieren</button>
                                                ) : (
                                                    <button onClick={() => setInactiveTrainingTasks(prev => [...prev, task])} className="px-2.5 py-1 text-xs bg-slate-50 text-slate-600 border border-slate-200 rounded hover:bg-slate-100">Set Inactive</button>
                                                )}
                                            </div>
                                        </li>
                                    );
                                })}
                            </ul>
                        )}
                    </div>

                    {/* Offtime */}
                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                        <button onClick={() => setExpandedSetupCats(prev => ({...prev, offtime: !prev.offtime}))}
                            className="w-full p-4 border-b border-slate-200 bg-slate-50 flex justify-between items-center hover:bg-slate-100 transition-colors">
                            <h2 className="text-lg text-slate-900 font-medium">Abwesenheiten (Offtime)</h2>
                            <span className="text-slate-500">{expandedSetupCats.offtime ? <IconChevronDown size={20}/> : <IconChevronRight size={20}/>}</span>
                        </button>
                        {expandedSetupCats.offtime && (
                            <div>
                                <div className="p-4 flex gap-2 border-b border-slate-200">
                                    <input type="text" value={newOfftimeTask} onChange={e=>setNewOfftimeTask(e.target.value)} placeholder="Neue Abwesenheitsart" className="flex-1 p-2 border border-slate-300 rounded text-sm"/>
                                    <button onClick={() => { if(newOfftimeTask.trim()&&!offtimeTasks.includes(newOfftimeTask.trim())){setOfftimeTasks([...offtimeTasks,newOfftimeTask.trim()]);setNewOfftimeTask('');} }} className="bg-gea-600 text-white px-3 py-2 rounded text-sm font-medium hover:bg-gea-700">Hinzufügen</button>
                                </div>
                                <ul className="divide-y divide-slate-200">
                                    {offtimeTasks.map(task => {
                                        const isInactive = (inactiveOfftimeTasks||[]).some(t => t.name === task);
                                        return (
                                            <li key={task} className="p-4 flex justify-between items-center text-sm">
                                                <span className={`${isInactive ? 'text-slate-400 line-through' : 'text-slate-800'}`}>{task}</span>
                                                <div className="flex gap-2">
                                                    {isInactive ? (
                                                        <button onClick={() => setInactiveOfftimeTasks(prev => prev.filter(t => t.name !== task))} className="px-2.5 py-1 text-xs bg-gea-50 text-gea-700 border border-gea-200 rounded hover:bg-gea-100">Reaktivieren</button>
                                                    ) : (
                                                        <button onClick={() => setInactiveOfftimeTasks(prev => [...prev, { name: task }])} className="px-2.5 py-1 text-xs bg-slate-50 text-slate-600 border border-slate-200 rounded hover:bg-slate-100">Set Inactive</button>
                                                    )}
                                                    <button onClick={() => setOfftimeTasks(offtimeTasks.filter(t => t !== task))} className="text-rose-500 hover:text-rose-700"><IconX size={16}/></button>
                                                </div>
                                            </li>
                                        );
                                    })}
                                </ul>
                            </div>
                        )}
                    </div>

                    {/* Mitarbeiter-Kategorien */}
                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                        <button onClick={() => setExpandedSetupCats(prev => ({...prev, empCats: !prev.empCats}))}
                            className="w-full p-4 border-b border-slate-200 bg-slate-50 flex justify-between items-center hover:bg-slate-100 transition-colors">
                            <h2 className="text-lg text-slate-900 font-medium">Mitarbeiter-Kategorien</h2>
                            <span className="text-slate-500">{expandedSetupCats.empCats ? <IconChevronDown size={20}/> : <IconChevronRight size={20}/>}</span>
                        </button>
                        {expandedSetupCats.empCats && (
                            <div>
                                <div className="p-4 flex gap-2 border-b border-slate-200">
                                    <input type="text" value={newEmpCat} onChange={e => setNewEmpCat(e.target.value)} onKeyDown={e => { if (e.key === 'Enter' && newEmpCat.trim() && !empCategories.includes(newEmpCat.trim())) { setEmpCategories([...empCategories, newEmpCat.trim()]); setNewEmpCat(''); }}} placeholder="Neue Mitarbeiter-Kategorie" className="flex-1 p-2 border border-slate-300 rounded text-sm"/>
                                    <button onClick={() => { if(newEmpCat.trim()&&!empCategories.includes(newEmpCat.trim())){setEmpCategories([...empCategories,newEmpCat.trim()]);setNewEmpCat('');} }} className="bg-gea-600 text-white px-3 py-2 rounded text-sm font-medium hover:bg-gea-700">Hinzufügen</button>
                                </div>
                                <ul className="divide-y divide-slate-100">
                                    {empCategories.map(cat => (<li key={cat} className="px-4 py-3 flex justify-between items-center text-sm"><span className="text-slate-800">{cat}</span><button onClick={() => setEmpCategories(empCategories.filter(c => c !== cat))} className="text-rose-500 hover:text-rose-700"><IconX size={16}/></button></li>))}
                                </ul>
                            </div>
                        )}
                    </div>

                    {/* Projekt-Kategorien */}
                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                        <button onClick={() => setExpandedSetupCats(prev => ({...prev, projCats: !prev.projCats}))}
                            className="w-full p-4 border-b border-slate-200 bg-slate-50 flex justify-between items-center hover:bg-slate-100 transition-colors">
                            <h2 className="text-lg text-slate-900 font-medium">Projekt-Kategorien</h2>
                            <span className="text-slate-500">{expandedSetupCats.projCats ? <IconChevronDown size={20}/> : <IconChevronRight size={20}/>}</span>
                        </button>
                        {expandedSetupCats.projCats && (
                            <div>
                                <div className="p-4 flex gap-2 border-b border-slate-200">
                                    <input type="text" value={newProjCat} onChange={e => setNewProjCat(e.target.value)} onKeyDown={e => { if (e.key === 'Enter' && newProjCat.trim() && !projCategories.includes(newProjCat.trim())) { setProjCategories([...projCategories, newProjCat.trim()]); setNewProjCat(''); }}} placeholder="Neue Projekt-Kategorie" className="flex-1 p-2 border border-slate-300 rounded text-sm"/>
                                    <button onClick={() => { if(newProjCat.trim()&&!projCategories.includes(newProjCat.trim())){setProjCategories([...projCategories,newProjCat.trim()]);setNewProjCat('');} }} className="bg-gea-600 text-white px-3 py-2 rounded text-sm font-medium hover:bg-gea-700">Hinzufügen</button>
                                </div>
                                <ul className="divide-y divide-slate-100">
                                    {projCategories.map(cat => (<li key={cat} className="px-4 py-3 flex justify-between items-center text-sm"><span className="text-slate-800">{cat}</span><button onClick={() => setProjCategories(projCategories.filter(c => c !== cat))} className="text-rose-500 hover:text-rose-700"><IconX size={16}/></button></li>))}
                                </ul>
                            </div>
                        )}
                    </div>

                </div>
            </div>
        );
    };

    const renderData = () => (
        <div className="flex-1 p-8 bg-slate-50 overflow-y-auto">
            <div className="max-w-3xl mx-auto w-full bg-white rounded-xl shadow-sm border border-slate-200 p-8">
                <div className="flex items-center gap-4 mb-6">
                    <IconSettings size={40} className="text-slate-300 shrink-0"/>
                    <div>
                        <h2 className="text-xl text-slate-900 font-medium">Datenverwaltung</h2>
                        <p className="text-sm text-slate-500">Exportiere deine Planung als JSON-Backup oder stelle Daten aus einem Backup wieder her.</p>
                    </div>
                </div>

                <div className="mb-6 text-left border border-slate-200 rounded-lg p-4">
                    <label className="block text-sm font-medium text-slate-700 mb-1">Rechnungsempfänger (E-Mail)</label>
                    <input type="email" value={invoiceRecipient}
                        onChange={e => setInvoiceRecipient(e.target.value)}
                        placeholder="rechnung@kunde.de"
                        className="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-gea-400"/>
                    <p className="text-xs text-slate-400 mt-1">Standard-Empfänger für den "Per E-Mail"-Button im Rechnungsdialog.</p>
                </div>

                <div className="space-y-4">
                    <div className="grid grid-cols-2 gap-4">
                        <button onClick={exportData} className="bg-gea-600 hover:bg-gea-700 text-white py-3 rounded-lg flex justify-center items-center gap-2 font-medium transition-colors">
                            <IconDownload size={18}/> Backup exportieren (JSON)
                        </button>
                        <div className="relative">
                            <input type="file" accept=".json" onChange={importData} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                            <button className="w-full bg-white border-2 border-dashed border-slate-300 hover:border-gea-400 text-slate-600 py-3 rounded-lg flex justify-center items-center gap-2 font-medium transition-colors">
                                <IconUpload size={18}/> Daten importieren (JSON)
                            </button>
                        </div>
                    </div>
                    
                    <DepsSection/>

                    <button onClick={async () => {
                        if(confirm('Alle Daten unwiderruflich löschen?')) {
                            localStorage.removeItem('teamMasterProData');
                            if (SP_CONTEXT) {
                                try {
                                    const digest = await spGetDigest(SP_CONTEXT.siteUrl);
                                    // Legacy monolithic file
                                    await fetch(`${SP_CONTEXT.siteUrl}/_api/web/GetFileByServerRelativeUrl('${SP_ENC(SP_CONTEXT.stateFilePath)}')/recycle()`, {
                                        method: 'POST', credentials: 'include',
                                        headers: { 'X-RequestDigest': digest, 'Accept': 'application/json;odata=verbose' }
                                    }).catch(() => {});
                                    // New team-split folder
                                    const dataFolder = SP_CONTEXT.folderPath + '/' + PLANNER_DATA_DIR;
                                    await fetch(`${SP_CONTEXT.siteUrl}/_api/web/GetFolderByServerRelativeUrl('${SP_ENC(dataFolder)}')/recycle()`, {
                                        method: 'POST', credentials: 'include',
                                        headers: { 'X-RequestDigest': digest, 'Accept': 'application/json;odata=verbose' }
                                    }).catch(() => {});
                                } catch(e) {}
                            }
                            window.location.reload();
                        }
                    }} className="w-full mt-8 text-rose-500 hover:bg-rose-50 py-3 rounded-lg text-sm font-medium transition-colors">
                        System zurücksetzen
                    </button>
                </div>
            </div>
        </div>
    );

    return (
        <div className="flex h-screen w-full font-sans text-slate-800 bg-white overflow-hidden">
            <style dangerouslySetInnerHTML={{__html: `
                .diagonal-stripes {
                    background-image: repeating-linear-gradient(45deg, #f8fafc, #f8fafc 5px, #f1f5f9 5px, #f1f5f9 10px);
                }
            `}} />
            
            {renderSidebar()}
            
            {activeTab === 'resource' && renderResourceView()}
            {activeTab === 'project' && renderProjectTimeline()}
            {activeTab === 'utilization' && renderUtilization()}
            {activeTab === 'overview' && renderOverview()}
            {activeTab === 'setup_emp' && renderSetupEmp()}
            {activeTab === 'setup_proj' && renderSetupProj()}
            {activeTab === 'setup_cats' && renderSetupCats()}
            {activeTab === 'data' && renderData()}

            {isAssignModalOpen && assignContext && (
                <AssignmentModal
                    assignContext={assignContext}
                    employeeById={employeeById}
                    basicTasks={basicTasks}
                    basicTasksMeta={basicTasksMeta}
                    offtimeTasks={offtimeTasks}
                    inactiveOfftimeTasks={inactiveOfftimeTasks}
                    inactiveSupportTasks={inactiveSupportTasks}
                    inactiveTrainingTasks={inactiveTrainingTasks}
                    projects={projects}
                    computeAutoStatus={computeAutoStatus}
                    getUtilization={getUtilization}
                    getEmpWeeklyHours={getEmpWeeklyHours}
                    setBasicTasks={setBasicTasks}
                    setBasicTasksMeta={setBasicTasksMeta}
                    onClose={() => setIsAssignModalOpen(false)}
                    onSave={handleSaveAssignment}
                    onDelete={handleDeleteAssignment}
                    onDeleteSeries={handleDeleteAssignmentSeries}
                />
            )}
            {isCopyModalOpen && copyContext && (
                <CopyModal
                    copyContext={copyContext}
                    activeEmps={activeEmployees}
                    empsByCategory={activeEmpsByCategory}
                    empCategories={activeEmpCategories}
                    weeks={weeks}
                    projectById={projectById}
                    assignments={assignments}
                    setAssignments={setAssignments}
                    onClose={() => { setIsCopyModalOpen(false); setCopyContext(null); }}
                />
            )}
            {isInvoiceModalOpen && <InvoiceModal />}
            {isProjFormOpen && ProjFormModal()}

            {/* Changelog Modal */}
            {isChangelogOpen && (
                <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                    <div className="bg-white rounded-xl shadow-xl w-full max-w-2xl overflow-hidden" style={{maxHeight:'85vh'}}>
                        <ModalHeader title="Changelog – Einsatzplanung" onClose={() => setIsChangelogOpen(false)}/>
                        <div className="overflow-auto p-6" style={{maxHeight:'calc(85vh - 64px)'}}>
                            <pre className="text-xs text-slate-700 font-mono whitespace-pre-wrap leading-relaxed">{CHANGELOG_CONTENT}</pre>
                        </div>
                    </div>
                </div>
            )}

            {/* OneDrive-Sync Popup */}
            {FS_MODE && (fsStatus === 'needs-setup' || fsStatus === 'needs-permission') && (
                <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50">
                    <div className="bg-white rounded-2xl shadow-2xl p-8 max-w-sm w-full mx-4 text-center">
                        <div className="w-12 h-12 bg-gea-100 rounded-full flex items-center justify-center mx-auto mb-4">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-gea-600"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                        </div>
                        {fsStatus === 'needs-setup' ? (<>
                            <h2 className="text-lg font-semibold text-slate-900 mb-2">Synchronisation einrichten</h2>
                            <p className="text-sm text-slate-500 mb-6">Wähle einmalig den Ordner, in dem <strong>index.html</strong> liegt. OneDrive verteilt Änderungen danach automatisch an alle Nutzer.</p>
                            <button onClick={handleSetupFolder} className="w-full bg-gea-600 hover:bg-gea-700 text-white font-medium py-3 px-4 rounded-xl transition-colors mb-2">Ordner wählen</button>
                        </>) : (<>
                            <h2 className="text-lg font-semibold text-slate-900 mb-2">Synchronisation aktivieren</h2>
                            <p className="text-sm text-slate-500 mb-6">Klicke auf <strong>Aktivieren</strong> – der Browser fragt kurz nach Dateizugriff. Danach läuft die Synchronisation automatisch.</p>
                            <button onClick={handleActivateSync} className="w-full bg-gea-600 hover:bg-gea-700 text-white font-medium py-3 px-4 rounded-xl transition-colors mb-2">Aktivieren</button>
                        </>)}
                        <button onClick={() => setFsStatus('off')} className="w-full text-slate-400 hover:text-slate-600 text-sm py-2 transition-colors">Ohne Sync starten</button>
                    </div>
                </div>
            )}
            {isHelpModalOpen && HelpModal()}
        </div>
    );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>

</body>
</html>
