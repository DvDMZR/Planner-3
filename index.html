                        </div>
                        <div className="text-sm text-slate-500 flex items-center gap-2 mt-1 flex-wrap">
                            <span className="flex items-center gap-1"><div className={`w-2 h-2 rounded-full ${proj.color}`}></div>{proj.category}</span>
                            <span>·</span><span>{proj.startWeek} – {proj.ibnWeek}</span>
                        </div>
                    </div>

                    {/* Status + checkboxes */}
                    <div className="flex items-center gap-3 flex-wrap">
                        <StatusBadge status={computeAutoStatus(proj)}/>
                        <label className="flex items-center gap-2 cursor-pointer select-none">
                            <input type="checkbox"
                                checked={!!proj.projectCompleted}
                                onChange={e => setProjects(projects.map(p => p.id === proj.id ? {...p, projectCompleted: e.target.checked} : p))}
                                className="w-4 h-4 text-gea-600 rounded"/>
                            <span className="text-sm font-medium text-slate-700">Projekt abgeschlossen</span>
                        </label>
                        <label className="flex items-center gap-2 cursor-pointer select-none">
                            <input type="checkbox"
                                checked={!!proj.costsSubmitted}
                                onChange={e => setProjects(projects.map(p => p.id === proj.id ? {...p, costsSubmitted: e.target.checked} : p))}
                                className="w-4 h-4 text-gea-600 rounded"/>
                            <span className="text-sm font-medium text-slate-700">Kosten übermittelt</span>
                        </label>
                        <div className="flex items-center gap-2">
                            <span className="text-sm text-slate-500">Rechnung:</span>
                            <select value={proj.invoiceStatus ?? 'offen'}
                                onChange={e => setProjects(prev => prev.map(p => p.id === proj.id ? {...p, invoiceStatus: e.target.value} : p))}
                                className="text-sm border border-slate-200 rounded-md px-2 py-1.5 bg-white text-slate-700 focus:outline-none focus:ring-1 focus:ring-gea-400">
                                <option value="offen">Offen</option>
                                <option value="exportiert">Exportiert</option>
                                <option value="bezahlt">Bezahlt</option>
                            </select>
                        </div>
                        <button onClick={() => {
                            setProjForm({ name: proj.name, category: proj.category || projCategories[0] || '', projectNumber: proj.projectNumber || '', startWeek: proj.startWeek, ibnWeek: proj.ibnWeek, color: proj.color || 'bg-gea-500' });
                            setEditingProjectId(proj.id);
                            setIsProjFormOpen(true);
                        }} className="bg-white border border-slate-300 hover:bg-gea-50 hover:border-gea-400 text-slate-700 px-3 py-2 rounded-lg text-sm flex items-center gap-2 font-medium transition-colors">
                            <IconEdit size={15}/> Bearbeiten
                        </button>
                        <button onClick={openInvoiceModal} className="bg-white border border-slate-300 hover:bg-slate-50 text-slate-700 px-3 py-2 rounded-lg text-sm flex items-center gap-2 font-medium transition-colors">
                            <IconFileText size={15}/> Rechnung
                        </button>
                        <button onClick={() => { setEditingCostItem(null); setIsCostItemModalOpen(true); }}
                            className="bg-gea-600 hover:bg-gea-700 text-white px-3 py-2 rounded-lg text-sm flex items-center gap-2 font-medium transition-colors">
                            <IconPlus size={15}/> Kostenpunkt
                        </button>
                    </div>
                </div>

                <div className="p-6 max-w-7xl mx-auto w-full space-y-6">

                    {/* Employee Presence Overview */}
                    {assignedEmpIds.length > 0 && presenceWeeks.length > 0 && (
                        <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                            <div className="p-4 bg-slate-50 border-b border-slate-200 flex justify-between items-center">
                                <h3 className="text-slate-900 text-base font-medium">Mitarbeiter-Anwesenheit</h3>
                                <span className="text-xs text-slate-400">{presenceWeeks.length} Wochen</span>
                            </div>
                            <div className="overflow-x-auto">
                                <table className="text-xs border-collapse w-full">
                                    <thead>
                                        <tr>
                                            <th className="p-3 text-left text-slate-500 font-medium border-r border-slate-200 bg-slate-50 w-40 sticky left-0">Mitarbeiter</th>
                                            {presenceWeeks.map(w => (
                                                <th key={w} className="p-2 text-center text-slate-500 font-medium border-r border-slate-200 bg-slate-50 min-w-[52px]">
                                                    KW{w.split('-W')[1]}
                                                </th>
                                            ))}
                                            <th className="p-2 text-center text-slate-500 font-medium bg-slate-50 min-w-[60px]">Stunden</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100">
                                        {assignedEmpIds.map(empId => {
                                            const emp = employees.find(e => e.id === empId);
                                            const empAss = projAssignments.filter(a => a.empId === empId);
                                            const empHours = empAss.reduce((acc, a) => acc + (a.hours ?? (a.percent / 100 * HOURS_PER_WEEK)), 0);
                                            return (
                                                <tr key={empId} className="hover:bg-slate-50">
                                                    <td className="p-3 text-slate-800 font-medium border-r border-slate-200 sticky left-0 bg-white">{emp?.name || 'Unbekannt'}</td>
                                                    {presenceWeeks.map(w => {
                                                        const a = empAss.find(x => x.week === w);
                                                        return (
                                                            <td key={w} className="p-1 text-center border-r border-slate-100">
                                                                {a ? (
                                                                    <button
                                                                        onClick={() => { setAssignContext({ empId, week: w, existing: a }); setIsAssignModalOpen(true); }}
                                                                        className="mx-auto w-9 h-7 rounded flex items-center justify-center bg-gea-100 text-gea-700 font-medium leading-none hover:bg-gea-200 transition-colors cursor-pointer">
                                                                        {a.hours ?? Math.round((a.percent ?? 100) / 100 * HOURS_PER_WEEK)}h
                                                                    </button>
                                                                ) : (
                                                                    <div className="mx-auto w-9 h-7 rounded bg-slate-50"></div>
                                                                )}
                                                            </td>
                                                        );
                                                    })}
                                                    <td className="p-2 text-center text-slate-900 font-medium">{empHours}h</td>
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}

                    {/* Cost Items Table */}
                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                        <div className="p-4 bg-slate-50 border-b border-slate-200 flex justify-between items-center">
                            <h3 className="text-slate-900 text-base font-medium">Kostenpunkte</h3>
                            <button onClick={() => { setEditingCostItem(null); setIsCostItemModalOpen(true); }}
                                className="text-gea-600 text-sm font-medium hover:text-gea-700 flex items-center gap-1">
                                <IconPlus size={15}/> Hinzufügen
                            </button>
                        </div>
                        {projCostItems.length === 0 ? (
                            <div className="p-10 text-center text-slate-400 text-sm">
                                Noch keine Kostenpunkte erfasst.
                            </div>
                        ) : (
                            <table className="w-full text-left text-sm">
                                <thead className="bg-slate-50 border-b border-slate-200">
                                    <tr>
                                        <th className="p-3 text-slate-500 font-medium">Mitarbeiter</th>
                                        <th className="p-3 text-slate-500 font-medium">Art</th>
                                        <th className="p-3 text-slate-500 font-medium">Beschreibung</th>
                                        <th className="p-3 text-slate-500 font-medium text-center">KW</th>
                                        <th className="p-3 text-slate-500 font-medium text-right">Std.</th>
                                        <th className="p-3 text-slate-500 font-medium text-right">€/Std.</th>
                                        <th className="p-3 text-slate-500 font-medium text-right">Betrag</th>
                                        <th className="p-3 text-slate-500 font-medium text-right">Details</th>
                                        <th className="p-3"></th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100">
                                    {projCostItems.map(ci => {
                                        const emp = employees.find(e => e.id === ci.empId);
                                        return (
                                            <tr key={ci.id} className="hover:bg-slate-50 transition-colors">
                                                <td className="p-3 text-slate-800 font-medium">{emp?.name || '–'}</td>
                                                <td className="p-3">
                                                    <span className={`text-xs px-2 py-0.5 rounded-full font-medium ${
                                                        ci.type === 'Dienstleistung' ? 'bg-blue-100 text-blue-700' :
                                                        ci.type === 'Reisekosten' ? 'bg-amber-100 text-amber-700' :
                                                        'bg-slate-100 text-slate-600'
                                                    }`}>{ci.type}</span>
                                                </td>
                                                <td className="p-3 text-slate-600">{ci.description || '–'}</td>
                                                <td className="p-3 text-slate-500 text-xs">
                                                    {(() => {
                                                        if (ci.dateFrom) {
                                                            const kwF = parseInt(getWeekString(new Date(ci.dateFrom)).split('-W')[1]);
                                                            const kwT = ci.dateTo ? parseInt(getWeekString(new Date(ci.dateTo)).split('-W')[1]) : kwF;
                                                            return kwF === kwT ? `KW${kwF}` : `KW${kwF}–${kwT}`;
                                                        }
                                                        return ci.week ? `KW${ci.week.split('-W')[1]}` : '–';
                                                    })()}
                                                </td>
                                                <td className="p-3 text-right text-slate-600">{ci.hours != null ? `${ci.hours}h` : '–'}</td>
                                                <td className="p-3 text-right text-slate-600">{ci.hourlyRate != null ? `${ci.hourlyRate} €` : '–'}</td>
                                                <td className="p-3 text-right text-slate-900 font-medium">{(ci.amount || 0).toFixed(2)} €</td>
                                                <td className="p-3 text-xs text-slate-400">
                                                    {ci.extraCosts?.length > 0 && (
                                                        <div className="space-y-0.5">
                                                            {ci.extraCosts.map((ec, i) => (
                                                                <div key={i}>{ec.type}: {(ec.amount||0).toFixed(0)}€</div>
                                                            ))}
                                                        </div>
                                                    )}
                                                </td>
                                                <td className="p-3 text-right">
                                                    <button onClick={() => { setEditingCostItem(ci); setIsCostItemModalOpen(true); }}
                                                        className="text-gea-600 text-xs font-medium hover:text-gea-700">Bearbeiten</button>
                                                </td>
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                        )}
                    </div>

                    {/* Summary */}
                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                        <div className="p-4 bg-slate-50 border-b border-slate-200">
                            <h3 className="text-slate-900 text-base font-medium">Zusammenfassung</h3>
                        </div>
                        <div className="p-6 grid grid-cols-2 gap-4 md:grid-cols-4">
                            <div className="rounded-lg border border-slate-200 bg-slate-50/50 p-4">
                                <div className="flex items-center gap-2 mb-2">
                                    <div className="w-7 h-7 rounded-md bg-slate-200 flex items-center justify-center"><IconClock size={14} className="text-slate-500"/></div>
                                    <p className="text-[10px] text-slate-500 font-medium uppercase tracking-wide">Stunden</p>
                                </div>
                                <p className="text-2xl text-slate-900 font-semibold tabular-nums">{totalHours}h</p>
                            </div>
                            <div className="rounded-lg border border-slate-200 bg-slate-50/50 p-4">
                                <div className="flex items-center gap-2 mb-2">
                                    <div className="w-7 h-7 rounded-md bg-blue-100 flex items-center justify-center"><IconUsers size={14} className="text-blue-600"/></div>
                                    <p className="text-[10px] text-slate-500 font-medium uppercase tracking-wide">Lohnkosten</p>

                                            <th className="p-4 text-slate-700 font-semibold">Nr.</th>
                                            <th className="p-4 text-slate-700 font-semibold">Status</th>

    const renderSetupEmp = () => {

            if (editingEmpId) {
                setEmployees(employees.map(e => e.id === editingEmpId ? { ...e, name: empForm.name, category: empForm.category, weeklyHours: wh } : e));
                setEditingEmpId(null);
            } else {
                setEmployees([...employees, { id: `emp-${Date.now()}`, name: empForm.name, category: empForm.category, weeklyHours: wh, active: true }]);
            }
            setEmpForm({name: '', category: empCategories[0] || '', weeklyHours: HOURS_PER_WEEK});
        };

        const handleEditEmp = (e) => {
            setEmpForm({ name: e.name, category: e.category, weeklyHours: e.weeklyHours ?? HOURS_PER_WEEK });
            setEditingEmpId(e.id);

            setEditingEmpId(null);

            <div className="flex-1 overflow-auto p-8 bg-slate-50">

                            <div className="flex-1">
                                <label className="block text-xs text-slate-500 mb-1 font-medium">Name</label>
                                <input type="text" value={empForm.name} onChange={e=>setEmpForm({...empForm, name: e.target.value})} className="w-full p-2 border border-slate-300 rounded text-sm"/>
                            </div>
                            <div className="w-44">
                                <label className="block text-xs text-slate-500 mb-1 font-medium">Kategorie</label>
                                <select value={empForm.category} onChange={e=>setEmpForm({...empForm, category: e.target.value})} className="w-full p-2 border border-slate-300 rounded text-sm">
                                    {empCategories.map(c => <option key={c} value={c}>{c}</option>)}

                                <input type="number" min="1" max="80" value={empForm.weeklyHours} onChange={e=>setEmpForm({...empForm, weeklyHours: e.target.value})} className="w-full p-2 border border-slate-300 rounded text-sm"/>
                            </div>
                            <div className="flex gap-2">
                                {editingEmpId && (
                                    <button

                                        Abbruch

                                <button

                                    className="bg-gea-600 text-white px-4 py-2 rounded text-sm hover:bg-gea-700 h-[38px] font-medium transition-colors">
                                    {editingEmpId ? 'Speichern' : 'Hinzufügen'}
                                </button>
                            </div>
                        </div>
                    </div>

                    <div className="space-y-4">
                        {empCategories.map(category => {
                            const isCollapsed = collapsedEmpSetup[category];
                            const catEmps = employees.filter(e => e.category === category);

                            return (
                                <div key={category} className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                                    <button
                                        onClick={() => toggleEmpSetup(category)}

                                            {isCollapsed ? <IconChevronRight size={20}/> : <IconChevronDown size={20}/>}

                                            {catEmps.length}
                                        </span>
                                    </button>

                                    {!isCollapsed && (
                                        catEmps.length > 0 ? (
                                            <table className="w-full text-left text-sm">
                                                <thead className="bg-slate-50/50">
                                                    <tr>
                                                        <th className="p-4 text-slate-500 font-medium">Name</th>
                                                        <th className="p-4 text-slate-500 font-medium text-center">Std./Woche</th>
                                                        <th className="p-4 text-slate-500 font-medium">Status</th>
                                                        <th className="p-4"></th>

                </div>
            </div>
        );
    };

    const renderOverview = () => {
        const fmt = n => n.toLocaleString('de-DE', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
        const currentWeekStr = getWeekString(new Date());
        const activeEmps = employees.filter(e => e.active !== false);
        const activeProjects = projects.filter(p => computeAutoStatus(p) === 'active').length;
        const weekUtils = activeEmps.map(e => getUtilization(e.id, currentWeekStr).total);
        const avgUtil = activeEmps.length > 0 ? Math.round(weekUtils.reduce((a,b)=>a+b,0) / activeEmps.length) : 0;
        const overbookedCount = weekUtils.filter(u => u > 100).length;

        const rows = projects.filter(p => ['active', 'planned'].includes(computeAutoStatus(p))).map(p => {
            const projAss = assignments.filter(a => a.reference === p.id && a.type === 'project');
            let totalHours = 0, totalLaborCost = 0;
            projAss.forEach(a => {
                const h = a.hours ?? ((a.percent ?? 100) / 100 * HOURS_PER_WEEK);
                totalHours += h;
                if (p.billable !== false) totalLaborCost += h * (p.hourlyRate ?? DEFAULT_HOURLY_RATE);
            });
            const zusatzkosten = costItems.filter(c => c.projectId === p.id).reduce((acc, c) => acc + (c.amount || 0), 0);
            return { p, totalHours, totalLaborCost, zusatzkosten, gesamtkosten: totalLaborCost + zusatzkosten };
        }).sort((a, b) => {
            const statusOrder = { active: 0, missing_costs: 1, planned: 2, completed: 3, costs_submitted: 4 };
            return (statusOrder[computeAutoStatus(a.p)] ?? 5) - (statusOrder[computeAutoStatus(b.p)] ?? 5);
        });

        const totalGesamtkosten = rows.reduce((acc, r) => acc + r.gesamtkosten, 0);
        const totalHoursAll = rows.reduce((acc, r) => acc + r.totalHours, 0);

        return (
            <div className="flex-1 overflow-auto p-8 bg-slate-50">
                <div className="max-w-6xl mx-auto space-y-6">
                    <div className="grid grid-cols-4 gap-4">
                        <div className="bg-white border border-slate-300 border-l-4 border-l-gea-500 rounded-xl p-5 shadow-md">
                            <p className="text-xs text-slate-600 font-semibold uppercase tracking-wide">Aktive Projekte</p>
                            <p className="text-3xl font-bold text-gea-700 mt-1">{activeProjects}</p>
                            <p className="text-xs text-slate-500 mt-1">von {projects.length} gesamt (ohne abgeschl.)</p>
                        </div>
                        <div className="bg-white border border-slate-300 border-l-4 border-l-gea-400 rounded-xl p-5 shadow-md">
                            <p className="text-xs text-slate-600 font-semibold uppercase tracking-wide">Mitarbeiter</p>
                            <p className="text-3xl font-bold text-slate-800 mt-1">{activeEmps.length}</p>
                            <p className="text-xs text-slate-500 mt-1">aktiv</p>
                        </div>
                        <div className={`bg-white border border-l-4 rounded-xl p-5 shadow-md ${avgUtil >= 100 ? 'border-rose-300 border-l-rose-500' : avgUtil >= 80 ? 'border-amber-300 border-l-amber-500' : 'border-slate-300 border-l-emerald-500'}`}>
                            <p className="text-xs text-slate-600 font-semibold uppercase tracking-wide">Ø Auslastung diese KW</p>
                            <p className={`text-3xl font-bold mt-1 ${avgUtil >= 100 ? 'text-rose-600' : avgUtil >= 80 ? 'text-amber-600' : 'text-emerald-600'}`}>{avgUtil}%</p>
                            <p className="text-xs text-slate-500 mt-1">{currentWeekStr}</p>
                        </div>
                        <div className={`bg-white border border-l-4 rounded-xl p-5 shadow-md ${overbookedCount > 0 ? 'border-rose-300 border-l-rose-500' : 'border-slate-300 border-l-slate-400'}`}>
                            <p className="text-xs text-slate-600 font-semibold uppercase tracking-wide">Überlastet diese KW</p>
                            <p className={`text-3xl font-bold mt-1 ${overbookedCount > 0 ? 'text-rose-600' : 'text-slate-800'}`}>{overbookedCount}</p>
                            <p className="text-xs text-slate-500 mt-1">{overbookedCount > 0 ? 'Mitarbeiter >100%' : 'Alles im Rahmen'}</p>
                        </div>
                    </div>

                        <h2 className="text-xl text-gea-800 font-semibold">Projektübersicht</h2>
                        <div className="flex items-center gap-4 text-sm text-slate-500">
                            <span>{rows.length} offene / geplante Projekte</span>
                            <span className="text-slate-300">|</span>
                            <span>{fmt(totalHoursAll)} h gesamt</span>
                            <span className="text-slate-300">|</span>
                            <span className="font-medium text-slate-700">{fmt(totalGesamtkosten)} € gesamt</span>
                        </div>
                    </div>
                    <div className="bg-white rounded-xl shadow-md border border-slate-300 overflow-hidden">
                        <table className="w-full text-left text-sm">
                            <thead className="bg-gea-50 border-b-2 border-gea-200">
                                <tr>
                                    <th className="p-4 text-gea-800 font-semibold">Projekt</th>
                                    <th className="p-4 text-gea-800 font-semibold">Status</th>
                                    <th className="p-4 text-gea-800 font-semibold">Rechnung</th>
                                    <th className="p-4 text-gea-800 font-semibold">IBN</th>
                                    <th className="p-4 text-gea-800 font-semibold text-right">Stunden</th>
                                    <th className="p-4 text-gea-800 font-semibold text-right">Lohnkosten</th>
                                    <th className="p-4 text-gea-800 font-semibold text-right">Zusatzkosten</th>
                                    <th className="p-4 text-gea-800 font-semibold text-right">Gesamt</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-200">
                                {rows.map(({ p, totalHours, totalLaborCost, zusatzkosten, gesamtkosten }) => (
                                    <tr key={p.id} className="hover:bg-slate-50 cursor-pointer transition-colors"
                                        onClick={() => { setSelectedProjectDetails(p.id); setActiveTab('setup_proj'); }}>
                                        <td className="p-4">
                                            <div className="flex items-center gap-2">
                                                <div className={`w-2.5 h-2.5 rounded-full flex-shrink-0 ${p.color}`}></div>
                                                <div>
                                                    <div className="font-medium text-slate-900">{p.name}</div>
                                                    <div className="text-xs text-slate-400 font-mono">{p.projectNumber || '–'} · {p.category}</div>
                                                </div>
                                            </div>
                                        </td>
                                        <td className="p-4"><StatusBadge status={computeAutoStatus(p)}/></td>
                                        <td className="p-4">
                                            <span className={`px-2 py-0.5 rounded-full text-xs font-medium ${
                                                p.invoiceStatus === 'bezahlt' ? 'bg-emerald-100 text-emerald-700' :
                                                p.invoiceStatus === 'exportiert' ? 'bg-blue-100 text-blue-700' :
                                                'bg-amber-100 text-amber-700'
                                            }`}>{p.invoiceStatus ?? 'offen'}</span>
                                        </td>
                                        <td className="p-4 text-slate-500 text-xs font-mono">{p.ibnWeek || '–'}</td>
                                        <td className="p-4 text-right text-slate-700 tabular-nums">{fmt(totalHours)} h</td>
                                        <td className="p-4 text-right text-slate-700 tabular-nums">
                                            {p.billable !== false ? `${fmt(totalLaborCost)} €` : <span className="text-slate-400 text-xs">–</span>}
                                        </td>
                                        <td className="p-4 text-right text-slate-700 tabular-nums">
                                            {zusatzkosten > 0 ? `${fmt(zusatzkosten)} €` : <span className="text-slate-400">–</span>}
                                        </td>
                                        <td className="p-4 text-right font-semibold text-slate-900 tabular-nums">
                                            {gesamtkosten > 0 ? `${fmt(gesamtkosten)} €` : <span className="text-slate-400 font-normal">–</span>}
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                            {rows.length > 0 && (
                                <tfoot className="border-t-2 border-gea-200 bg-gea-50">
                                    <tr>
                                        <td className="p-4 text-gea-800 font-semibold text-sm" colSpan={4}>Gesamt</td>
                                        <td className="p-4 text-right font-semibold text-slate-900 tabular-nums">{fmt(totalHoursAll)} h</td>
                                        <td className="p-4 text-right font-semibold text-slate-900 tabular-nums">{fmt(rows.reduce((a,r)=>a+r.totalLaborCost,0))} €</td>
                                        <td className="p-4 text-right font-semibold text-slate-900 tabular-nums">{fmt(rows.reduce((a,r)=>a+r.zusatzkosten,0))} €</td>
                                        <td className="p-4 text-right font-bold text-gea-700 tabular-nums">{fmt(totalGesamtkosten)} €</td>
                                    </tr>
                                </tfoot>
                            )}
                            {rows.length === 0 && (
                                <tbody><tr><td colSpan={8} className="text-center text-slate-400 text-sm py-12">Keine Projekte vorhanden.</td></tr></tbody>
                            )}
                        </table>
                    </div>
                </div>
            </div>
        );
    };

    const renderSetupCats = () => {
        return (
            <div className="flex-1 overflow-auto p-8 bg-slate-50">
                <div className="max-w-4xl mx-auto space-y-6">
                    
                    {/* Basic Tasks */}
                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                        <button 
                            onClick={() => setExpandedSetupCats(prev => ({...prev, basic: !prev.basic}))}
                            className="w-full p-4 border-b border-slate-200 bg-slate-50 flex justify-between items-center hover:bg-slate-100 transition-colors"
                        >
                            <h2 className="text-lg text-slate-900 font-medium">Standard-Aufgaben (Basic Tasks)</h2>
                            <div className="text-slate-500">
                                {expandedSetupCats.basic ? <IconChevronDown size={20}/> : <IconChevronRight size={20}/>}
                            </div>
                        </button>
                        {expandedSetupCats.basic && (
                            <div>
                                <div className="p-4 flex gap-2 border-b border-slate-300">
                                    <input type="text" value={newBasicTask} onChange={e=>setNewBasicTask(e.target.value)} placeholder="Neuer Basic Task" className="flex-1 p-2 border border-slate-300 rounded text-sm"/>
                                    <button onClick={() => { if(newBasicTask.trim() && !basicTasks.includes(newBasicTask)) { setBasicTasks([...basicTasks, newBasicTask.trim()]); setNewBasicTask(''); } }} className="bg-gea-600 text-white px-3 py-2 rounded text-sm font-medium hover:bg-gea-700">Hinzufügen</button>
                                </div>
                                <ul className="divide-y divide-slate-300">
                                    {basicTasks.map(task => (
                                        <li key={task} className="p-4 flex justify-between items-center text-sm">
                                            <span className="text-slate-800">{task}</span>
                                            <button onClick={() => setBasicTasks(basicTasks.filter(t => t !== task))} className="text-rose-500 hover:text-rose-700"><IconX size={16}/></button>
                                        </li>
                                    ))}
                                </ul>
                            </div>
                        )}
                    </div>

                    {/* Offtime */}
                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                        <button 
                            onClick={() => setExpandedSetupCats(prev => ({...prev, offtime: !prev.offtime}))}
                            className="w-full p-4 border-b border-slate-200 bg-slate-50 flex justify-between items-center hover:bg-slate-100 transition-colors"
                        >
                            <h2 className="text-lg text-slate-900 font-medium">Abwesenheiten (Offtime)</h2>
                            <div className="text-slate-500">
                                {expandedSetupCats.offtime ? <IconChevronDown size={20}/> : <IconChevronRight size={20}/>}
                            </div>
                        </button>
                        {expandedSetupCats.offtime && (
                            <div>
                                <div className="p-4 flex gap-2 border-b border-slate-300">
                                    <input type="text" value={newOfftimeTask} onChange={e=>setNewOfftimeTask(e.target.value)} placeholder="Neue Abwesenheitsart" className="flex-1 p-2 border border-slate-300 rounded text-sm"/>
                                    <button onClick={() => { if(newOfftimeTask.trim() && !offtimeTasks.includes(newOfftimeTask)) { setOfftimeTasks([...offtimeTasks, newOfftimeTask.trim()]); setNewOfftimeTask(''); } }} className="bg-gea-600 text-white px-3 py-2 rounded text-sm font-medium hover:bg-gea-700">Hinzufügen</button>
                                </div>
                                <ul className="divide-y divide-slate-300">
                                    {offtimeTasks.map(task => (
                                        <li key={task} className="p-4 flex justify-between items-center text-sm">
                                            <span className="text-slate-800">{task}</span>
                                            <button onClick={() => setOfftimeTasks(offtimeTasks.filter(t => t !== task))} className="text-rose-500 hover:text-rose-700"><IconX size={16}/></button>
                                        </li>
                                    ))}
                                </ul>
                            </div>
                        )}
                    </div>

                    {/* Mitarbeiter-Kategorien */}
                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                        <button onClick={() => setExpandedSetupCats(prev => ({...prev, empCats: !prev.empCats}))}
                            className="w-full p-4 border-b border-slate-200 bg-slate-50 flex justify-between items-center hover:bg-slate-100 transition-colors">
                            <h2 className="text-lg text-slate-900 font-medium">Mitarbeiter-Kategorien</h2>
                            <span className="text-slate-500">{expandedSetupCats.empCats ? <IconChevronDown size={20}/> : <IconChevronRight size={20}/>}</span>
                        </button>
                        {expandedSetupCats.empCats && (
                            <div>
                                <div className="p-4 flex gap-2 border-b border-slate-200">
                                    <input type="text" value={newEmpCat} onChange={e => setNewEmpCat(e.target.value)}
                                        onKeyDown={e => { if (e.key === 'Enter' && newEmpCat.trim() && !empCategories.includes(newEmpCat.trim())) { setEmpCategories([...empCategories, newEmpCat.trim()]); setNewEmpCat(''); }}}
                                        placeholder="Neue Mitarbeiter-Kategorie" className="flex-1 p-2 border border-slate-300 rounded text-sm"/>
                                    <button onClick={() => { if(newEmpCat.trim() && !empCategories.includes(newEmpCat.trim())) { setEmpCategories([...empCategories, newEmpCat.trim()]); setNewEmpCat(''); }}}
                                        className="bg-gea-600 text-white px-3 py-2 rounded text-sm font-medium hover:bg-gea-700 transition-colors">Hinzufügen</button>
                                </div>
                                <ul className="divide-y divide-slate-100">
                                    {empCategories.map(cat => (
                                        <li key={cat} className="px-4 py-3 flex justify-between items-center text-sm">
                                            <span className="text-slate-800">{cat}</span>
                                            <button onClick={() => setEmpCategories(empCategories.filter(c => c !== cat))} className="text-rose-500 hover:text-rose-700"><IconX size={16}/></button>
                                        </li>
                                    ))}
                                </ul>
                            </div>
                        )}
                    </div>

                    {/* Projekt-Kategorien */}
                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                        <button onClick={() => setExpandedSetupCats(prev => ({...prev, projCats: !prev.projCats}))}
                            className="w-full p-4 border-b border-slate-200 bg-slate-50 flex justify-between items-center hover:bg-slate-100 transition-colors">
                            <h2 className="text-lg text-slate-900 font-medium">Projekt-Kategorien</h2>
                            <span className="text-slate-500">{expandedSetupCats.projCats ? <IconChevronDown size={20}/> : <IconChevronRight size={20}/>}</span>
                        </button>
                        {expandedSetupCats.projCats && (
                            <div>
                                <div className="p-4 flex gap-2 border-b border-slate-200">
                                    <input type="text" value={newProjCat} onChange={e => setNewProjCat(e.target.value)}
                                        onKeyDown={e => { if (e.key === 'Enter' && newProjCat.trim() && !projCategories.includes(newProjCat.trim())) { setProjCategories([...projCategories, newProjCat.trim()]); setNewProjCat(''); }}}
                                        placeholder="Neue Projekt-Kategorie" className="flex-1 p-2 border border-slate-300 rounded text-sm"/>
                                    <button onClick={() => { if(newProjCat.trim() && !projCategories.includes(newProjCat.trim())) { setProjCategories([...projCategories, newProjCat.trim()]); setNewProjCat(''); }}}
                                        className="bg-gea-600 text-white px-3 py-2 rounded text-sm font-medium hover:bg-gea-700 transition-colors">Hinzufügen</button>
                                </div>
                                <ul className="divide-y divide-slate-100">
                                    {projCategories.map(cat => (
                                        <li key={cat} className="px-4 py-3 flex justify-between items-center text-sm">
                                            <span className="text-slate-800">{cat}</span>
                                            <button onClick={() => setProjCategories(projCategories.filter(c => c !== cat))} className="text-rose-500 hover:text-rose-700"><IconX size={16}/></button>
                                        </li>
                                    ))}
                                </ul>
                            </div>
                        )}
                    </div>

                </div>
            </div>
        );
    };

    const renderData = () => (
        <div className="flex-1 p-8 bg-slate-50 flex items-center justify-center">
            <div className="max-w-md w-full bg-white rounded-xl shadow-sm border border-slate-200 p-8 text-center">
                <IconSettings size={48} className="mx-auto text-slate-300 mb-6"/>
                <h2 className="text-xl text-slate-900 mb-2 font-medium">Datenverwaltung</h2>
                <p className="text-sm text-slate-500 mb-6">Exportiere deine Planung als JSON-Backup oder stelle Daten aus einem Backup wieder her.</p>

                <div className="mb-6 text-left border border-slate-200 rounded-lg p-4">
                    <label className="block text-sm font-medium text-slate-700 mb-1">Rechnungsempfänger (E-Mail)</label>
                    <input type="email" value={invoiceRecipient}
                        onChange={e => setInvoiceRecipient(e.target.value)}
                        placeholder="rechnung@kunde.de"
                        className="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-gea-400"/>
                    <p className="text-xs text-slate-400 mt-1">Standard-Empfänger für den "Per E-Mail"-Button im Rechnungsdialog.</p>
                </div>

                <div className="space-y-4">
                    <button onClick={exportData} className="w-full bg-gea-600 hover:bg-gea-700 text-white py-3 rounded-lg flex justify-center items-center gap-2 font-medium transition-colors">
                        <IconDownload size={20}/> Vollständiges Backup (JSON)
                    </button>
                    
                    <div className="relative">
                        <input type="file" accept=".json" onChange={importData} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                        <button className="w-full bg-white border-2 border-dashed border-slate-300 hover:border-gea-400 text-slate-600 py-3 rounded-lg flex justify-center items-center gap-2 font-medium transition-colors">
                            <IconUpload size={20}/> Daten Importieren (JSON)
                        </button>
                    </div>
                    
                    <button onClick={async () => {
                        if(confirm('Alle Daten unwiderruflich löschen?')) {
                            localStorage.removeItem('teamMasterProData');
                            if (SP_CONTEXT) {
                                try {
                                    const digest = await spGetDigest(SP_CONTEXT.siteUrl);
                                    await fetch(`${SP_CONTEXT.siteUrl}/_api/web/GetFileByServerRelativeUrl('${SP_ENC(SP_CONTEXT.stateFilePath)}')/recycle()`, {
                                        method: 'POST', credentials: 'include',
                                        headers: { 'X-RequestDigest': digest, 'Accept': 'application/json;odata=verbose' }
                                    });
                                } catch(e) {}
                            }
                            window.location.reload();
                        }
                    }} className="w-full mt-8 text-rose-500 hover:bg-rose-50 py-3 rounded-lg text-sm font-medium transition-colors">
                        System zurücksetzen
                    </button>
                </div>
            </div>
        </div>
    );

    return (
        <div className="flex h-screen w-full font-sans text-slate-800 bg-white overflow-hidden">
            <style dangerouslySetInnerHTML={{__html: `
                .diagonal-stripes {
                    background-image: repeating-linear-gradient(45deg, #f8fafc, #f8fafc 5px, #f1f5f9 5px, #f1f5f9 10px);
                }
            `}} />
            
            {renderSidebar()}
            
            {activeTab === 'resource' && renderResourceView()}
            {activeTab === 'project' && renderProjectTimeline()}
            {activeTab === 'utilization' && renderUtilization()}
            {activeTab === 'overview' && renderOverview()}
            {activeTab === 'setup_emp' && renderSetupEmp()}
            {activeTab === 'setup_proj' && renderSetupProj()}
            {activeTab === 'setup_cats' && renderSetupCats()}
            {activeTab === 'data' && renderData()}

            {isAssignModalOpen && <AssignmentModal />}
            {isCopyModalOpen && <CopyModal />}
            {isInvoiceModalOpen && <InvoiceModal />}
            {isProjFormOpen && ProjFormModal()}
            {isHelpModalOpen && HelpModal()}
        </div>
    );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>

</body>
</html>
