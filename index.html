<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Einsatzplanung 3.0 – v0.4</title>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    
    <!-- Babel für JSX Kompilierung im Browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gea: {
                            50:  '#e0f2f2',
                            100: '#b3e0df',
                            200: '#80cccc',
                            300: '#4db8b7',
                            400: '#26a8a7',
                            500: '#007A7A',
                            600: '#006363',
                            700: '#004c4c',
                            800: '#003535',
                            900: '#001e1e',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        .diagonal-stripes {
            background-image: repeating-linear-gradient(45deg, #f8fafc, #f8fafc 5px, #f1f5f9 5px, #f1f5f9 10px);
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
        }
    </style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

// --- INLINE ICONS ---
const IconUsers = ({ className, size=20 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" /><circle cx="9" cy="7" r="4" /><path d="M22 21v-2a4 4 0 0 0-3-3.87" /><path d="M16 3.13a4 4 0 0 1 0 7.75" /></svg>;
const IconBriefcase = ({ className, size=20 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="20" height="14" x="2" y="7" rx="2" ry="2" /><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16" /></svg>;
const IconCalendar = ({ className, size=20 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>;
const IconBarChart = ({ className, size=20 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="20" x2="12" y2="10"></line><line x1="18" y1="20" x2="18" y2="4"></line><line x1="6" y1="20" x2="6" y2="16"></line></svg>;
const IconSettings = ({ className, size=20 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>;
const IconPlus = ({ className, size=20 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
const IconX = ({ className, size=20 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;
const IconDownload = ({ className, size=20 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>;
const IconUpload = ({ className, size=20 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>;
const IconChevronDown = ({ size=20, className }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="6 9 12 15 18 9"></polyline></svg>;
const IconChevronRight = ({ size=20, className }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="9 18 15 12 9 6"></polyline></svg>;
const IconArrowLeft = ({ size=20, className }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>;
const IconFileText = ({ className, size=20 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>;
const IconList = ({ className, size=20 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>;
const IconCopy = ({ className, size=20 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>;

// --- KONFIGURATION ---
const COST_TYPES = ['Dienstleistung', 'Reisekosten', 'Sonstiges'];
const DEFAULT_HOURLY_RATE = 80;
const HOURS_PER_WEEK = 40;
const WEEKS_IN_YEAR = 52;
const DEFAULT_WEEKS_AHEAD = 12;
const PROJECT_STATUSES = [
    { value: 'planned',         label: 'Fängt noch an',       color: 'bg-blue-100 text-blue-700' },
    { value: 'active',          label: 'Hat angefangen',      color: 'bg-emerald-100 text-emerald-700' },
    { value: 'completed',       label: 'Abgeschlossen',       color: 'bg-slate-200 text-slate-600' },
    { value: 'missing_costs',   label: 'Fehlende Kosten',     color: 'bg-amber-100 text-amber-700' },
    { value: 'costs_submitted', label: 'Kosten übermittelt',  color: 'bg-gea-100 text-gea-700' },
];

// Hilfsfunktion KW
const getWeekString = (date) => {
    const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
    d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay()||7));
    const yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
    const kw = Math.ceil(( ( (d - yearStart) / 86400000) + 1)/7);
    return `${d.getUTCFullYear()}-W${kw.toString().padStart(2, '0')}`;
};

// --- DUMMY DATA GENERATOR ---
const generateInitialData = (empCats) => {
    const emps = Array.from({ length: 5 }, (_, i) => ({
        id: `emp-${i}`,
        name: `Mitarbeiter ${i + 1}`,
        category: empCats[i % empCats.length],
        active: true
    }));

    return { employees: emps, projects: [], assignments: [], expenses: [] };
};

// --- MAIN APP ---
function App() {
    // --- STATE ---
    const [activeTab, setActiveTab] = useState('resource'); 
    
    const [employees, setEmployees] = useState([]);
    const [projects, setProjects] = useState([]);
    const [assignments, setAssignments] = useState([]);
    const [expenses, setExpenses] = useState([]); // legacy, migrated to costItems
    const [costItems, setCostItems] = useState([]);
    
    // Dynamic Categories
    const [empCategories, setEmpCategories] = useState(['CMS', 'AS', 'ME', 'HM', 'Other']);
    const [projCategories, setProjCategories] = useState(['AMS', 'AFS', 'CMS', 'Other']);
    const [basicTasks, setBasicTasks] = useState(['Office', '24/7', 'Ticketing', 'Other']);
    const [offtimeTasks, setOfftimeTasks] = useState(['Vacation', 'Sickness', 'Gleitzeit', 'Other']);

    const [weeks, setWeeks] = useState([]);
    const [selectedProject, setSelectedProject] = useState(null);
    const [timelineStatusFilter, setTimelineStatusFilter] = useState('all');
    const [collapsedCategories, setCollapsedCategories] = useState({});
    const [collapsedProjCategories, setCollapsedProjCategories] = useState({});
    const [collapsedEmpSetup, setCollapsedEmpSetup] = useState({});

    // Ansichten-Steuerung für Projekt-Details
    const [selectedProjectDetails, setSelectedProjectDetails] = useState(null);

    // Zeitspanne für Auslastungs-Berechnung
    const [weeksAhead, setWeeksAhead] = useState(DEFAULT_WEEKS_AHEAD);

    // Modals
    const [isAssignModalOpen, setIsAssignModalOpen] = useState(false);
    const [assignContext, setAssignContext] = useState(null); 
    
    const [isCostItemModalOpen, setIsCostItemModalOpen] = useState(false);
    const [editingCostItem, setEditingCostItem] = useState(null);

    const [isCopyModalOpen, setIsCopyModalOpen] = useState(false);
    const [copyContext, setCopyContext] = useState(null);

    const [isInvoiceModalOpen, setIsInvoiceModalOpen] = useState(false);
    const [invoiceSelection, setInvoiceSelection] = useState({ emps: {}, costs: {} });

    // Forms
    const [empForm, setEmpForm] = useState({ name: '', category: '' });
    const [editingEmpId, setEditingEmpId] = useState(null);
    const [projForm, setProjForm] = useState({ name: '', category: '', projectNumber: '', startWeek: '', ibnWeek: '', color: 'bg-gea-500', hourlyRate: DEFAULT_HOURLY_RATE, billable: true, status: 'active' });
    const [editingProjectId, setEditingProjectId] = useState(null);

    // Category Forms
    const [newEmpCat, setNewEmpCat] = useState('');
    const [newProjCat, setNewProjCat] = useState('');
    const [newBasicTask, setNewBasicTask] = useState('');
    const [newOfftimeTask, setNewOfftimeTask] = useState('');
    const [expandedSetupCats, setExpandedSetupCats] = useState({ basic: true, offtime: false });

    // --- INIT ---
    useEffect(() => {
        const savedData = localStorage.getItem('teamMasterProData');
        let currentEmpCats = ['CMS', 'AS', 'ME', 'HM', 'Other'];
        
        if (savedData) {
            const parsed = JSON.parse(savedData);
            setEmployees(parsed.employees || []);
            setProjects(parsed.projects || []);
            setAssignments(parsed.assignments || []);
            setExpenses(parsed.expenses || []);
            // Load costItems or migrate old expenses
            if (parsed.costItems) {
                setCostItems(parsed.costItems);
            } else if (parsed.expenses && parsed.expenses.length > 0) {
                const migrated = parsed.expenses.map(e => ({
                    id: e.id,
                    projectId: e.projectId,
                    empId: e.empId,
                    type: e.type === 'Travelcosts' || e.type === 'Hotel' ? 'Reisekosten' : (e.type === 'Other' ? 'Sonstiges' : 'Reisekosten'),
                    description: e.type === 'Hotel' ? 'Hotel' : (e.type === 'Travelcosts' ? 'Reise' : e.type),
                    week: null,
                    hours: null,
                    hourlyRate: null,
                    amount: e.amount,
                    travelAmount: e.type === 'Travelcosts' ? e.amount : null,
                    hotelAmount: e.type === 'Hotel' ? e.amount : null,
                }));
                setCostItems(migrated);
            }
            if (parsed.empCategories) { setEmpCategories(parsed.empCategories); currentEmpCats = parsed.empCategories; }
            if (parsed.projCategories) setProjCategories(parsed.projCategories);
            if (parsed.basicTasks) setBasicTasks(parsed.basicTasks);
            if (parsed.offtimeTasks) setOfftimeTasks(parsed.offtimeTasks);
        } else {
            const init = generateInitialData(currentEmpCats);
            setEmployees(init.employees);
            setProjects(init.projects);
            setAssignments(init.assignments);
            setExpenses(init.expenses);
        }

        const MONTH_NAMES = ['Januar', 'Februar', 'März', 'April', 'Mai', 'Juni', 'Juli', 'August', 'September', 'Oktober', 'November', 'Dezember'];
        const w = [];
        const today = new Date();
        for(let i=0; i<WEEKS_IN_YEAR; i++) {
            const d = new Date(today.getFullYear(), today.getMonth(), today.getDate() + (i*7));
            d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay()||7));
            const yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
            const kw = Math.ceil(( ( (d - yearStart) / 86400000) + 1)/7);
            
            w.push({ 
                id: `${d.getFullYear()}-W${kw.toString().padStart(2, '0')}`, 
                label: `KW ${kw}`,
                sub: `${d.getDate()}.${d.getMonth()+1}.`,
                month: `${MONTH_NAMES[d.getMonth()]} ${d.getFullYear()}`
            });
        }
        setWeeks(w);
        
        setEmpForm(prev => ({...prev, category: currentEmpCats[0] || ''}));
        setProjForm(prev => ({...prev, startWeek: w[0].id, ibnWeek: w[10]?.id || w[w.length-1].id}));
    }, []);

    // Save on change
    useEffect(() => {
        if (employees.length > 0) {
            localStorage.setItem('teamMasterProData', JSON.stringify({
                employees, projects, assignments, expenses, costItems,
                empCategories, projCategories, basicTasks, offtimeTasks
            }));
        }
    }, [employees, projects, assignments, expenses, costItems, empCategories, projCategories, basicTasks, offtimeTasks]);

    // Ensure form defaults align with categories
    useEffect(() => {
        if (!empForm.category && empCategories.length > 0) {
            setEmpForm(prev => ({...prev, category: empCategories[0]}));
        }
        if (!projForm.category && projCategories.length > 0) {
            setProjForm(prev => ({...prev, category: projCategories[0]}));
        }
    }, [empCategories, projCategories]);

    // --- LOGIC ---
    const getUtilization = (empId, week) => {
        const weekAss = assignments.filter(a => a.empId === empId && a.week === week);
        let total = 0;
        let isOfftime = false;
        weekAss.forEach(a => {
            total += ((a.hours ?? (a.percent / 100 * HOURS_PER_WEEK)) / HOURS_PER_WEEK) * 100;
            if (a.type === 'offtime') isOfftime = true;
        });
        return { total, isOfftime, assignments: weekAss };
    };

    const toggleCategory = (cat) => {
        setCollapsedCategories(prev => ({...prev, [cat]: !prev[cat]}));
    };

    const toggleProjCategory = (cat) => {
        setCollapsedProjCategories(prev => ({...prev, [cat]: !prev[cat]}));
    };

    const toggleEmpSetup = (cat) => {
        setCollapsedEmpSetup(prev => ({...prev, [cat]: !prev[cat]}));
    };

    const handleSaveAssignment = (data) => {
        if (data.id) {
            setAssignments(assignments.map(a => a.id === data.id ? data : a));
        } else {
            setAssignments([...assignments, { ...data, id: `ass-${Date.now()}` }]);
        }
        setIsAssignModalOpen(false);
    };

    const handleDeleteAssignment = (id) => {
        setAssignments(assignments.filter(a => a.id !== id));
        setIsAssignModalOpen(false);
    };

    const handleDrop = (e, targetWeek, targetEmpIdOrProjId, isResourceView = false) => {
        e.preventDefault();
        const assignmentId = e.dataTransfer.getData('assignmentId');
        if (assignmentId) {
            // Move existing assignment chip
            setAssignments(assignments.map(a =>
                a.id === assignmentId
                    ? { ...a, week: targetWeek, empId: isResourceView ? targetEmpIdOrProjId : a.empId }
                    : a
            ));
            return;
        }
        const empId = e.dataTransfer.getData('empId');
        if (!empId) return;
        const newAss = {
            id: `ass-${Date.now()}`,
            empId: isResourceView ? targetEmpIdOrProjId : empId,
            week: targetWeek,
            type: 'project',
            reference: isResourceView ? '' : targetEmpIdOrProjId,
            hours: HOURS_PER_WEEK
        };
        if (!isResourceView) {
            setAssignments([...assignments, newAss]);
        } else {
            // In resource view: open modal to pick type/reference
            setAssignContext({ empId: targetEmpIdOrProjId, week: targetWeek });
            setIsAssignModalOpen(true);
        }
    };

    const exportData = () => {
        const data = JSON.stringify({ employees, projects, assignments, expenses, costItems, empCategories, projCategories, basicTasks, offtimeTasks }, null, 2);
        const blob = new Blob([data], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `Einsatzplanung3.0_Backup_${new Date().toISOString().split('T')[0]}.json`;
        a.click();
    };

    const importData = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            try {
                const parsed = JSON.parse(event.target.result);
                if (parsed.employees) setEmployees(parsed.employees);
                if (parsed.projects) setProjects(parsed.projects);
                if (parsed.assignments) setAssignments(parsed.assignments);
                if (parsed.expenses) setExpenses(parsed.expenses);
                if (parsed.costItems) {
                    setCostItems(parsed.costItems);
                } else if (parsed.expenses && parsed.expenses.length > 0) {
                    const migrated = parsed.expenses.map(e => ({
                        id: e.id, projectId: e.projectId, empId: e.empId,
                        type: e.type === 'Travelcosts' || e.type === 'Hotel' ? 'Reisekosten' : 'Sonstiges',
                        description: e.type === 'Hotel' ? 'Hotel' : (e.type === 'Travelcosts' ? 'Reise' : e.type),
                        week: null, hours: null, hourlyRate: null, amount: e.amount,
                        travelAmount: e.type === 'Travelcosts' ? e.amount : null,
                        hotelAmount: e.type === 'Hotel' ? e.amount : null,
                    }));
                    setCostItems(migrated);
                }
                if (parsed.empCategories) setEmpCategories(parsed.empCategories);
                if (parsed.projCategories) setProjCategories(parsed.projCategories);
                if (parsed.basicTasks) setBasicTasks(parsed.basicTasks);
                if (parsed.offtimeTasks) setOfftimeTasks(parsed.offtimeTasks);
            } catch (err) {
                alert('Fehler beim Importieren der Daten: Die Datei konnte nicht gelesen werden.');
            }
        };
        reader.readAsText(file);
    };

    const openInvoiceModal = () => {
        const projAssignments = assignments.filter(a => a.reference === selectedProjectDetails);
        const empIds = [...new Set(projAssignments.map(a => a.empId))];
        const projCosts = costItems.filter(c => c.projectId === selectedProjectDetails);

        const initialEmps = {};
        empIds.forEach(id => initialEmps[id] = true);

        const initialCosts = {};
        projCosts.forEach(c => initialCosts[c.id] = true);

        setInvoiceSelection({ emps: initialEmps, costs: initialCosts });
        setIsInvoiceModalOpen(true);
    };

    const handleInvoiceExport = () => {
        const proj = projects.find(p => p.id === selectedProjectDetails);
        const rows = [];

        rows.push(["Rechnung für Projekt:", proj.name]);
        rows.push(["Projektnummer:", proj.projectNumber || '']);
        rows.push(["Datum:", new Date().toLocaleDateString('de-DE')]);
        rows.push([]);
        rows.push(["Position", "Mitarbeiter", "Details", "Menge", "Einzelpreis", "Gesamt"]);

        let total = 0;

        Object.keys(invoiceSelection.emps).forEach(empId => {
            if (invoiceSelection.emps[empId]) {
                const emp = employees.find(e => e.id === empId);
                const empAss = assignments.filter(a => a.reference === proj.id && a.empId === empId);
                const hours = empAss.reduce((acc, a) => acc + (a.hours ?? (a.percent / 100 * HOURS_PER_WEEK)), 0);
                if (hours > 0 && proj.billable !== false) {
                    const rate = proj.hourlyRate ?? DEFAULT_HOURLY_RATE;
                    const cost = hours * rate;
                    total += cost;
                    rows.push(["Dienstleistung", emp?.name || 'Unbekannt', "Arbeitszeit", `${hours} Std.`, `${rate} EUR`, `${cost.toFixed(2)} EUR`]);
                }
            }
        });

        const projCosts = costItems.filter(c => c.projectId === proj.id);
        projCosts.forEach(ci => {
            if (invoiceSelection.costs[ci.id]) {
                const emp = employees.find(e => e.id === ci.empId);
                total += ci.amount || 0;
                rows.push([ci.type, emp?.name || 'Unbekannt', ci.description || '', "1", `${(ci.amount || 0).toFixed(2)} EUR`, `${(ci.amount || 0).toFixed(2)} EUR`]);
            }
        });

        rows.push([]);
        rows.push(["", "", "", "", "Gesamt Netto:", `${total.toFixed(2)} EUR`]);

        const csvContent = "\uFEFF" + rows.map(e => e.join(";")).join("\n");
        const encodedUri = encodeURI("data:text/csv;charset=utf-8," + csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", `Rechnung_${proj.name.replace(/\s+/g, '_')}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);

        setIsInvoiceModalOpen(false);
    };

    // --- SUB-COMPONENTS ---
    const ModalHeader = ({ title, subtitle, onClose }) => (
        <div className="p-4 border-b border-slate-300 flex justify-between items-center bg-slate-50">
            <div>
                <h3 className="text-slate-900 text-lg font-medium">{title}</h3>
                {subtitle && <p className="text-sm text-slate-500">{subtitle}</p>}
            </div>
            <button onClick={onClose} className="text-slate-400 hover:text-slate-600"><IconX size={20}/></button>
        </div>
    );

    const StatusBadge = ({ status }) => {
        const s = PROJECT_STATUSES.find(x => x.value === status) || PROJECT_STATUSES[0];
        return <span className={`text-xs px-2 py-0.5 rounded-full font-medium ${s.color}`}>{s.label}</span>;
    };

    const AssignmentModal = () => {
        if (!isAssignModalOpen || !assignContext) return null;

        const [formData, setFormData] = useState(assignContext.existing || {
            empId: assignContext.empId,
            week: assignContext.week,
            type: 'basic',
            reference: basicTasks[0] || '',
            hours: HOURS_PER_WEEK
        });
        const [newTaskName, setNewTaskName] = useState('');

        const emp = employees.find(e => e.id === formData.empId);
        const pct = Math.round((formData.hours ?? HOURS_PER_WEEK) / HOURS_PER_WEEK * 100);

        const handleTypeChange = (type) => {
            let ref = '';
            if (type === 'project') ref = projects[0]?.id || '';
            else if (type === 'basic') ref = basicTasks[0] || '';
            else if (type === 'offtime') ref = offtimeTasks[0] || '';
            setFormData({...formData, type, reference: ref});
            setNewTaskName('');
        };

        const handleSave = () => {
            let data = { ...formData };
            if (formData.type === 'new') {
                const trimmed = newTaskName.trim();
                if (!trimmed) return;
                if (!basicTasks.includes(trimmed)) {
                    setBasicTasks(prev => [...prev, trimmed]);
                }
                data = { ...formData, type: 'basic', reference: trimmed };
            }
            handleSaveAssignment(data);
        };

        return (
            <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                <div className="bg-white rounded-xl shadow-xl w-full max-w-md overflow-hidden">
                    <ModalHeader title={formData.id ? 'Planung bearbeiten' : 'Planung hinzufügen'} onClose={() => setIsAssignModalOpen(false)} />
                    <div className="p-6 space-y-4">
                        <div className="text-sm text-slate-500">
                            <span className="text-slate-900 font-medium">{emp?.name}</span>
                            <span className="mx-2">·</span>
                            <span className="font-medium text-slate-700">{formData.week}</span>
                        </div>

                        <div>
                            <label className="block text-xs text-slate-500 mb-1 font-medium uppercase tracking-wide">Typ</label>
                            <div className="grid grid-cols-4 gap-1">
                                {[
                                    { value: 'basic', label: 'Basic Task' },
                                    { value: 'project', label: 'Projekt' },
                                    { value: 'offtime', label: 'Offtime' },
                                    { value: 'new', label: '+ Neu' },
                                ].map(opt => (
                                    <button key={opt.value} onClick={() => handleTypeChange(opt.value)}
                                        className={`py-2 px-1 text-xs rounded-md border font-medium transition-colors ${formData.type === opt.value ? 'bg-gea-600 text-white border-gea-600' : 'bg-white text-slate-600 border-slate-300 hover:border-gea-400'}`}>
                                        {opt.label}
                                    </button>
                                ))}
                            </div>
                        </div>

                        {formData.type === 'new' && (
                            <div>
                                <label className="block text-xs text-slate-500 mb-1 font-medium">Neuer Task-Name</label>
                                <input type="text" value={newTaskName} onChange={e => setNewTaskName(e.target.value)}
                                    autoFocus
                                    placeholder="z.B. Meeting, Workshop, …"
                                    className="w-full p-2 border border-slate-300 rounded-md text-sm"/>
                                <p className="text-xs text-slate-400 mt-1">Wird als Basic Task gespeichert und zur Liste hinzugefügt.</p>
                            </div>
                        )}

                        {formData.type !== 'new' && (
                            <div>
                                <label className="block text-xs text-slate-500 mb-1 font-medium uppercase tracking-wide">Auswahl</label>
                                {formData.type === 'project' && (
                                    <select value={formData.reference} onChange={e => setFormData({...formData, reference: e.target.value})} className="w-full p-2 border border-slate-300 rounded-md text-sm">
                                        {projects.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
                                    </select>
                                )}
                                {formData.type === 'basic' && (
                                    <select value={formData.reference} onChange={e => setFormData({...formData, reference: e.target.value})} className="w-full p-2 border border-slate-300 rounded-md text-sm">
                                        {basicTasks.map(t => <option key={t} value={t}>{t}</option>)}
                                    </select>
                                )}
                                {formData.type === 'offtime' && (
                                    <select value={formData.reference} onChange={e => setFormData({...formData, reference: e.target.value})} className="w-full p-2 border border-slate-300 rounded-md text-sm">
                                        {offtimeTasks.map(t => <option key={t} value={t}>{t}</option>)}
                                    </select>
                                )}
                            </div>
                        )}

                        <div>
                            <label className="block text-xs text-slate-500 mb-2 font-medium uppercase tracking-wide">
                                Auslastung: <span className="text-gea-600 font-medium">{pct}%</span>
                                <span className="text-slate-400 ml-2">({formData.hours ?? HOURS_PER_WEEK}h)</span>
                            </label>
                            <input type="range" min="0" max="200" step="5"
                                value={pct}
                                onChange={e => setFormData({...formData, hours: Math.round(parseInt(e.target.value) / 100 * HOURS_PER_WEEK)})}
                                className="w-full accent-gea-600"/>
                            <div className="flex justify-between text-xs text-slate-400 mt-1">
                                <span>0%</span><span>50%</span><span>100%</span><span>150%</span><span>200%</span>
                            </div>
                        </div>
                    </div>
                    <div className="p-4 bg-slate-50 border-t border-slate-100 flex justify-between">
                        {formData.id ? (
                            <button onClick={() => handleDeleteAssignment(formData.id)} className="text-rose-600 text-sm hover:bg-rose-50 px-3 py-2 rounded font-medium">Löschen</button>
                        ) : <div/>}
                        <div className="flex gap-2">
                            <button onClick={() => setIsAssignModalOpen(false)} className="px-4 py-2 text-sm text-slate-600 bg-white border border-slate-300 rounded-md hover:bg-slate-50 font-medium">Abbrechen</button>
                            <button onClick={handleSave} className="px-4 py-2 text-sm text-white bg-gea-600 rounded-md hover:bg-gea-700 font-medium">Speichern</button>
                        </div>
                    </div>
                </div>
            </div>
        );
    };

    const CopyModal = () => {
        if (!isCopyModalOpen || !copyContext) return null;
        const { assignment } = copyContext;

        const activeEmps = employees.filter(e => e.active);
        const [selWeeks, setSelWeeks] = useState({});
        const [selEmps, setSelEmps] = useState({});

        const toggleWeek = (wId) => setSelWeeks(prev => ({...prev, [wId]: !prev[wId]}));
        const toggleEmp = (eId) => setSelEmps(prev => ({...prev, [eId]: !prev[eId]}));
        const toggleAllWeeks = () => {
            const allSelected = weeks.every(w => selWeeks[w.id]);
            const next = {};
            weeks.forEach(w => { next[w.id] = !allSelected; });
            setSelWeeks(next);
        };

        let label = assignment.reference;
        if (assignment.type === 'project') {
            const p = projects.find(p => p.id === assignment.reference);
            label = p ? p.name : assignment.reference;
        }

        const handleCopy = () => {
            const targetWeeks = weeks.filter(w => selWeeks[w.id]).map(w => w.id);
            const targetEmps = activeEmps.filter(e => selEmps[e.id]).map(e => e.id);
            if (targetWeeks.length === 0 || targetEmps.length === 0) return;
            const newAssignments = [];
            targetEmps.forEach(empId => {
                targetWeeks.forEach(week => {
                    // Skip if identical to source
                    if (empId === assignment.empId && week === assignment.week) return;
                    // Skip if already exists
                    const exists = assignments.some(a => a.empId === empId && a.week === week && a.reference === assignment.reference && a.type === assignment.type);
                    if (!exists) {
                        newAssignments.push({ ...assignment, id: `ass-${Date.now()}-${empId}-${week}`, empId, week });
                    }
                });
            });
            setAssignments(prev => [...prev, ...newAssignments]);
            setIsCopyModalOpen(false);
            setCopyContext(null);
        };

        const pct = Math.round((assignment.hours ?? HOURS_PER_WEEK) / HOURS_PER_WEEK * 100);

        return (
            <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                <div className="bg-white rounded-xl shadow-xl w-full max-w-2xl max-h-[90vh] flex flex-col overflow-hidden">
                    <ModalHeader title="Task kopieren" subtitle={`"${label}" · ${pct}%`} onClose={() => { setIsCopyModalOpen(false); setCopyContext(null); }}/>
                    <div className="flex-1 overflow-y-auto p-6 space-y-6">

                        {/* Employee selection */}
                        <div>
                            <h4 className="text-sm font-medium text-slate-700 mb-3">Mitarbeiter auswählen</h4>
                            <div className="flex flex-wrap gap-2">
                                {activeEmps.map(e => (
                                    <button key={e.id} onClick={() => toggleEmp(e.id)}
                                        className={`px-3 py-1.5 rounded-full text-sm border font-medium transition-colors ${selEmps[e.id] ? 'bg-gea-600 text-white border-gea-600' : 'bg-white text-slate-600 border-slate-300 hover:border-gea-400'}`}>
                                        {e.name}
                                    </button>
                                ))}
                            </div>
                        </div>

                        {/* Week selection */}
                        <div>
                            <div className="flex justify-between items-center mb-3">
                                <h4 className="text-sm font-medium text-slate-700">Wochen auswählen</h4>
                                <button onClick={toggleAllWeeks} className="text-xs text-gea-600 hover:text-gea-700 font-medium">
                                    Alle {weeks.every(w => selWeeks[w.id]) ? 'abwählen' : 'auswählen'}
                                </button>
                            </div>
                            <div className="flex flex-wrap gap-1.5 max-h-48 overflow-y-auto">
                                {weeks.map(w => {
                                    const isSource = w.id === assignment.week;
                                    return (
                                        <button key={w.id} onClick={() => !isSource && toggleWeek(w.id)} disabled={isSource}
                                            className={`px-2.5 py-1 rounded text-xs border font-medium transition-colors ${isSource ? 'bg-slate-100 text-slate-400 border-slate-200 cursor-default' : selWeeks[w.id] ? 'bg-gea-600 text-white border-gea-600' : 'bg-white text-slate-600 border-slate-200 hover:border-gea-300'}`}>
                                            {w.label}
                                        </button>
                                    );
                                })}
                            </div>
                        </div>
                    </div>
                    <div className="p-4 bg-slate-50 border-t border-slate-100 flex justify-between items-center">
                        <span className="text-xs text-slate-400">
                            {Object.values(selEmps).filter(Boolean).length} MA × {Object.values(selWeeks).filter(Boolean).length} KW = {Object.values(selEmps).filter(Boolean).length * Object.values(selWeeks).filter(Boolean).length} Einträge
                        </span>
                        <div className="flex gap-2">
                            <button onClick={() => { setIsCopyModalOpen(false); setCopyContext(null); }} className="px-4 py-2 text-sm text-slate-600 bg-white border border-slate-300 rounded-md hover:bg-slate-50 font-medium">Abbrechen</button>
                            <button onClick={handleCopy} className="px-4 py-2 text-sm text-white bg-gea-600 rounded-md hover:bg-gea-700 font-medium flex items-center gap-2">
                                <IconCopy size={15}/> Kopieren
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        );
    };

    const CostItemModal = ({ projectId, existingItem, onClose }) => {
        const projAssignments = assignments.filter(a => a.reference === projectId);
        const empIds = [...new Set(projAssignments.map(a => a.empId))];
        const projEmployees = employees.filter(e => empIds.includes(e.id));

        const [form, setForm] = useState(existingItem ? { ...existingItem } : {
            empId: projEmployees[0]?.id || '',
            type: COST_TYPES[0],
            description: '',
            week: '',
            hours: '',
            hourlyRate: '',
            amount: '',
            travelAmount: '',
            hotelAmount: '',
        });

        const autoAmount = (form.hours !== '' && form.hourlyRate !== '')
            ? (parseFloat(form.hours) || 0) * (parseFloat(form.hourlyRate) || 0)
            : null;

        const handleSave = () => {
            if (!form.empId) return;
            const computedAmount = autoAmount !== null ? autoAmount : parseFloat(form.amount) || 0;
            const item = {
                id: existingItem?.id || `ci-${Date.now()}`,
                projectId,
                empId: form.empId,
                type: form.type,
                description: form.description,
                week: form.week || null,
                hours: form.hours !== '' ? parseFloat(form.hours) : null,
                hourlyRate: form.hourlyRate !== '' ? parseFloat(form.hourlyRate) : null,
                amount: computedAmount,
                travelAmount: form.type === 'Reisekosten' && form.travelAmount !== '' ? parseFloat(form.travelAmount) : null,
                hotelAmount: form.type === 'Reisekosten' && form.hotelAmount !== '' ? parseFloat(form.hotelAmount) : null,
            };
            if (existingItem) {
                setCostItems(costItems.map(c => c.id === existingItem.id ? item : c));
            } else {
                setCostItems([...costItems, item]);
            }
            onClose();
        };

        const handleDelete = () => {
            setCostItems(costItems.filter(c => c.id !== existingItem.id));
            onClose();
        };

        return (
            <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                <div className="bg-white rounded-xl shadow-xl w-full max-w-lg overflow-hidden">
                    <ModalHeader
                        title={existingItem ? 'Kostenpunkt bearbeiten' : 'Kostenpunkt erfassen'}
                        onClose={onClose}
                    />
                    <div className="p-6 space-y-4 overflow-y-auto max-h-[75vh]">
                        <div className="grid grid-cols-2 gap-4">
                            <div>
                                <label className="block text-xs text-slate-500 mb-1 font-medium">Mitarbeiter</label>
                                <select value={form.empId} onChange={e => setForm({...form, empId: e.target.value})}
                                    className="w-full p-2 border border-slate-300 rounded-md text-sm">
                                    <option value="">Bitte wählen…</option>
                                    {projEmployees.map(e => <option key={e.id} value={e.id}>{e.name}</option>)}
                                    {employees.filter(e => !empIds.includes(e.id)).map(e =>
                                        <option key={e.id} value={e.id}>{e.name} (nicht verplant)</option>
                                    )}
                                </select>
                            </div>
                            <div>
                                <label className="block text-xs text-slate-500 mb-1 font-medium">Kostenart</label>
                                <select value={form.type} onChange={e => setForm({...form, type: e.target.value})}
                                    className="w-full p-2 border border-slate-300 rounded-md text-sm">
                                    {COST_TYPES.map(t => <option key={t} value={t}>{t}</option>)}
                                </select>
                            </div>
                        </div>

                        <div>
                            <label className="block text-xs text-slate-500 mb-1 font-medium">Beschreibung</label>
                            <input type="text" value={form.description}
                                onChange={e => setForm({...form, description: e.target.value})}
                                placeholder="z.B. Vor-Ort-Einsatz KW 15"
                                className="w-full p-2 border border-slate-300 rounded-md text-sm"/>
                        </div>

                        <div className="grid grid-cols-3 gap-4">
                            <div>
                                <label className="block text-xs text-slate-500 mb-1 font-medium">KW (optional)</label>
                                <input type="week" value={form.week || ''}
                                    onChange={e => setForm({...form, week: e.target.value})}
                                    className="w-full p-2 border border-slate-300 rounded-md text-sm"/>
                            </div>
                            <div>
                                <label className="block text-xs text-slate-500 mb-1 font-medium">Stunden (optional)</label>
                                <input type="number" min="0" step="0.5" value={form.hours}
                                    onChange={e => setForm({...form, hours: e.target.value})}
                                    className="w-full p-2 border border-slate-300 rounded-md text-sm"
                                    placeholder="z.B. 8"/>
                            </div>
                            <div>
                                <label className="block text-xs text-slate-500 mb-1 font-medium">€/Std. (optional)</label>
                                <input type="number" min="0" step="1" value={form.hourlyRate}
                                    onChange={e => setForm({...form, hourlyRate: e.target.value})}
                                    className="w-full p-2 border border-slate-300 rounded-md text-sm"
                                    placeholder={`${DEFAULT_HOURLY_RATE}`}/>
                            </div>
                        </div>

                        <div>
                            <label className="block text-xs text-slate-500 mb-1 font-medium">
                                Betrag (€)
                                {autoAmount !== null && <span className="ml-2 text-gea-600 font-medium">→ Auto: {autoAmount.toFixed(2)} €</span>}
                            </label>
                            <input type="number" min="0" step="0.01"
                                value={autoAmount !== null ? autoAmount.toFixed(2) : form.amount}
                                onChange={e => setForm({...form, amount: e.target.value})}
                                disabled={autoAmount !== null}
                                className={`w-full p-2 border border-slate-300 rounded-md text-sm ${autoAmount !== null ? 'bg-slate-50 text-slate-400' : ''}`}
                                placeholder="0.00"/>
                        </div>

                        {form.type === 'Reisekosten' && (
                            <div className="border border-slate-200 rounded-lg p-4 bg-slate-50 space-y-3">
                                <p className="text-xs text-slate-500 font-medium">Reisekosten aufsplitten (optional)</p>
                                <div className="grid grid-cols-2 gap-4">
                                    <div>
                                        <label className="block text-xs text-slate-500 mb-1">Fahrtkosten (€)</label>
                                        <input type="number" min="0" step="0.01" value={form.travelAmount}
                                            onChange={e => setForm({...form, travelAmount: e.target.value})}
                                            className="w-full p-2 border border-slate-300 rounded-md text-sm bg-white"
                                            placeholder="0.00"/>
                                    </div>
                                    <div>
                                        <label className="block text-xs text-slate-500 mb-1">Hotel (€)</label>
                                        <input type="number" min="0" step="0.01" value={form.hotelAmount}
                                            onChange={e => setForm({...form, hotelAmount: e.target.value})}
                                            className="w-full p-2 border border-slate-300 rounded-md text-sm bg-white"
                                            placeholder="0.00"/>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                    <div className="p-4 bg-slate-50 border-t border-slate-100 flex justify-between">
                        {existingItem ? (
                            <button onClick={handleDelete} className="text-rose-600 text-sm hover:bg-rose-50 px-3 py-2 rounded font-medium">Löschen</button>
                        ) : <div/>}
                        <div className="flex gap-2">
                            <button onClick={onClose} className="px-4 py-2 text-sm text-slate-600 bg-white border border-slate-300 rounded-md hover:bg-slate-50 font-medium">Abbrechen</button>
                            <button onClick={handleSave} className="px-4 py-2 text-sm text-white bg-gea-600 rounded-md hover:bg-gea-700 font-medium">Speichern</button>
                        </div>
                    </div>
                </div>
            </div>
        );
    };

    const InvoiceModal = () => {
        if (!isInvoiceModalOpen || !selectedProjectDetails) return null;

        const proj = projects.find(p => p.id === selectedProjectDetails);
        const projAssignments = assignments.filter(a => a.reference === selectedProjectDetails);
        const empIds = [...new Set(projAssignments.map(a => a.empId))];
        const projCosts = costItems.filter(c => c.projectId === selectedProjectDetails);

        let currentTotal = 0;

        return (
            <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                <div className="bg-white rounded-xl shadow-xl w-full max-w-2xl max-h-[90vh] flex flex-col overflow-hidden">
                    <ModalHeader title="Rechnung konfigurieren" subtitle={`Projekt: ${proj.name}`} onClose={() => setIsInvoiceModalOpen(false)} />

                    <div className="flex-1 overflow-y-auto p-6 space-y-6">
                        {proj.billable !== false && (
                            <div>
                                <h4 className="text-slate-700 text-base mb-3 border-b border-slate-300 pb-2 font-medium">Dienstleistungen (Arbeitszeit)</h4>
                                <div className="space-y-2">
                                    {empIds.map(empId => {
                                        const emp = employees.find(e => e.id === empId);
                                        const empAss = projAssignments.filter(a => a.empId === empId);
                                        const hours = empAss.reduce((acc, a) => acc + (a.hours ?? (a.percent / 100 * HOURS_PER_WEEK)), 0);
                                        if (hours === 0) return null;
                                        const rate = proj.hourlyRate ?? DEFAULT_HOURLY_RATE;
                                        const cost = hours * rate;
                                        if (invoiceSelection.emps[empId]) currentTotal += cost;
                                        return (
                                            <label key={empId} className="flex items-center gap-3 p-3 border border-slate-200 rounded-lg hover:bg-slate-50 cursor-pointer transition-colors">
                                                <input type="checkbox" checked={!!invoiceSelection.emps[empId]}
                                                    onChange={e => setInvoiceSelection({...invoiceSelection, emps: {...invoiceSelection.emps, [empId]: e.target.checked}})}
                                                    className="w-5 h-5 text-gea-600 rounded"/>
                                                <div className="flex-1 text-sm text-slate-800 font-medium">{emp?.name || 'Unbekannt'}</div>
                                                <div className="text-sm text-slate-500">{hours} Std. × {rate} €/h</div>
                                                <div className="text-sm text-slate-900 w-24 text-right font-medium">{cost.toFixed(2)} €</div>
                                            </label>
                                        );
                                    })}
                                    {empIds.length === 0 && <p className="text-sm text-slate-400">Keine Arbeitszeiten verplant.</p>}
                                </div>
                            </div>
                        )}

                        <div>
                            <h4 className="text-slate-700 text-base mb-3 border-b border-slate-300 pb-2 font-medium">Kostenpunkte</h4>
                            <div className="space-y-2">
                                {projCosts.map(ci => {
                                    const emp = employees.find(e => e.id === ci.empId);
                                    if (invoiceSelection.costs[ci.id]) currentTotal += ci.amount || 0;
                                    return (
                                        <label key={ci.id} className="flex items-center gap-3 p-3 border border-slate-200 rounded-lg hover:bg-slate-50 cursor-pointer transition-colors">
                                            <input type="checkbox" checked={!!invoiceSelection.costs[ci.id]}
                                                onChange={e => setInvoiceSelection({...invoiceSelection, costs: {...invoiceSelection.costs, [ci.id]: e.target.checked}})}
                                                className="w-5 h-5 text-gea-600 rounded"/>
                                            <div className="flex-1 text-sm">
                                                <span className="text-slate-800 font-medium">{ci.type}</span>
                                                {ci.description && <span className="text-slate-500 ml-2">{ci.description}</span>}

                                <IconFileText size={16}/> CSV Export
                            </button>
                        </div>
                    </div>
                </div>
            </div>

    };

                <button onClick={() => { setActiveTab('utilization'); setSelectedProjectDetails(null); }} className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm transition-colors font-medium border-l-2 ${activeTab === 'utilization' ? 'bg-gea-600 text-white border-gea-300' : 'text-slate-400 hover:bg-slate-800 hover:text-white border-transparent'}`}><IconBarChart size={18}/> Auslastung</button>

                <button onClick={() => { setActiveTab('setup_emp'); setSelectedProjectDetails(null); }} className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm transition-colors font-medium border-l-2 ${activeTab === 'setup_emp' ? 'bg-gea-600 text-white border-gea-300' : 'text-slate-400 hover:bg-slate-800 hover:text-white border-transparent'}`}>Mitarbeiter</button>
                <button onClick={() => { setActiveTab('setup_proj'); setSelectedProjectDetails(null); }} className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm transition-colors font-medium border-l-2 ${activeTab === 'setup_proj' ? 'bg-gea-600 text-white border-gea-300' : 'text-slate-400 hover:bg-slate-800 hover:text-white border-transparent'}`}>Projekte</button>
                <button onClick={() => { setActiveTab('setup_cats'); setSelectedProjectDetails(null); }} className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm transition-colors font-medium border-l-2 ${activeTab === 'setup_cats' ? 'bg-gea-600 text-white border-gea-300' : 'text-slate-400 hover:bg-slate-800 hover:text-white border-transparent'}`}><IconList size={18}/> Kategorien</button>
                <button onClick={() => { setActiveTab('data'); setSelectedProjectDetails(null); }} className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm transition-colors font-medium border-l-2 ${activeTab === 'data' ? 'bg-gea-600 text-white border-gea-300' : 'text-slate-400 hover:bg-slate-800 hover:text-white border-transparent'}`}><IconSettings size={18}/> System & Export</button>
            </nav>
        </aside>
    );

    const renderResourceView = () => {
        const activeCategories = [...new Set(employees.filter(e => e.active).map(e => e.category))];

        return (
            <div className="flex-1 flex flex-col h-full bg-white overflow-hidden">
                <div className="p-4 border-b border-slate-200 bg-slate-50">
                    <h2 className="text-slate-900 text-xl font-medium">Ressourcenplaner</h2>
                </div>
                <div className="flex-1 overflow-auto relative">
                    <table className="w-full border-collapse text-sm text-left">
                        <thead className="sticky top-0 bg-white z-20 shadow-sm">
                            <tr>
                                <th className="p-4 border-b border-r border-slate-200 w-72 bg-slate-50 sticky left-0 z-30 text-slate-500 uppercase tracking-wider text-xs font-medium">Mitarbeiter</th>
                                {weeks.map(w => <th key={w.id} className="p-3 border-b border-r border-slate-200 min-w-[140px] text-center text-slate-600 bg-slate-50 font-medium">{w.label}</th>)}
                            </tr>
                        </thead>
                        <tbody>
                            {activeCategories.map(category => {
                                const isCollapsed = collapsedCategories[category];
                                const catEmps = employees.filter(e => e.active && e.category === category);
                                
                                return (
                                    <React.Fragment key={category}>
                                        <tr className="bg-slate-50/80 border-b border-slate-200 cursor-pointer hover:bg-slate-100 transition-colors group" onClick={() => toggleCategory(category)}>
                                            <td className="p-3 text-slate-700 sticky left-0 z-10 bg-inherit border-r border-slate-200 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.05)]">
                                                <div className="flex items-center gap-2 text-sm uppercase tracking-wider font-medium">
                                                    <span className="text-slate-400 group-hover:text-gea-500 transition-colors">
                                                        {isCollapsed ? <IconChevronRight size={16}/> : <IconChevronDown size={16}/>}
                                                    </span>
                                                    {category}
                                                    <span className="ml-auto text-xs bg-white px-2 py-0.5 rounded-full border border-slate-200 text-slate-500 font-medium">
                                                        {catEmps.length}
                                                    </span>
                                                </div>
                                            </td>
                                            {weeks.map(w => <td key={`header-${w.id}`} className="border-r border-slate-300 bg-slate-50/40"></td>)}
                                        </tr>
                                        
                                        {!isCollapsed && catEmps.map(emp => (
                                            <tr key={emp.id} className="hover:bg-slate-50/50 transition-colors">
                                                <td className="p-3 border-b border-r border-slate-200 bg-white sticky left-0 z-10 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.02)]">
                                                    <div className="flex items-center gap-3">
                                                        <div className="w-8 h-8 rounded-full bg-slate-100 text-slate-600 flex items-center justify-center text-xs border border-slate-200 shadow-sm font-medium">
                                                            {emp.name.charAt(0)}
                                                        </div>
                                                        <div className="text-slate-800 font-medium">{emp.name}</div>
                                                    </div>
                                                </td>
                                                {weeks.map(w => {
                                                    const { total, isOfftime, assignments: wAss } = getUtilization(emp.id, w.id);
                                                    const isOverbooked = total > 100;
                                                    return (
                                                        <td key={w.id}
                                                            className={`p-1.5 border-b border-r border-slate-300 relative cursor-pointer group/cell hover:bg-gea-50/30 transition-colors ${isOfftime ? 'bg-slate-50 diagonal-stripes' : ''}`}
                                                            onClick={() => { setAssignContext({ empId: emp.id, week: w.id }); setIsAssignModalOpen(true); }}
                                                            onDragOver={e => e.preventDefault()}
                                                            onDrop={e => handleDrop(e, w.id, emp.id, true)}>

                                                            {wAss.length === 0 && !isOfftime && (
                                                                <div className="absolute inset-0 flex items-center justify-center opacity-0 group-hover/cell:opacity-100 text-gea-300 transition-opacity">
                                                                    <IconPlus size={20}/>
                                                                </div>
                                                            )}

                                                            <div className="flex flex-col gap-1.5 min-h-[44px] relative z-10">
                                                                {wAss.map(a => {
                                                                    let label = a.reference;
                                                                    let color = 'bg-white border-slate-200 text-slate-700';
                                                                    let dotColor = 'bg-slate-400';

                                                                    if (a.type === 'project') {
                                                                        const p = projects.find(p => p.id === a.reference);
                                                                        label = p ? p.name : 'Unbekannt';
                                                                        if (p) { color = 'bg-white border-slate-200 text-slate-800'; dotColor = p.color; }
                                                                    } else if (a.type === 'offtime') {
                                                                        color = 'bg-slate-100 border-slate-300 text-slate-600';
                                                                        dotColor = 'bg-slate-500';
                                                                    }
                                                                    const pct = Math.round((a.hours ?? (a.percent ?? 100) / 100 * HOURS_PER_WEEK) / HOURS_PER_WEEK * 100);

                                                                    return (
                                                                        <div key={a.id}
                                                                            draggable
                                                                            onDragStart={e => { e.stopPropagation(); e.dataTransfer.setData('assignmentId', a.id); }}
                                                                            onClick={e => { e.stopPropagation(); setAssignContext({ empId: emp.id, week: w.id, existing: a }); setIsAssignModalOpen(true); }}
                                                                            className={`text-[11px] px-2 py-1.5 rounded-md border flex justify-between items-center shadow-sm hover:shadow hover:-translate-y-0.5 transition-all group/chip cursor-grab active:cursor-grabbing ${color}`}>
                                                                            <div className="flex items-center gap-1.5 min-w-0">
                                                                                <div className={`w-2 h-2 rounded-full flex-shrink-0 ${dotColor}`}></div>
                                                                                <span className="truncate font-medium">{label}</span>
                                                                            </div>
                                                                            <div className="flex items-center gap-1 ml-1 flex-shrink-0">
                                                                                <span className="opacity-70 bg-slate-100/50 px-1 rounded font-medium">{pct}%</span>
                                                                                <button
                                                                                    onClick={e => { e.stopPropagation(); setCopyContext({ assignment: a }); setIsCopyModalOpen(true); }}
                                                                                    className="opacity-0 group-hover/chip:opacity-100 text-slate-400 hover:text-gea-600 transition-opacity p-0.5 rounded"
                                                                                    title="Kopieren">
                                                                                    <IconCopy size={10}/>
                                                                                </button>
                                                                            </div>
                                                                        </div>
                                                                    );
                                                                })}

                                                                {wAss.length > 0 && !isOfftime && (
                                                                    <div
                                                                        onClick={e => { e.stopPropagation(); setAssignContext({ empId: emp.id, week: w.id }); setIsAssignModalOpen(true); }}
                                                                        className="opacity-0 group-hover/cell:opacity-100 text-[10px] px-2 py-1.5 rounded-md border border-dashed border-gea-300 text-gea-600 flex justify-center items-center shadow-sm hover:bg-gea-50 transition-all mt-0.5">
                                                                        <IconPlus size={12} className="mr-1"/> weitere
                                                                    </div>
                                                                )}
                                                            </div>
                                                            {isOverbooked && <div className="absolute top-1 right-1 w-2 h-2 bg-rose-500 rounded-full animate-pulse shadow-[0_0_4px_rgba(244,63,94,0.5)] z-20"></div>}
                                                        </td>
                                                    );
                                                })}
                                            </tr>
                                        ))}
                                    </React.Fragment>
                                );
                            })}
                        </tbody>
                    </table>
                </div>
            </div>
        );
    };

    const renderProjectTimeline = () => {
        const activeProjCategories = [...new Set(projects.map(p => p.category))];
        const activeEmpCategories = [...new Set(employees.filter(e => e.active).map(e => e.category))];

        return (
            <div className="flex-1 flex h-full overflow-hidden bg-white">
                <div className="w-72 border-r border-slate-200 flex flex-col bg-slate-50 shrink-0">
                    <div className="p-4 border-b border-slate-200 bg-white">
                        <h3 className="text-slate-900 text-lg font-medium">Mitarbeiter (Drag)</h3>
                        <p className="text-xs text-slate-500 mt-1">Zieh Mitarbeiter in den Kalender</p>
                    </div>
                    <div className="flex-1 overflow-auto">
                        {activeEmpCategories.map(category => {
                            const isCollapsed = collapsedCategories[category];
                            const catEmps = employees.filter(e => e.active && e.category === category);
                            
                            return (
                                <div key={category} className="border-b border-slate-200 bg-slate-50/80">
                                    <div 
                                        onClick={() => toggleCategory(category)}
                                        className="p-3 flex items-center justify-between cursor-pointer hover:bg-slate-100 transition-colors group"
                                    >
                                        <div className="flex items-center gap-2 text-sm uppercase tracking-wider font-medium text-slate-700">
                                            <span className="text-slate-400 group-hover:text-gea-500 transition-colors">
                                                {isCollapsed ? <IconChevronRight size={16}/> : <IconChevronDown size={16}/>}
                                            </span>
                                            {category}
                                        </div>
                                        <span className="text-xs bg-white px-2 py-0.5 rounded-full border border-slate-200 text-slate-500 font-medium shadow-[2px_0_5px_-2px_rgba(0,0,0,0.05)]">
                                            {catEmps.length}
                                        </span>
                                    </div>
                                    
                                    {!isCollapsed && (
                                        <div className="p-3 pt-0 space-y-2 bg-slate-50">
                                            {catEmps.map(emp => (
                                                <div 
                                                    key={emp.id} 
                                                    draggable
                                                    onDragStart={(e) => e.dataTransfer.setData('empId', emp.id)}
                                                    className="p-2.5 bg-white border border-slate-200 rounded-lg shadow-sm cursor-grab active:cursor-grabbing hover:border-gea-300 transition-colors flex items-center gap-3"
                                                >
                                                    <div className="w-7 h-7 rounded-full bg-slate-100 text-slate-600 flex items-center justify-center text-xs border border-slate-200 shadow-sm font-medium flex-shrink-0">
                                                        {emp.name.charAt(0)}
                                                    </div>
                                                    <div className="min-w-0">
                                                        <div className="text-sm text-slate-900 font-medium truncate">{emp.name}</div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            );
                        })}
                    </div>
                </div>

                <div className="flex-1 flex flex-col overflow-hidden">
                    <div className="p-4 border-b border-slate-200 bg-white flex justify-between items-center">
                        <h3 className="text-slate-900 text-lg font-medium">Projekt-Planung</h3>
                        <div className="flex items-center gap-3">
                            <span className="text-xs text-slate-500">Zieh Mitarbeiter von links in die Kalenderwochen der Projekte.</span>
                            <select value={timelineStatusFilter} onChange={e => setTimelineStatusFilter(e.target.value)} className="p-2 border border-slate-300 rounded text-sm bg-white">
                                <option value="all">Alle Status</option>
                                {PROJECT_STATUSES.map(s => <option key={s.value} value={s.value}>{s.label}</option>)}
                            </select>
                        </div>
                    </div>
                    
                    <div className="flex-1 overflow-auto relative">
                        <table className="w-full border-collapse text-sm text-left">
                            <thead className="sticky top-0 bg-white z-20 shadow-sm">
                                <tr>
                                    <th className="p-3 border-b border-r border-slate-200 w-64 bg-slate-50 sticky left-0 z-30 text-slate-600 font-medium">Projekt</th>
                                    {weeks.map(w => <th key={w.id} className="p-2 border-b border-r border-slate-200 min-w-[120px] text-center text-slate-600 bg-slate-50 font-medium">{w.label}</th>)}
                                </tr>
                            </thead>
                            <tbody>
                                {projects.length === 0 ? (
                                    <tr>
                                        <td colSpan={weeks.length + 1} className="p-8 text-center text-slate-400">
                                            Noch keine Projekte angelegt.
                                        </td>
                                    </tr>
                                ) : activeProjCategories.map(category => {
                                    const isCollapsed = collapsedProjCategories[category];
                                    const catProjects = projects.filter(p => p.category === category && (timelineStatusFilter === 'all' || (p.status || 'active') === timelineStatusFilter));
                                    if (catProjects.length === 0) return null;

                                    return (
                                        <React.Fragment key={category}>
                                            <tr className="bg-slate-100 border-b border-slate-200 cursor-pointer hover:bg-slate-200 transition-colors" onClick={() => toggleProjCategory(category)}>
                                                <td className="p-3 text-slate-900 sticky left-0 z-10 bg-inherit border-r border-slate-200 font-medium">
                                                    <div className="flex items-center gap-2 text-lg">
                                                        {isCollapsed ? <IconChevronRight size={16}/> : <IconChevronDown size={16}/>}
                                                        {category}
                                                    </div>
                                                </td>
                                                {weeks.map(w => <td key={`header-${category}-${w.id}`} className="border-r border-slate-200"></td>)}
                                            </tr>
                                            
                                            {!isCollapsed && catProjects.map(proj => (
                                                <tr key={proj.id} className="hover:bg-slate-50 transition-colors">
                                                    <td className="p-3 border-b border-r border-slate-200 bg-white sticky left-0 z-10">
                                                        <div className="flex items-center gap-2">
                                                            <div className={`w-3 h-3 rounded-full ${proj.color}`}></div>
                                                            <div className="text-slate-900 font-medium">{proj.name}</div>
                                                        </div>
                                                    </td>
                                                    {weeks.map(w => {
                                                        const isProjectActive = w.id >= proj.startWeek && w.id <= proj.ibnWeek;
                                                        const projAss = assignments.filter(a => a.reference === proj.id && a.week === w.id);
                                                        
                                                        return (
                                                            <td key={w.id} 
                                                                onDragOver={(e) => e.preventDefault()}
                                                                onDrop={(e) => handleDrop(e, w.id, proj.id)}
                                                                className={`p-1 border-b border-r border-slate-300 relative min-w-[120px] align-top transition-colors ${isProjectActive ? 'bg-white hover:bg-slate-50' : 'bg-slate-100 opacity-60'}`}
                                                            >
                                                                <div className="flex flex-col gap-1 min-h-[60px]">
                                                                    {projAss.map(a => {
                                                                        const emp = employees.find(e => e.id === a.empId);
