// Hilfsfunktion KW
const getWeekString = (date) => {
    const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
    d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay()||7));
    const yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
    const kw = Math.ceil(( ( (d - yearStart) / 86400000) + 1)/7);
    return `${d.getUTCFullYear()}-W${kw.toString().padStart(2, '0')}`;
};

const MONTH_NAMES = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];

// ─── SHAREPOINT SYNC ──────────────────────────────────────────────────────────
// Auto-detect SharePoint Online context from the current URL
const SP_CONTEXT = (() => {
    const loc = window.location;
    if (loc.protocol === 'file:' || !loc.hostname.includes('sharepoint.com')) return null;
    const pathParts = decodeURIComponent(loc.pathname).split('/').filter(Boolean);
    let siteParts = [];
    if ((pathParts[0] === 'personal' || pathParts[0] === 'sites') && pathParts[1]) {
        siteParts = [pathParts[0], pathParts[1]];
    }
    const siteUrl = loc.origin + (siteParts.length ? '/' + siteParts.join('/') : '');
    const currentPath = decodeURIComponent(loc.pathname);
    const folderPath = currentPath.substring(0, currentPath.lastIndexOf('/'));
    return { siteUrl, folderPath, stateFilePath: folderPath + '/planner-state.json' };
})();

// Escape single quotes and spaces for SharePoint REST API paths
const SP_ENC = (path) => path.replace(/'/g, "''").replace(/ /g, '%20');

async function spGetDigest(siteUrl) {
    const r = await fetch(`${siteUrl}/_api/contextinfo`, {
        method: 'POST', credentials: 'include',
        headers: { 'Accept': 'application/json;odata=verbose', 'Content-Type': 'application/json;odata=verbose' }
    });
    if (!r.ok) throw new Error('digest ' + r.status);
    return (await r.json()).d.GetContextWebInformation.FormDigestValue;
}

async function spLoad(ctx) {
    const r = await fetch(`${ctx.siteUrl}/_api/web/GetFileByServerRelativeUrl('${SP_ENC(ctx.stateFilePath)}')/$value`, {
        credentials: 'include', headers: { 'Accept': 'text/plain' }
    });
    if (r.status === 404) return null;
    if (!r.ok) throw new Error('load ' + r.status);
    return JSON.parse(await r.text());
}

async function spGetTimestamp(ctx) {
    const r = await fetch(`${ctx.siteUrl}/_api/web/GetFileByServerRelativeUrl('${SP_ENC(ctx.stateFilePath)}')?$select=TimeLastModified`, {
        credentials: 'include', headers: { 'Accept': 'application/json;odata=verbose' }
    });
    if (r.status === 404) return null;
    if (!r.ok) throw new Error('ts ' + r.status);
    return (await r.json()).d.TimeLastModified;
}

async function spSave(ctx, data) {
    const digest = await spGetDigest(ctx.siteUrl);
    const r = await fetch(`${ctx.siteUrl}/_api/web/GetFolderByServerRelativeUrl('${SP_ENC(ctx.folderPath)}')/Files/Add(url='planner-state.json',overwrite=true)`, {
        method: 'POST', credentials: 'include',
        headers: { 'Accept': 'application/json;odata=verbose', 'X-RequestDigest': digest, 'Content-Type': 'application/octet-stream' },
        body: JSON.stringify(data)
    });
    if (!r.ok) throw new Error('save ' + r.status);
}

// Gaußsche Osterformel
const getEasterDate = (year) => {
    const a = year % 19, b = Math.floor(year/100), c = year % 100;
    const d = Math.floor(b/4), e = b%4, f = Math.floor((b+8)/25);
    const g = Math.floor((b-f+1)/3), h = (19*a+b-d-g+15)%30;
    const i = Math.floor(c/4), k = c%4, l = (32+2*e+2*i-h-k)%7;
    const m = Math.floor((a+11*h+22*l)/451);
    const month = Math.floor((h+l-7*m+114)/31)-1;
    const day = ((h+l-7*m+114)%31)+1;
    return new Date(year, month, day);
};

const getGermanHolidays = (year) => {
    const map = {};
    const add = (date, name) => {
        const k = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
        map[k] = map[k] ? map[k]+' · '+name : name;
    };
    const addDays = (d,n) => new Date(d.getFullYear(), d.getMonth(), d.getDate()+n);
    const e = getEasterDate(year);
    add(new Date(year,0,1),   'Neujahr');
    add(addDays(e,-2),        'Karfreitag');
    add(addDays(e, 1),        'Ostermontag');
    add(new Date(year,4,1),   '1. Mai');
    add(addDays(e,39),        'Himmelfahrt');
    add(addDays(e,50),        'Pfingstmontag');
    add(new Date(year,9,3),   '3. Oktober');
    add(new Date(year,11,25), '1. Weihnachten');
    add(new Date(year,11,26), '2. Weihnachten');
    return map;
};

const generateWeeksForYear = (year) => {
    // Feiertage für dieses Jahr + Nachbarjahre (KW1/KW52 können Jahresgrenze überschreiten)
    const holidays = { ...getGermanHolidays(year-1), ...getGermanHolidays(year), ...getGermanHolidays(year+1) };
    const w = [];
    const jan4 = new Date(year, 0, 4);
    const dayOfWeek = jan4.getDay() || 7;
    const monday = new Date(jan4.getFullYear(), jan4.getMonth(), jan4.getDate() - dayOfWeek + 1);
    for (let i = 0; i < 54; i++) {
        const d = new Date(monday.getFullYear(), monday.getMonth(), monday.getDate() + i * 7);
        const dUTC = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
        dUTC.setUTCDate(dUTC.getUTCDate() + 4 - (dUTC.getUTCDay() || 7));
        const yearStart = new Date(Date.UTC(dUTC.getUTCFullYear(), 0, 1));
        const kw = Math.ceil(((dUTC - yearStart) / 86400000 + 1) / 7);
        const weekYear = dUTC.getUTCFullYear();
        if (weekYear > year) break;
        if (weekYear === year) {
            // Feiertage Mo–So sammeln
            const weekHolidays = [];
            for (let day = 0; day < 7; day++) {
                const dd = new Date(d.getFullYear(), d.getMonth(), d.getDate() + day);
                const key = `${dd.getFullYear()}-${String(dd.getMonth()+1).padStart(2,'0')}-${String(dd.getDate()).padStart(2,'0')}`;
                if (holidays[key]) weekHolidays.push(holidays[key]);
            }
            w.push({
                id: `${weekYear}-W${kw.toString().padStart(2, '0')}`,
                label: `KW ${kw}`,
                sub: `${d.getDate()}.${d.getMonth() + 1}.`,
                month: `${MONTH_NAMES[d.getMonth()]} ${weekYear}`,
                holidays: weekHolidays
            });
        }
    }
    return w;
};

                    setCostItems(parsedData.costItems);
                } else if (parsedData.expenses && parsedData.expenses.length > 0) {
                    const migrated = parsedData.expenses.map(e => ({
                        id: e.id,
                        projectId: e.projectId,
                        empId: e.empId,
                        type: e.type === 'Travelcosts' || e.type === 'Hotel' ? 'Reisekosten' : (e.type === 'Other' ? 'Sonstiges' : 'Reisekosten'),
                        description: e.type === 'Hotel' ? 'Hotel' : (e.type === 'Travelcosts' ? 'Reise' : e.type),
                        week: null, hours: null, hourlyRate: null,
                        amount: e.amount,
                        travelAmount: e.type === 'Travelcosts' ? e.amount : null,
                        hotelAmount: e.type === 'Hotel' ? e.amount : null,
                    }));
                    setCostItems(migrated);
                }
                if (parsedData.empCategories) { setEmpCategories(parsedData.empCategories); currentEmpCats = parsedData.empCategories; }
                if (parsedData.projCategories) setProjCategories(parsedData.projCategories);
                if (parsedData.basicTasks) setBasicTasks(parsedData.basicTasks);
                if (parsedData.offtimeTasks) setOfftimeTasks(parsedData.offtimeTasks);
                if (parsedData.invoiceRecipient) setInvoiceRecipient(parsedData.invoiceRecipient);
            } else {
                const init = generateInitialData(currentEmpCats);
                setEmployees(init.employees);
                setProjects(init.projects);
                setAssignments(init.assignments);
                setExpenses(init.expenses);
            }

            const w = [];
            const today = new Date();
            for(let i=0; i<WEEKS_IN_YEAR; i++) {
                const d = new Date(today.getFullYear(), today.getMonth(), today.getDate() + (i*7));
                d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay()||7));
                const yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
                const kw = Math.ceil(( ( (d - yearStart) / 86400000) + 1)/7);
                w.push({
                    id: `${d.getFullYear()}-W${kw.toString().padStart(2, '0')}`,
                    label: `KW ${kw}`,
                    sub: `${d.getDate()}.${d.getMonth()+1}.`,
                    month: `${MONTH_NAMES[d.getMonth()]} ${d.getFullYear()}`
                });
            }
            setWeeks(w);
            setEmpForm(prev => ({...prev, category: currentEmpCats[0] || ''}));
            setProjForm(prev => ({...prev, startWeek: w[0].id, ibnWeek: w[10]?.id || w[w.length-1].id}));
        };
        loadData();
    }, []);

    // Save on change
    useEffect(() => {
        if (employees.length === 0) return;

        // Skip writes triggered by remote updates (SharePoint polling or initial load)
        if (isRemoteUpdateRef.current) {
            isRemoteUpdateRef.current = false;
            return;
        }

        const stateData = {
            employees, projects, assignments, expenses, costItems,
            empCategories, projCategories, basicTasks, offtimeTasks, invoiceRecipient
        };

        // Always save locally
        localStorage.setItem('teamMasterProData', JSON.stringify(stateData));

        // Debounced save to SharePoint (1.5 s after last change)
        if (SP_CONTEXT) {
            if (spSaveTimer.current) clearTimeout(spSaveTimer.current);
            spSaveTimer.current = setTimeout(async () => {
                setSyncStatus('syncing');
                try {
                    await spSave(SP_CONTEXT, stateData);
                    const ts = await spGetTimestamp(SP_CONTEXT);
                    lastKnownTsRef.current = ts;
                    setSyncStatus('idle');
                } catch(e) {
                    setSyncStatus('offline');
                }
            }, 1500);
        }
    }, [employees, projects, assignments, expenses, costItems, empCategories, projCategories, basicTasks, offtimeTasks]);

    // SharePoint polling – pick up changes from other users every 3 seconds
    useEffect(() => {
        if (!SP_CONTEXT) return;
        const poll = async () => {
            if (syncStatusRef.current === 'syncing' || syncStatusRef.current === 'connecting') return;
            try {
                const ts = await spGetTimestamp(SP_CONTEXT);
                if (ts && lastKnownTsRef.current && ts !== lastKnownTsRef.current) {
                    const data = await spLoad(SP_CONTEXT);
                    if (data) {
                        lastKnownTsRef.current = ts;
                        isRemoteUpdateRef.current = true;
                        setEmployees(data.employees || []);
                        setProjects(data.projects || []);
                        setAssignments(data.assignments || []);
                        setExpenses(data.expenses || []);
                        if (data.costItems) setCostItems(data.costItems);
                        if (data.empCategories) setEmpCategories(data.empCategories);
                        if (data.projCategories) setProjCategories(data.projCategories);
                        if (data.basicTasks) setBasicTasks(data.basicTasks);
                        if (data.offtimeTasks) setOfftimeTasks(data.offtimeTasks);
                        if (data.invoiceRecipient !== undefined) setInvoiceRecipient(data.invoiceRecipient);
                        setSyncStatus('updated');
                        setTimeout(() => { if (syncStatusRef.current === 'updated') setSyncStatus('idle'); }, 2000);
                    }
                }
            } catch(e) { /* Transient errors ignored */ }
        };
        const interval = setInterval(poll, 3000);
        return () => clearInterval(interval);
    }, []);

    // Ensure form defaults align with categories
    useEffect(() => {
        if (!empForm.category && empCategories.length > 0) {
            setEmpForm(prev => ({...prev, category: empCategories[0]}));
        }
        if (!projForm.category && projCategories.length > 0) {
            setProjForm(prev => ({...prev, category: projCategories[0]}));
        }
    }, [empCategories, projCategories]);

    // Auto-scroll to current week when switching to resource or project tab
    useEffect(() => {
        if (activeTab === 'resource') {
            const timer = setTimeout(() => scrollToCurrentWeek(resourceScrollRef, 288), 80);
            return () => clearTimeout(timer);
        }
        if (activeTab === 'project') {
            const timer = setTimeout(() => scrollToCurrentWeek(timelineScrollRef, 256), 80);
            return () => clearTimeout(timer);
        }
    }, [activeTab]);

    // --- LOGIC ---
    const getEmpWeeklyHours = (empId) => {
        const emp = employees.find(e => e.id === empId);
        return emp?.weeklyHours ?? HOURS_PER_WEEK;
    };

    const computeAutoStatus = (p) => {
        if (p.costsSubmitted) return 'costs_submitted';
        if (p.projectCompleted) return 'completed';
        const now = getWeekString(new Date());
        const projCosts = costItems.filter(c => c.projectId === p.id);
        const projAss = assignments.filter(a => a.reference === p.id);
        if (p.ibnWeek < now && projAss.length > 0 && projCosts.length === 0) return 'missing_costs';
        if (p.startWeek <= now) return 'active';
        return 'planned';
    };

    const getUtilization = (empId, week) => {
        const weeklyHours = getEmpWeeklyHours(empId);
        const weekAss = assignments.filter(a => a.empId === empId && a.week === week);
        let total = 0;
        let isOfftime = false;
        weekAss.forEach(a => {
            total += ((a.hours ?? (a.percent / 100 * weeklyHours)) / weeklyHours) * 100;
            if (a.type === 'offtime') isOfftime = true;
        });
        return { total, isOfftime, assignments: weekAss };
    };

    const toggleCategory = (cat) => {
        setCollapsedCategories(prev => ({...prev, [cat]: !prev[cat]}));
    };

    const toggleProjCategory = (cat) => {
        setCollapsedProjCategories(prev => ({...prev, [cat]: !prev[cat]}));
    };

    const toggleEmpSetup = (cat) => {
        setCollapsedEmpSetup(prev => ({...prev, [cat]: !prev[cat]}));
    };

    const handleSaveAssignment = (data) => {
        if (data.id) {
            setAssignments(assignments.map(a => a.id === data.id ? data : a));
        } else {
            setAssignments([...assignments, { ...data, id: `ass-${Date.now()}` }]);
        }
        setIsAssignModalOpen(false);
    };

    const handleDeleteAssignment = (id) => {
        setAssignments(assignments.filter(a => a.id !== id));
        setIsAssignModalOpen(false);
    };

    const handleDrop = (e, targetWeek, targetEmpIdOrProjId, isResourceView = false) => {
        e.preventDefault();
        const assignmentId = e.dataTransfer.getData('assignmentId');
        if (assignmentId) {
            // Move existing assignment chip
            setAssignments(assignments.map(a =>
                a.id === assignmentId
                    ? { ...a, week: targetWeek, empId: isResourceView ? targetEmpIdOrProjId : a.empId }
                    : a
            ));
            return;
        }
        const empId = e.dataTransfer.getData('empId');
        if (!empId) return;
        const newAss = {
            id: `ass-${Date.now()}`,
            empId: isResourceView ? targetEmpIdOrProjId : empId,
            week: targetWeek,
            type: 'project',
            reference: isResourceView ? '' : targetEmpIdOrProjId,
            hours: HOURS_PER_WEEK
        };
        if (!isResourceView) {
            setAssignments([...assignments, newAss]);
        } else {
            // In resource view: open modal to pick type/reference
            setAssignContext({ empId: targetEmpIdOrProjId, week: targetWeek });
            setIsAssignModalOpen(true);
        }
    };

    const exportData = () => {
        const data = JSON.stringify({ employees, projects, assignments, expenses, costItems, empCategories, projCategories, basicTasks, offtimeTasks }, null, 2);
        const blob = new Blob([data], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `Einsatzplanung3.0_Backup_${new Date().toISOString().split('T')[0]}.json`;
        a.click();
    };

    const importData = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            try {
                const parsed = JSON.parse(event.target.result);
                if (parsed.employees) setEmployees(parsed.employees);
                if (parsed.projects) setProjects(parsed.projects);
                if (parsed.assignments) setAssignments(parsed.assignments);
                if (parsed.expenses) setExpenses(parsed.expenses);
                if (parsed.costItems) {
                    setCostItems(parsed.costItems);
                } else if (parsed.expenses && parsed.expenses.length > 0) {
                    const migrated = parsed.expenses.map(e => ({
                        id: e.id, projectId: e.projectId, empId: e.empId,
                        type: e.type === 'Travelcosts' || e.type === 'Hotel' ? 'Reisekosten' : 'Sonstiges',
                        description: e.type === 'Hotel' ? 'Hotel' : (e.type === 'Travelcosts' ? 'Reise' : e.type),
                        week: null, hours: null, hourlyRate: null, amount: e.amount,
                        travelAmount: e.type === 'Travelcosts' ? e.amount : null,
                        hotelAmount: e.type === 'Hotel' ? e.amount : null,
                    }));
                    setCostItems(migrated);
                }
                if (parsed.empCategories) setEmpCategories(parsed.empCategories);
                if (parsed.projCategories) setProjCategories(parsed.projCategories);
                if (parsed.basicTasks) setBasicTasks(parsed.basicTasks);
                if (parsed.offtimeTasks) setOfftimeTasks(parsed.offtimeTasks);
            } catch (err) {
                alert('Fehler beim Importieren der Daten: Die Datei konnte nicht gelesen werden.');
            }
        };
        reader.readAsText(file);
    };

    const openInvoiceModal = () => {
        const projAssignments = assignments.filter(a => a.reference === selectedProjectDetails);
        const empIds = [...new Set(projAssignments.map(a => a.empId))];
        const projCosts = costItems.filter(c => c.projectId === selectedProjectDetails);

        const initialEmps = {};
        empIds.forEach(id => initialEmps[id] = true);

        const initialCosts = {};
        projCosts.forEach(c => initialCosts[c.id] = true);

        setInvoiceSelection({ emps: initialEmps, costs: initialCosts });
        setIsInvoiceModalOpen(true);
    };

    const handleInvoiceExport = () => {
        const proj = projects.find(p => p.id === selectedProjectDetails);
        const rows = [];

        rows.push(["Rechnung für Projekt:", proj.name]);
        rows.push(["Projektnummer:", proj.projectNumber || '']);
        rows.push(["Datum:", new Date().toLocaleDateString('de-DE')]);
        rows.push([]);
        rows.push(["Position", "Mitarbeiter", "Details", "Menge", "Einzelpreis", "Gesamt"]);

        let total = 0;

        Object.keys(invoiceSelection.emps).forEach(empId => {
            if (invoiceSelection.emps[empId]) {
                const emp = employees.find(e => e.id === empId);
                const empAss = assignments.filter(a => a.reference === proj.id && a.empId === empId);
                const hours = empAss.reduce((acc, a) => acc + (a.hours ?? (a.percent / 100 * HOURS_PER_WEEK)), 0);
                if (hours > 0 && proj.billable !== false) {
                    const rate = proj.hourlyRate ?? DEFAULT_HOURLY_RATE;
                    const cost = hours * rate;
                    total += cost;
                    rows.push(["Dienstleistung", emp?.name || 'Unbekannt', "Arbeitszeit", `${hours} Std.`, `${rate} EUR`, `${cost.toFixed(2)} EUR`]);
                }
            }
        });

        const projCosts = costItems.filter(c => c.projectId === proj.id);
        projCosts.forEach(ci => {
            if (invoiceSelection.costs[ci.id]) {
                const emp = employees.find(e => e.id === ci.empId);
                total += ci.amount || 0;
                rows.push([ci.type, emp?.name || 'Unbekannt', ci.description || '', "1", `${(ci.amount || 0).toFixed(2)} EUR`, `${(ci.amount || 0).toFixed(2)} EUR`]);
            }
        });

        rows.push([]);
        rows.push(["", "", "", "", "Gesamt Netto:", `${total.toFixed(2)} EUR`]);

        const csvContent = "\uFEFF" + rows.map(e => e.join(";")).join("\n");
        const encodedUri = encodeURI("data:text/csv;charset=utf-8," + csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", `Rechnung_${proj.name.replace(/\s+/g, '_')}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);

        setIsInvoiceModalOpen(false);
        setProjects(prev => prev.map(p => p.id === selectedProjectDetails ? {...p, invoiceStatus: 'exportiert'} : p));
    };

    const handleInvoiceSendEmail = () => {
        const proj = projects.find(p => p.id === selectedProjectDetails);
        const rows = [];
        let total = 0;

        Object.keys(invoiceSelection.emps).forEach(empId => {
            if (invoiceSelection.emps[empId]) {
                const emp = employees.find(e => e.id === empId);
                const empAss = assignments.filter(a => a.reference === proj.id && a.empId === empId);
                const hours = empAss.reduce((acc, a) => acc + (a.hours ?? (a.percent / 100 * HOURS_PER_WEEK)), 0);
                if (hours > 0 && proj.billable !== false) {
                    const rate = proj.hourlyRate ?? DEFAULT_HOURLY_RATE;
                    const cost = hours * rate;
                    total += cost;
                    rows.push(`  - ${emp?.name || 'Unbekannt'}: ${hours} Std. x ${rate} EUR/h = ${cost.toFixed(2)} EUR`);
                }
            }
        });
        costItems.filter(c => c.projectId === proj.id).forEach(ci => {
            if (invoiceSelection.costs[ci.id]) {
                total += ci.amount || 0;
                rows.push(`  - ${ci.type}${ci.description ? ' (' + ci.description + ')' : ''}: ${(ci.amount || 0).toFixed(2)} EUR`);
            }
        });

        const subject = encodeURIComponent(`Rechnung: ${proj.name} - ${new Date().toLocaleDateString('de-DE')}`);
        const body = encodeURIComponent(
            `Guten Tag,\n\nanbei sende ich die Rechnung fuer folgendes Projekt:\n\n` +
            `Projekt: ${proj.name}\n` +
            `Projektnummer: ${proj.projectNumber || '-'}\n` +
            `Datum: ${new Date().toLocaleDateString('de-DE')}\n\n` +
            `Positionen:\n${rows.join('\n')}\n\n` +
            `Gesamtsumme (Netto): ${total.toFixed(2)} EUR\n\n` +
            `Mit freundlichen Gruessen`
        );
        window.location.href = `mailto:${invoiceRecipient}?subject=${subject}&body=${body}`;
    };

    // --- SUB-COMPONENTS ---
    const ModalHeader = ({ title, subtitle, onClose }) => (
        <div className="p-4 border-b border-slate-300 flex justify-between items-center bg-slate-50">
            <div>
                <h3 className="text-slate-900 text-lg font-medium">{title}</h3>
                {subtitle && <p className="text-sm text-slate-500">{subtitle}</p>}

                                <input type="text" maxLength={15} value={projForm.projectNumber} onChange={e => setProjForm({...projForm, projectNumber: e.target.value})} placeholder="GEA-2024-00001" className="w-full p-2 border border-slate-400 rounded text-sm font-mono focus:outline-none focus:ring-2 focus:ring-gea-400 focus:border-gea-500"/>
                            </div>

                                <label className="block text-xs text-slate-700 mb-1 font-semibold">Kategorie</label>
                                <select value={projForm.category} onChange={e => setProjForm({...projForm, category: e.target.value})} className="w-full p-2 border border-slate-400 rounded text-sm focus:outline-none focus:ring-2 focus:ring-gea-400">
                                    {projCategories.map(c => <option key={c} value={c}>{c}</option>)}
                                </select>
                            </div>
                            <div>
                                <label className="block text-xs text-slate-700 mb-1 font-semibold">Start (KW)</label>
                                <input type="week" value={projForm.startWeek} onChange={e => setProjForm({...projForm, startWeek: e.target.value})} className="w-full p-2 border border-slate-400 rounded text-sm focus:outline-none focus:ring-2 focus:ring-gea-400"/>
                            </div>
                            <div>
                                <label className="block text-xs text-slate-700 mb-1 font-semibold">IBN (KW)</label>
                                <input type="week" value={projForm.ibnWeek} onChange={e => setProjForm({...projForm, ibnWeek: e.target.value})} className="w-full p-2 border border-slate-400 rounded text-sm focus:outline-none focus:ring-2 focus:ring-gea-400"/>

                        </div>
                    </div>
                </div>
            </div>
        );
    };

        return <span className={`text-xs px-2 py-0.5 rounded-full font-medium ${s.color}`}>{s.label}</span>;

    const HelpModal = () => (
        <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
            <div className="bg-white rounded-xl shadow-xl w-full max-w-lg overflow-hidden" style={{maxHeight:'85vh',overflowY:'auto'}}>
                <ModalHeader title="Hilfe & Legende" onClose={() => setIsHelpModalOpen(false)}/>
                <div className="p-6 space-y-6 text-sm">
                    <div>
                        <h3 className="font-semibold text-gea-800 mb-3 uppercase tracking-wide text-xs border-b border-gea-100 pb-2">Zell-Farben im Ressourcenplaner</h3>
                        <div className="space-y-2.5">
                            <div className="flex items-center gap-3"><div className="w-10 h-6 rounded flex-shrink-0 bg-emerald-200 border border-emerald-300"></div><span className="text-slate-700">Frei / Verfügbar — keine Einsätze geplant</span></div>
                            <div className="flex items-center gap-3"><div className="w-10 h-6 rounded flex-shrink-0 bg-amber-200 border border-amber-300"></div><span className="text-slate-700">Auslastung ≥ 80% — Achtung, fast voll</span></div>
                            <div className="flex items-center gap-3"><div className="w-10 h-6 rounded flex-shrink-0 bg-rose-200 border border-rose-300"></div><span className="text-slate-700">Überlastet — Einsatz &gt; 100%</span></div>
                            <div className="flex items-center gap-3"><div className="w-10 h-6 rounded flex-shrink-0 diagonal-stripes border border-slate-300"></div><span className="text-slate-700">Abwesenheit (Urlaub, Krank, Gleitzeit …)</span></div>
                            <div className="flex items-center gap-3"><div className="w-10 h-6 rounded flex-shrink-0 bg-gea-200 border border-gea-400"></div><span className="text-slate-700">Aktuelle Woche — farbig hervorgehoben</span></div>
                            <div className="flex items-center gap-3"><div className="w-10 h-6 rounded flex-shrink-0 bg-slate-300 border border-slate-400"></div><span className="text-slate-700">Vergangene Woche — gedimmt angezeigt</span></div>
                        </div>

                                    <span className="text-slate-600 text-xs">{
                                        s.value === 'planned' ? 'Start-Woche liegt noch in der Zukunft' :
                                        s.value === 'active' ? 'Projekt hat begonnen und läuft aktuell' :
                                        s.value === 'missing_costs' ? 'IBN-Woche ist vorbei, aber noch keine Kostenpunkte erfasst' :
                                        s.value === 'completed' ? 'Projekt wurde als abgeschlossen markiert' :
                                        'Kosten wurden bereits übermittelt'
                                    }</span>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            </div>
        </div>
    );

    const AssignmentModal = () => {
        if (!isAssignModalOpen || !assignContext) return null;

        const empWeeklyHours = employees.find(e => e.id === assignContext.empId)?.weeklyHours ?? HOURS_PER_WEEK;
        const [formData, setFormData] = useState(assignContext.existing || {
            empId: assignContext.empId,
            week: assignContext.week,
            type: 'basic',
            reference: basicTasks[0] || '',
            hours: empWeeklyHours
        });
        const [newTaskName, setNewTaskName] = useState('');

        const emp = employees.find(e => e.id === formData.empId);
        const pct = Math.round((formData.hours ?? empWeeklyHours) / empWeeklyHours * 100);

        const handleTypeChange = (type) => {
            let ref = '';
            if (type === 'project') ref = projects.find(p => ['active','planned'].includes(computeAutoStatus(p)))?.id || '';
            else if (type === 'basic') ref = basicTasks[0] || '';
            else if (type === 'offtime') ref = offtimeTasks[0] || '';
            setFormData({...formData, type, reference: ref});
            setNewTaskName('');
        };

        const handleSave = () => {
            let data = { ...formData };
            if (formData.type === 'new') {
                const trimmed = newTaskName.trim();
                if (!trimmed) return;
                if (!basicTasks.includes(trimmed)) {
                    setBasicTasks(prev => [...prev, trimmed]);
                }
                data = { ...formData, type: 'basic', reference: trimmed };
            }
            // Overbooking check
            const weeklyH = getEmpWeeklyHours(formData.empId);
            const { total: currentTotal } = getUtilization(formData.empId, formData.week);
            const existingH = assignContext?.existing
                ? (assignContext.existing.hours ?? ((assignContext.existing.percent ?? 100) / 100 * weeklyH))
                : 0;
            const newH = data.hours ?? weeklyH;
            const newTotal = currentTotal - (existingH / weeklyH * 100) + (newH / weeklyH * 100);
            if (newTotal > 100) {
                const empName = employees.find(e => e.id === formData.empId)?.name || '';
                if (!window.confirm(`${empName} wäre diese Woche bei ${Math.round(newTotal)} % — trotzdem speichern?`)) return;
            }
            handleSaveAssignment(data);
        };

        return (
            <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                <div className="bg-white rounded-xl shadow-xl w-full max-w-md overflow-hidden">
                    <ModalHeader title={formData.id ? 'Planung bearbeiten' : 'Planung hinzufügen'} onClose={() => setIsAssignModalOpen(false)} />
                    <div className="p-6 space-y-4">
                        <div className="text-sm text-slate-500">
                            <span className="text-slate-900 font-medium">{emp?.name}</span>
                            <span className="mx-2">·</span>
                            <span className="font-medium text-slate-700">{formData.week}</span>
                        </div>

                        <div>
                            <label className="block text-xs text-slate-500 mb-1 font-medium uppercase tracking-wide">Typ</label>
                            <div className="grid grid-cols-4 gap-1">
                                {[
                                    { value: 'basic', label: 'Basic Task' },
                                    { value: 'project', label: 'Projekt' },
                                    { value: 'offtime', label: 'Offtime' },
                                    { value: 'new', label: '+ Neu' },
                                ].map(opt => (
                                    <button key={opt.value} onClick={() => handleTypeChange(opt.value)}
                                        className={`py-2 px-1 text-xs rounded-md border font-medium transition-colors ${formData.type === opt.value ? 'bg-gea-600 text-white border-gea-600' : 'bg-white text-slate-600 border-slate-300 hover:border-gea-400'}`}>
                                        {opt.label}
                                    </button>
                                ))}
                            </div>
                        </div>

                        {formData.type === 'new' && (
                            <div>
                                <label className="block text-xs text-slate-500 mb-1 font-medium">Neuer Task-Name</label>
                                <input type="text" value={newTaskName} onChange={e => setNewTaskName(e.target.value)}
                                    autoFocus
                                    placeholder="z.B. Meeting, Workshop, …"
                                    className="w-full p-2 border border-slate-300 rounded-md text-sm"/>
                                <p className="text-xs text-slate-400 mt-1">Wird als Basic Task gespeichert und zur Liste hinzugefügt.</p>
                            </div>
                        )}

                        {formData.type !== 'new' && (
                            <div>
                                <label className="block text-xs text-slate-500 mb-1 font-medium uppercase tracking-wide">Auswahl</label>
                                {formData.type === 'project' && (
                                    <select value={formData.reference} onChange={e => setFormData({...formData, reference: e.target.value})} className="w-full p-2 border border-slate-300 rounded-md text-sm">
                                        {projects.filter(p => ['active','planned'].includes(computeAutoStatus(p))).map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
                                    </select>
                                )}
                                {formData.type === 'basic' && (
                                    <select value={formData.reference} onChange={e => setFormData({...formData, reference: e.target.value})} className="w-full p-2 border border-slate-300 rounded-md text-sm">
                                        {basicTasks.map(t => <option key={t} value={t}>{t}</option>)}
                                    </select>
                                )}
                                {formData.type === 'offtime' && (
                                    <select value={formData.reference} onChange={e => setFormData({...formData, reference: e.target.value})} className="w-full p-2 border border-slate-300 rounded-md text-sm">
                                        {offtimeTasks.map(t => <option key={t} value={t}>{t}</option>)}
                                    </select>
                                )}
                            </div>
                        )}

                        <div>
                            <label className="block text-xs text-slate-500 mb-2 font-medium uppercase tracking-wide">
                                Auslastung: <span className="text-gea-600 font-medium">{pct}%</span>
                                <span className="text-slate-400 ml-2">({formData.hours ?? HOURS_PER_WEEK}h)</span>
                            </label>
                            <input type="range" min="0" max="200" step="10"
                                value={pct}
                                onChange={e => setFormData({...formData, hours: Math.round(parseInt(e.target.value) / 100 * empWeeklyHours)})}
                                className="w-full accent-gea-600"/>
                            <div className="flex justify-between text-xs text-slate-400 mt-1">
                                <span>0%</span><span>50%</span><span>100%</span><span>150%</span><span>200%</span>
                            </div>
                        </div>
                    </div>
                    <div className="p-4 bg-slate-50 border-t border-slate-100 flex justify-between">
                        {formData.id ? (
                            <button onClick={() => handleDeleteAssignment(formData.id)} className="text-rose-600 text-sm hover:bg-rose-50 px-3 py-2 rounded font-medium">Löschen</button>
                        ) : <div/>}
                        <div className="flex gap-2">
                            <button onClick={() => setIsAssignModalOpen(false)} className="px-4 py-2 text-sm text-slate-600 bg-white border border-slate-300 rounded-md hover:bg-slate-50 font-medium">Abbrechen</button>
                            <button onClick={handleSave} className="px-4 py-2 text-sm text-white bg-gea-600 rounded-md hover:bg-gea-700 font-medium">Speichern</button>
                        </div>
                    </div>
                </div>
            </div>
        );
    };

    const CopyModal = () => {
        if (!isCopyModalOpen || !copyContext) return null;
        const { assignment } = copyContext;

        const activeEmps = employees.filter(e => e.active);
        const [selWeeks, setSelWeeks] = useState({});
        const [selEmps, setSelEmps] = useState({});

        const toggleWeek = (wId) => setSelWeeks(prev => ({...prev, [wId]: !prev[wId]}));
        const toggleEmp = (eId) => setSelEmps(prev => ({...prev, [eId]: !prev[eId]}));
        const toggleAllWeeks = () => {
            const allSelected = weeks.every(w => selWeeks[w.id]);
            const next = {};
            weeks.forEach(w => { next[w.id] = !allSelected; });
            setSelWeeks(next);
        };

        let label = assignment.reference;
        if (assignment.type === 'project') {
            const p = projects.find(p => p.id === assignment.reference);
            label = p ? p.name : assignment.reference;
        }

        const handleCopy = () => {
            const targetWeeks = weeks.filter(w => selWeeks[w.id]).map(w => w.id);
            const targetEmps = activeEmps.filter(e => selEmps[e.id]).map(e => e.id);
            if (targetWeeks.length === 0 || targetEmps.length === 0) return;
            const newAssignments = [];
            targetEmps.forEach(empId => {
                targetWeeks.forEach(week => {
                    // Skip if identical to source
                    if (empId === assignment.empId && week === assignment.week) return;
                    // Skip if already exists
                    const exists = assignments.some(a => a.empId === empId && a.week === week && a.reference === assignment.reference && a.type === assignment.type);
                    if (!exists) {
                        newAssignments.push({ ...assignment, id: `ass-${Date.now()}-${empId}-${week}`, empId, week });
                    }
                });
            });
            setAssignments(prev => [...prev, ...newAssignments]);
            setIsCopyModalOpen(false);
            setCopyContext(null);
        };

        const pct = Math.round((assignment.hours ?? HOURS_PER_WEEK) / HOURS_PER_WEEK * 100);

        return (
            <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                <div className="bg-white rounded-xl shadow-xl w-full max-w-2xl max-h-[90vh] flex flex-col overflow-hidden">
                    <ModalHeader title="Task kopieren" subtitle={`"${label}" · ${pct}%`} onClose={() => { setIsCopyModalOpen(false); setCopyContext(null); }}/>
                    <div className="flex-1 overflow-y-auto p-6 space-y-6">

                        {/* Employee selection */}
                        <div>
                            <h4 className="text-sm font-medium text-slate-700 mb-3">Mitarbeiter auswählen</h4>
                            <div className="flex flex-wrap gap-2">
                                {activeEmps.map(e => (
                                    <button key={e.id} onClick={() => toggleEmp(e.id)}
                                        className={`px-3 py-1.5 rounded-full text-sm border font-medium transition-colors ${selEmps[e.id] ? 'bg-gea-600 text-white border-gea-600' : 'bg-white text-slate-600 border-slate-300 hover:border-gea-400'}`}>
                                        {e.name}
                                    </button>
                                ))}
                            </div>
                        </div>

                        {/* Week selection */}
                        <div>
                            <div className="flex justify-between items-center mb-3">
                                <h4 className="text-sm font-medium text-slate-700">Wochen auswählen</h4>
                                <button onClick={toggleAllWeeks} className="text-xs text-gea-600 hover:text-gea-700 font-medium">
                                    Alle {weeks.every(w => selWeeks[w.id]) ? 'abwählen' : 'auswählen'}
                                </button>
                            </div>
                            <div className="flex flex-wrap gap-1.5 max-h-48 overflow-y-auto">
                                {weeks.map(w => {
                                    const isSource = w.id === assignment.week;
                                    return (
                                        <button key={w.id} onClick={() => !isSource && toggleWeek(w.id)} disabled={isSource}
                                            className={`px-2.5 py-1 rounded text-xs border font-medium transition-colors ${isSource ? 'bg-slate-100 text-slate-400 border-slate-200 cursor-default' : selWeeks[w.id] ? 'bg-gea-600 text-white border-gea-600' : 'bg-white text-slate-600 border-slate-200 hover:border-gea-300'}`}>
                                            {w.label}
                                        </button>
                                    );
                                })}
                            </div>
                        </div>
                    </div>
                    <div className="p-4 bg-slate-50 border-t border-slate-100 flex justify-between items-center">
                        <span className="text-xs text-slate-400">
                            {Object.values(selEmps).filter(Boolean).length} MA × {Object.values(selWeeks).filter(Boolean).length} KW = {Object.values(selEmps).filter(Boolean).length * Object.values(selWeeks).filter(Boolean).length} Einträge
                        </span>
                        <div className="flex gap-2">
                            <button onClick={() => { setIsCopyModalOpen(false); setCopyContext(null); }} className="px-4 py-2 text-sm text-slate-600 bg-white border border-slate-300 rounded-md hover:bg-slate-50 font-medium">Abbrechen</button>
                            <button onClick={handleCopy} className="px-4 py-2 text-sm text-white bg-gea-600 rounded-md hover:bg-gea-700 font-medium flex items-center gap-2">
                                <IconCopy size={15}/> Kopieren
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        );
    };

    const CostItemModal = ({ projectId, existingItem, onClose }) => {
        const projAssignments = assignments.filter(a => a.reference === projectId);
        const empIds = [...new Set(projAssignments.map(a => a.empId))];
        const projEmployees = employees.filter(e => empIds.includes(e.id));

        const kwRangeFromDates = (from, to) => {
            if (!from) return null;
            const kwFrom = parseInt(getWeekString(new Date(from)).split('-W')[1]);
            const kwTo = to ? parseInt(getWeekString(new Date(to)).split('-W')[1]) : kwFrom;
            return kwFrom === kwTo ? `KW${kwFrom}` : `KW${kwFrom}–${kwTo}`;
        };

        const [form, setForm] = useState({
            empId: existingItem?.empId || projEmployees[0]?.id || '',
            type: existingItem?.type || 'Reisekosten',
            description: existingItem?.description || '',
            dateFrom: existingItem?.dateFrom || '',
            dateTo: existingItem?.dateTo || '',
            hours: existingItem?.hours != null ? String(existingItem.hours) : '',
            hourlyRate: existingItem?.hourlyRate != null ? String(existingItem.hourlyRate) : '',
            amount: existingItem?.amount != null ? String(existingItem.amount) : '',
        });

        const [extraCosts, setExtraCosts] = useState(
            existingItem?.extraCosts || []
        );

        const updateExtra = (i, field, val) =>
            setExtraCosts(prev => prev.map((c, idx) => idx === i ? {...c, [field]: val} : c));
        const addExtra = () =>
            setExtraCosts(prev => [...prev, { id: `ec-${Date.now()}`, type: '', amount: '' }]);
        const removeExtra = (i) =>
            setExtraCosts(prev => prev.filter((_, idx) => idx !== i));

        const autoAmount = (form.hours !== '' && form.hourlyRate !== '')
            ? (parseFloat(form.hours) || 0) * (parseFloat(form.hourlyRate) || 0)
            : null;

        const handleSave = () => {
            if (!form.empId) return;
            const mainAmount = autoAmount !== null ? autoAmount : parseFloat(form.amount) || 0;
            const extraTotal = extraCosts.reduce((s, c) => s + (parseFloat(c.amount) || 0), 0);
            const item = {
                id: existingItem?.id || `ci-${Date.now()}`,
                projectId,
                empId: form.empId,
                type: form.type,
                description: form.description,
                dateFrom: form.dateFrom || null,
                dateTo: form.dateTo || null,
                week: form.dateFrom ? getWeekString(new Date(form.dateFrom)) : null,
                hours: form.hours !== '' ? parseFloat(form.hours) : null,
                hourlyRate: form.hourlyRate !== '' ? parseFloat(form.hourlyRate) : null,
                amount: mainAmount + extraTotal,
                mainAmount,
                extraCosts: extraCosts.filter(c => c.type || c.amount).map(c => ({
                    ...c, amount: parseFloat(c.amount) || 0
                })),
            };
            if (existingItem) {
                setCostItems(costItems.map(c => c.id === existingItem.id ? item : c));
            } else {
                setCostItems([...costItems, item]);
            }
            onClose();
        };

        const handleDelete = () => {
            setCostItems(costItems.filter(c => c.id !== existingItem.id));
            onClose();
        };

        const kwLabel = kwRangeFromDates(form.dateFrom, form.dateTo);

        return (
            <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                <div className="bg-white rounded-xl shadow-xl w-full max-w-lg overflow-hidden">
                    <ModalHeader
                        title={existingItem ? 'Kostenpunkt bearbeiten' : 'Kostenpunkt erfassen'}
                        onClose={onClose}
                    />
                    <div className="p-6 space-y-4 overflow-y-auto max-h-[80vh]">
                        {/* Mitarbeiter */}
                        <div>
                            <label className="block text-xs text-slate-500 mb-1 font-medium">Mitarbeiter</label>
                            <select value={form.empId} onChange={e => setForm({...form, empId: e.target.value})}
                                className="w-full p-2 border border-slate-300 rounded-md text-sm">
                                <option value="">Bitte wählen…</option>
                                {projEmployees.map(e => <option key={e.id} value={e.id}>{e.name}</option>)}
                                {employees.filter(e => !empIds.includes(e.id)).map(e =>
                                    <option key={e.id} value={e.id}>{e.name} (nicht verplant)</option>
                                )}
                            </select>
                        </div>

                        {/* Typ */}
                        <div>
                            <label className="block text-xs text-slate-500 mb-1 font-medium">Art</label>
                            <select value={form.type} onChange={e => setForm({...form, type: e.target.value})}
                                className="w-full p-2 border border-slate-300 rounded-md text-sm">
                                <option value="Reisekosten">Reisekosten</option>
                                <option value="Dienstleistung">Dienstleistung</option>
                                <option value="Sonstiges">Sonstiges</option>
                            </select>
                        </div>

                        {/* Beschreibung */}
                        <div>
                            <label className="block text-xs text-slate-500 mb-1 font-medium">Beschreibung</label>
                            <input type="text" value={form.description}
                                onChange={e => setForm({...form, description: e.target.value})}
                                placeholder="z.B. Vor-Ort-Einsatz"
                                className="w-full p-2 border border-slate-300 rounded-md text-sm"/>
                        </div>

                        {/* Zeitraum */}
                        <div>
                            <label className="block text-xs text-slate-500 mb-1 font-medium">
                                Zeitraum (optional)
                                {kwLabel && <span className="ml-2 text-gea-600 font-medium">{kwLabel}</span>}
                            </label>
                            <div className="grid grid-cols-2 gap-3">
                                <div>
                                    <span className="block text-xs text-slate-400 mb-1">Von</span>
                                    <input type="date" value={form.dateFrom}
                                        onChange={e => setForm({...form, dateFrom: e.target.value})}
                                        className="w-full p-2 border border-slate-300 rounded-md text-sm"/>
                                </div>
                                <div>
                                    <span className="block text-xs text-slate-400 mb-1">Bis</span>
                                    <input type="date" value={form.dateTo}
                                        min={form.dateFrom}
                                        onChange={e => setForm({...form, dateTo: e.target.value})}
                                        className="w-full p-2 border border-slate-300 rounded-md text-sm"/>
                                </div>
                            </div>
                        </div>

                        {/* Stunden + Rate + Betrag */}
                        <div className="grid grid-cols-3 gap-3">
                            <div>
                                <label className="block text-xs text-slate-500 mb-1 font-medium">Stunden (opt.)</label>
                                <input type="number" min="0" step="0.5" value={form.hours}
                                    onChange={e => setForm({...form, hours: e.target.value})}
                                    className="w-full p-2 border border-slate-300 rounded-md text-sm" placeholder="z.B. 40"/>
                            </div>
                            <div>
                                <label className="block text-xs text-slate-500 mb-1 font-medium">€/Std. (opt.)</label>
                                <input type="number" min="0" step="1" value={form.hourlyRate}
                                    onChange={e => setForm({...form, hourlyRate: e.target.value})}
                                    className="w-full p-2 border border-slate-300 rounded-md text-sm" placeholder={`${DEFAULT_HOURLY_RATE}`}/>
                            </div>
                            <div>
                                <label className="block text-xs text-slate-500 mb-1 font-medium">
                                    Betrag (€){autoAmount !== null && <span className="ml-1 text-gea-600">= {autoAmount.toFixed(2)}</span>}
                                </label>
                                <input type="number" min="0" step="0.01"
                                    value={autoAmount !== null ? autoAmount.toFixed(2) : form.amount}
                                    onChange={e => setForm({...form, amount: e.target.value})}
                                    disabled={autoAmount !== null}
                                    className={`w-full p-2 border border-slate-300 rounded-md text-sm ${autoAmount !== null ? 'bg-slate-50 text-slate-400' : ''}`}
                                    placeholder="0.00"/>
                            </div>
                        </div>

                        {/* Zusatzkosten */}
                        <div className="border border-slate-200 rounded-lg overflow-hidden">
                            <div className="px-4 py-3 bg-slate-50 border-b border-slate-200 flex items-center justify-between">
                                <span className="text-xs font-medium text-slate-600">Weitere Kosten</span>
                                <button onClick={addExtra}
                                    className="text-xs text-gea-600 hover:text-gea-700 font-medium flex items-center gap-1">
                                    <IconPlus size={12}/> Hinzufügen
                                </button>
                            </div>
                            {extraCosts.length === 0 ? (
                                <div className="px-4 py-3 text-xs text-slate-400">
                                    Noch keine Zusatzkosten. Auf <strong>+ Hinzufügen</strong> klicken.
                                </div>
                            ) : (
                                <div className="p-3 space-y-2">
                                    {extraCosts.map((c, i) => (
                                        <div key={c.id} className="flex gap-2 items-center">
                                            <input type="text" value={c.type}
                                                onChange={e => updateExtra(i, 'type', e.target.value)}
                                                placeholder="Kostenart (z.B. Dienstleistung)"
                                                className="flex-1 p-2 border border-slate-300 rounded text-sm"/>
                                            <input type="number" min="0" step="0.01" value={c.amount}
                                                onChange={e => updateExtra(i, 'amount', e.target.value)}
                                                placeholder="€"
                                                className="w-28 p-2 border border-slate-300 rounded text-sm"/>
                                            <button onClick={() => removeExtra(i)}
                                                className="text-slate-400 hover:text-rose-500 p-1 flex-shrink-0"><IconX size={14}/></button>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </div>
                    <div className="p-4 bg-slate-50 border-t border-slate-100 flex justify-between">
                        {existingItem ? (
                            <button onClick={handleDelete} className="text-rose-600 text-sm hover:bg-rose-50 px-3 py-2 rounded font-medium">Löschen</button>
                        ) : <div/>}
                        <div className="flex gap-2">
                            <button onClick={onClose} className="px-4 py-2 text-sm text-slate-600 bg-white border border-slate-300 rounded-md hover:bg-slate-50 font-medium">Abbrechen</button>
                            <button onClick={handleSave} className="px-4 py-2 text-sm text-white bg-gea-600 rounded-md hover:bg-gea-700 font-medium">Speichern</button>
                        </div>
                    </div>
                </div>
            </div>
        );
    };


    const InvoiceModal = () => {
        if (!isInvoiceModalOpen || !selectedProjectDetails) return null;

        const proj = projects.find(p => p.id === selectedProjectDetails);
        const projAssignments = assignments.filter(a => a.reference === selectedProjectDetails);
        const empIds = [...new Set(projAssignments.map(a => a.empId))];
        const projCosts = costItems.filter(c => c.projectId === selectedProjectDetails);

        let currentTotal = 0;

        return (
            <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                <div className="bg-white rounded-xl shadow-xl w-full max-w-2xl max-h-[90vh] flex flex-col overflow-hidden">
                    <ModalHeader title="Rechnung konfigurieren" subtitle={`Projekt: ${proj.name}`} onClose={() => setIsInvoiceModalOpen(false)} />

                    <div className="flex-1 overflow-y-auto p-6 space-y-6">
                        {proj.billable !== false && (
                            <div>
                                <h4 className="text-slate-700 text-base mb-3 border-b border-slate-300 pb-2 font-medium">Dienstleistungen (Arbeitszeit)</h4>
                                <div className="space-y-2">
                                    {empIds.map(empId => {
                                        const emp = employees.find(e => e.id === empId);

                                            <div className="text-[10px] font-normal opacity-70">{w.sub}</div>
                                            {w.holidays.length > 0 && <div className="text-[9px] font-semibold text-amber-600 leading-tight mt-0.5 truncate" title={w.holidays.join(' · ')}>{w.holidays.join(' · ')}</div>}
                                        </th>
                                    ))}
                                </tr>
                            </thead>
                            <tbody>
                                {projects.length === 0 ? (
                                    <tr>
                                        <td colSpan={timelineWeeks.length + 1} className="p-8 text-center text-slate-400">
                                            Noch keine Projekte angelegt.
                                        </td>
                                    </tr>
                                ) : activeProjCategories.map(category => {
                                    const isCollapsed = collapsedProjCategories[category];
                                    const catProjects = projects.filter(p => p.category === category);
                                    if (catProjects.length === 0) return null;

                                    return (
                                        <React.Fragment key={category}>
                                            <tr className="bg-slate-100 border-b border-slate-200 cursor-pointer hover:bg-slate-200 transition-colors" onClick={() => toggleProjCategory(category)}>
                                                <td className="p-3 text-slate-900 sticky left-0 z-10 bg-inherit border-r border-slate-200 font-medium">
                                                    <div className="flex items-center gap-2 text-lg">
                                                        {isCollapsed ? <IconChevronRight size={16}/> : <IconChevronDown size={16}/>}
                                                        {category}
                                                    </div>
                                                </td>
                                                {timelineWeeks.map(w => <td key={`header-${category}-${w.id}`} className="border-r border-slate-200"></td>)}
                                            </tr>
                                            
                                            {!isCollapsed && catProjects.map(proj => (
                                                <tr key={proj.id} className="hover:bg-slate-50 transition-colors">
                                                    <td className="p-3 border-b border-r border-slate-200 bg-white sticky left-0 z-10">
                                                        <div className="flex items-center gap-2">
                                                            <div className={`w-3 h-3 rounded-full ${proj.color}`}></div>
                                                            <div className="text-slate-900 font-medium">{proj.name}</div>
                                                        </div>
                                                    </td>
                                                    {timelineWeeks.map(w => {
                                                        const isProjectActive = w.id >= proj.startWeek && w.id <= proj.ibnWeek;
                                                        const projAss = assignments.filter(a => a.reference === proj.id && a.week === w.id);
                                                        
                                                        return (
                                                            <td key={w.id} 
                                                                onDragOver={(e) => e.preventDefault()}
                                                                onDrop={(e) => handleDrop(e, w.id, proj.id)}
                                                                className={`p-1 border-b border-r border-slate-300 relative min-w-[120px] align-top transition-colors ${isProjectActive ? 'bg-white hover:bg-slate-50' : 'bg-slate-100 opacity-60'}`}
                                                            >
                                                                <div className="flex flex-col gap-1 min-h-[60px]">
                                                                    {projAss.map(a => {
                                                                        const emp = employees.find(e => e.id === a.empId);
                                                                        return (
                                                                            <div key={a.id} 
                                                                                onClick={(e) => { e.stopPropagation(); setAssignContext({ empId: a.empId, week: w.id, existing: a }); setIsAssignModalOpen(true); }}
                                                                                className={`text-[10px] px-1.5 py-1 rounded flex justify-between items-center text-white shadow-sm cursor-pointer hover:opacity-90 transition-opacity ${proj.color}`}>
                                                                                <span className="truncate font-medium">{emp?.name || 'Unbekannt'}</span>
                                                                                <span className="opacity-90 ml-1 font-medium">{a.hours ?? Math.round((a.percent ?? 100) / 100 * HOURS_PER_WEEK)}h</span>
                                                                            </div>
                                                                        );
                                                                    })}
                                                                </div>
                                                            </td>
                                                        );
                                                    })}
                                                </tr>
                                            ))}
                                        </React.Fragment>
                                    );
                                })}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        );
    };

    const renderUtilization = () => {
        const visibleWeeks = weeks.slice(0, weeksAhead);
        const months = [];
        const weeksByMonth = {};

        visibleWeeks.forEach(w => {
            if (!weeksByMonth[w.month]) {
                weeksByMonth[w.month] = [];
                months.push(w.month);
            }
            weeksByMonth[w.month].push(w.id);
        });

        const activeCategories = [...new Set(employees.filter(e => e.active).map(e => e.category))];

        return (
            <div className="flex-1 flex flex-col h-full bg-white overflow-hidden">
                <div className="p-6 border-b border-slate-200 flex justify-between items-center">
                    <div>
                        <h2 className="text-xl text-slate-900 font-medium">Auslastung (Heatmap)</h2>
                        <p className="text-sm text-slate-500">Monatsweise Übersicht der durchschnittlichen Kapazitätsauslastung.</p>
                    </div>
                    <div className="flex gap-4 items-center bg-slate-50 p-3 rounded-lg border border-slate-200">
                        <span className="text-sm text-slate-700 font-medium">Vorschau:</span>
                        <select value={weeksAhead} onChange={e=>setWeeksAhead(Number(e.target.value))} className="p-2 border border-slate-300 rounded text-sm bg-white">
                            <option value={4}>4 Wochen</option>
                            <option value={8}>8 Wochen</option>
                            <option value={12}>12 Wochen</option>
                            <option value={24}>24 Wochen</option>
                            <option value={52}>52 Wochen</option>
                        </select>
                    </div>
                </div>
                <div className="flex-1 overflow-auto p-6">
                    <table className="w-full border-collapse text-sm">
                        <thead>
                            <tr>
                                <th className="p-2 border-b border-slate-200 text-left w-48 text-slate-500 font-medium">Mitarbeiter</th>
                                <th className="p-2 border-b border-slate-200 text-center w-32 text-gea-600 bg-gea-50 rounded-t-lg font-medium">Ø Zeitraum</th>
                                {months.map(m => <th key={m} className="p-2 border-b border-slate-200 text-center text-slate-500 font-medium">{m}</th>)}
                            </tr>
                        </thead>
                        <tbody>
                            {activeCategories.map(category => {
                                const isCollapsed = collapsedCategories[category];
                                const catEmps = employees.filter(e => e.active && e.category === category);
                                
                                return (
                                    <React.Fragment key={category}>
                                        <tr className="bg-slate-200/70 border-t-2 border-b border-slate-300 cursor-pointer hover:bg-slate-300/50 transition-colors group" onClick={() => toggleCategory(category)}>
                                            <td className="p-3 text-slate-700 sticky left-0 z-10 bg-inherit border-r border-l-4 border-l-gea-500 border-slate-300 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.08)]">
                                                <div className="flex items-center gap-2 text-sm uppercase tracking-wider font-medium">
                                                    <span className="text-slate-400 group-hover:text-gea-500 transition-colors">
                                                        {isCollapsed ? <IconChevronRight size={16}/> : <IconChevronDown size={16}/>}
                                                    </span>
                                                    {category}
                                                    <span className="ml-auto text-xs bg-white px-2 py-0.5 rounded-full border border-slate-200 text-slate-500 font-medium">
                                                        {catEmps.length}
                                                    </span>
                                                </div>
                                            </td>
                                            <td className="border-b border-slate-300 bg-slate-200/70"></td>
                                            {months.map(m => <td key={`header-${category}-${m}`} className="border-b border-slate-300 bg-slate-200/70"></td>)}
                                        </tr>

                                        {!isCollapsed && catEmps.map(emp => {
                                            let totalPercentAll = 0;
                                            visibleWeeks.forEach(w => {
                                                totalPercentAll += getUtilization(emp.id, w.id).total;
                                            });
                                            const avgAll = visibleWeeks.length === 0 ? 0 : Math.round(totalPercentAll / visibleWeeks.length);

                                            return (
                                                <tr key={emp.id} className="border-b border-slate-300 hover:bg-slate-50 transition-colors">
                                                    <td className="p-2 text-slate-900 font-medium pl-6">{emp.name}</td>
                                                    
                                                    <td className="p-2 border-r border-slate-300">
                                                        <div className="w-full h-8 rounded flex items-center justify-center text-xs bg-gea-50 text-gea-700 border border-gea-100 font-medium">
                                                            {avgAll}%
                                                        </div>
                                                    </td>

                                                    {months.map(m => {
                                                        const monthWeeks = weeksByMonth[m];
                                                        let monthTotal = 0;
                                                        let hasOfftime = false;

                                                        monthWeeks.forEach(wId => {
                                                            const { total, isOfftime } = getUtilization(emp.id, wId);
                                                            monthTotal += total;
                                                            if (isOfftime) hasOfftime = true;
                                                        });
                                                        
                                                        const avgMonth = monthWeeks.length === 0 ? 0 : Math.round(monthTotal / monthWeeks.length);

                                                        let bgColor = 'bg-slate-50';
                                                        let textColor = 'text-slate-400';

                                                        if (avgMonth === 0 && hasOfftime) { bgColor = 'bg-slate-200'; textColor = 'text-slate-600'; }
                                                        else if (avgMonth >= 100) { bgColor = 'bg-rose-500'; textColor = 'text-white'; }
                                                        else if (avgMonth >= 80) { bgColor = 'bg-amber-400'; textColor = 'text-white'; }
                                                        else if (avgMonth > 0) { bgColor = 'bg-emerald-500'; textColor = 'text-white'; }

                                                        const label = avgMonth > 0 ? `${avgMonth}%` : (hasOfftime ? 'OFF' : '-');

                                                        return (
                                                            <td key={m} className="p-1 border-r border-slate-300 last:border-0">
                                                                <div className={`w-full h-8 rounded flex items-center justify-center text-xs transition-colors ${bgColor} ${textColor} ${hasOfftime && avgMonth === 0 ? 'diagonal-stripes' : ''} font-medium`}>
                                                                    {label}
                                                                </div>
                                                            </td>
                                                        )
                                                    })}
                                                </tr>
                                            )
                                        })}
                                    </React.Fragment>
                                );
                            })}
                        </tbody>
                    </table>
                </div>
            </div>
        );
    };

    const renderProjectDetails = () => {
        const proj = projects.find(p => p.id === selectedProjectDetails);
        if (!proj) return null;

        const projAssignments = assignments.filter(a => a.reference === proj.id && a.type === 'project');
        const assignedEmpIds = [...new Set(projAssignments.map(a => a.empId))];
        const projCostItems = costItems.filter(c => c.projectId === proj.id);

        const presenceWeeks = [...new Set(projAssignments.map(a => a.week))].sort();

        let totalLaborCost = 0;

            totalHours += h;
            if (proj.billable !== false) totalLaborCost += h * (proj.hourlyRate ?? DEFAULT_HOURLY_RATE);

        projCostItems.forEach(ci => { totalOtherCost += ci.amount || 0; });
        const grandTotal = totalLaborCost + totalOtherCost;

        return (
            <div className="flex-1 overflow-auto bg-slate-50 flex flex-col">

                        <IconArrowLeft size={20}/>
                    </button>
                    <div className="flex-1 min-w-0">
