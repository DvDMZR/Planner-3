// --- SHARED UI COMPONENTS (module scope) ---
// Defined outside App() so they keep a stable component identity across

// reset whenever the parent re-renders (e.g. from remote sync polling).

const StatusBadge = ({ status }) => {
    const s = PROJECT_STATUSES.find(x => x.value === status) || PROJECT_STATUSES[0];
    return <span className={`text-xs px-2 py-0.5 rounded-full font-medium ${s.color}`}>{s.label}</span>;
};

// --- WEEK CALENDAR PICKER ---
const WeekCalendarPicker = ({ value, onChange, minWeek }) => {
    const getMonthFromWeek = (weekId) => {
        const [yearStr, wStr] = weekId.split('-W');
        const year = parseInt(yearStr), week = parseInt(wStr);
        const jan4 = new Date(year, 0, 4);
        const dow = jan4.getDay() || 7;
        const monday = new Date(year, jan4.getMonth(), jan4.getDate() - dow + 1 + (week - 1) * 7);
        return { year: monday.getFullYear(), month: monday.getMonth() };
    };
    const initial = getMonthFromWeek(value);
    const [navYear, setNavYear] = React.useState(initial.year);
    const [navMonth, setNavMonth] = React.useState(initial.month);

    const weeksInView = React.useMemo(() => {
        const firstDay = new Date(navYear, navMonth, 1);
        const lastDay = new Date(navYear, navMonth + 1, 0);
        const dow = firstDay.getDay() || 7;
        let mon = new Date(navYear, navMonth, firstDay.getDate() - dow + 1);
        const weeks = [];
        while (mon <= lastDay) {
            const sun = new Date(mon.getTime() + 6 * 86400000);
            const weekId = getWeekString(mon);
            weeks.push({ weekId, mon: new Date(mon), sun: new Date(sun) });
            mon = new Date(mon.getTime() + 7 * 86400000);
        }
        return weeks;
    }, [navYear, navMonth]);

    const prevMonth = () => {
        if (navMonth === 0) { setNavMonth(11); setNavYear(y => y - 1); }
        else setNavMonth(m => m - 1);
    };
    const nextMonth = () => {
        if (navMonth === 11) { setNavMonth(0); setNavYear(y => y + 1); }
        else setNavMonth(m => m + 1);
    };

    return (
        <div className="border border-slate-200 rounded-lg overflow-hidden bg-white shadow-sm">
            <div className="flex items-center justify-between bg-slate-50 px-3 py-2 border-b border-slate-200">
                <button type="button" onClick={prevMonth} className="text-slate-500 hover:text-slate-800 p-0.5 rounded hover:bg-slate-200 transition-colors">
                    <IconChevronLeft size={14}/>
                </button>
                <span className="text-xs font-semibold text-slate-700">{MONTH_NAMES[navMonth]} {navYear}</span>
                <button type="button" onClick={nextMonth} className="text-slate-500 hover:text-slate-800 p-0.5 rounded hover:bg-slate-200 transition-colors">
                    <IconChevronRight size={14}/>
                </button>
            </div>
            <div className="p-1 space-y-0.5 max-h-48 overflow-y-auto">
                {weeksInView.map(({ weekId, mon, sun }) => {
                    const isSelected = weekId === value;
                    const isDisabled = minWeek && weekId <= minWeek;
                    const kw = parseInt(weekId.split('-W')[1]);
                    return (
                        <button key={weekId} type="button"
                            disabled={isDisabled}
                            onClick={() => !isDisabled && onChange(weekId)}
                            className={`w-full flex items-center justify-between px-2 py-1.5 rounded text-xs transition-colors
                                ${isSelected ? 'bg-gea-600 text-white font-medium' :
                                  isDisabled ? 'text-slate-300 cursor-not-allowed' :
                                  'text-slate-700 hover:bg-gea-50 hover:text-gea-700 cursor-pointer'}`}>
                            <span className="font-semibold">KW {kw}</span>
                            <span className={`text-[10px] ${isSelected ? 'opacity-80' : 'text-slate-400'}`}>
                                {mon.getDate()}.{mon.getMonth()+1}. – {sun.getDate()}.{sun.getMonth()+1}.
                            </span>
                        </button>
                    );
                })}
            </div>
        </div>
    );
};

// --- EXTRACTED MODAL COMPONENTS (module scope) ---
// Defined outside App() so their internal useState survives parent re-renders.
// If they were defined inside App() they'd get a new function identity every
// render — React would treat each render as a new component type, unmount the
// previous instance, and reset form state (e.g. while sync polling is active).

const AssignmentModal = ({
    assignContext,
    employeeById,
    basicTasks,
    basicTasksMeta,
    offtimeTasks,
    inactiveOfftimeTasks,
    inactiveSupportTasks,
    inactiveTrainingTasks,
    projects,
    computeAutoStatus,
    getUtilization,
    getEmpWeeklyHours,
    setBasicTasks,
    setBasicTasksMeta,
    onClose,
    onSave,
    onDelete,
    onDeleteSeries,
}) => {
    const empWeeklyHours = employeeById.get(assignContext.empId)?.weeklyHours ?? HOURS_PER_WEEK;
    const activeSupportTasks = SUPPORT_TASKS.filter(t => !(inactiveSupportTasks || []).includes(t));
    const activeTrainingTasks = TRAINING_TASKS.filter(t => !(inactiveTrainingTasks || []).includes(t));
    const activeOfftimeTasks = offtimeTasks.filter(t => !(inactiveOfftimeTasks || []).some(iot => iot.name === t));
    const otherTasks = basicTasks.filter(t => basicTasksMeta && basicTasksMeta[t]);

    const getInitialType = () => {
        const ex = assignContext.existing;
        if (!ex) return 'basic';
        return ex.type || 'basic';
    };
    const getInitialRef = (type) => {
        const ex = assignContext.existing;
        if (ex) return ex.reference || '';
        if (type === 'project') return projects.find(p => ['active','planned'].includes(computeAutoStatus(p)))?.id || '';
        if (type === 'basic') return basicTasks.filter(t => !basicTasksMeta?.[t])[0] || basicTasks[0] || '';
        if (type === 'support') return activeSupportTasks[0] || '';
        if (type === 'training') return activeTrainingTasks[0] || '';
        if (type === 'other') return otherTasks[0] || '';
        if (type === 'offtime') return activeOfftimeTasks[0] || '';
        return '';
    };

    const initType = getInitialType();
    const [formData, setFormData] = useState(assignContext.existing || {
        empId: assignContext.empId,
        week: assignContext.week,
        type: initType,
        reference: getInitialRef(initType),
        hours: empWeeklyHours
    });
    const [newTaskName, setNewTaskName] = useState('');
    const [recurRule, setRecurRule] = useState({ enabled: false, everyXWeeks: 1, endWeek: addWeeks(assignContext.week || formData.week, 4) });

    const emp = employeeById.get(formData.empId);
    const pct = Math.round((formData.hours ?? empWeeklyHours) / empWeeklyHours * 100);

    const handleTypeChange = (type) => {
        let ref = '';
        if (type === 'project') ref = projects.find(p => ['active','planned'].includes(computeAutoStatus(p)))?.id || '';
        else if (type === 'basic') ref = basicTasks.filter(t => !basicTasksMeta?.[t])[0] || basicTasks[0] || '';
        else if (type === 'support') ref = activeSupportTasks[0] || '';
        else if (type === 'training') ref = activeTrainingTasks[0] || '';
        else if (type === 'other') ref = otherTasks[0] || '';
        else if (type === 'offtime') ref = activeOfftimeTasks[0] || '';
        setFormData({...formData, type, reference: ref});
        setNewTaskName('');
    };

    const handleSave = () => {
        let data = { ...formData };
        if (formData.type === 'new') {
            const trimmed = newTaskName.trim();
            if (!trimmed) return;
            if (!basicTasks.includes(trimmed)) {
                setBasicTasks(prev => [...prev, trimmed]);
                setBasicTasksMeta(prev => ({...prev, [trimmed]: { createdAt: new Date().toISOString(), permanent: false }}));
            }
            data = { ...formData, type: 'other', reference: trimmed };
        }
        const weeklyH = getEmpWeeklyHours(formData.empId);
        const { total: currentTotal } = getUtilization(formData.empId, formData.week);
        const existingH = assignContext?.existing
            ? (assignContext.existing.hours ?? ((assignContext.existing.percent ?? 100) / 100 * weeklyH))
            : 0;
        const newH = data.hours ?? weeklyH;
        const newTotal = currentTotal - (existingH / weeklyH * 100) + (newH / weeklyH * 100);
        if (newTotal > 100) {
            const empName = employeeById.get(formData.empId)?.name || '';
            if (!window.confirm(`${empName} wäre diese Woche bei ${Math.round(newTotal)} % — trotzdem speichern?`)) return;
        }
        if (recurRule.enabled && !data.id && recurRule.endWeek > formData.week) {
            const ruleId = makeId('rule');
            const series = [];
            let cur = formData.week;
            while (cur <= recurRule.endWeek) {
                series.push({ ...data, week: cur, id: makeId('ass'), ruleId });
                cur = addWeeks(cur, recurRule.everyXWeeks);
            }
            onSave(series);
            return;
        }
        onSave(data);
    };

    const TYPE_BUTTONS = [
        { value: 'training', label: 'Training' },
        { value: 'support',  label: 'Support' },
        { value: 'basic',    label: 'Basic' },
        { value: 'other',    label: 'Other' },
        { value: 'project',  label: 'Projekt' },
        { value: 'offtime',  label: 'Offtime' },
        { value: 'new',      label: '+ Neu' },
    ];

    const hardcodedBasicTasks = basicTasks.filter(t => !basicTasksMeta?.[t]);

    return (
        <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
            <div className="bg-white rounded-xl shadow-xl w-full max-w-md overflow-hidden">
                <ModalHeader title={formData.id ? 'Planung bearbeiten' : 'Planung hinzufügen'} onClose={onClose} />
                <div className="p-6 space-y-4">
                    <div className="text-sm text-slate-500">
                        <span className="text-slate-900 font-medium">{emp?.name}</span>
                        <span className="mx-2">·</span>
                        <span className="font-medium text-slate-700">{formData.week}</span>
                    </div>

                    <div>
                        <label className="block text-xs text-slate-500 mb-1 font-medium uppercase tracking-wide">Typ</label>
                        <div className="grid grid-cols-4 gap-1">
                            {TYPE_BUTTONS.map(opt => (
                                <button key={opt.value} onClick={() => handleTypeChange(opt.value)}
                                    className={`py-2 px-1 text-xs rounded-md border font-medium transition-colors ${formData.type === opt.value ? 'bg-gea-600 text-white border-gea-600' : 'bg-white text-slate-600 border-slate-300 hover:border-gea-400'}`}>
                                    {opt.label}
                                </button>
                            ))}
                        </div>
                    </div>

                    {formData.type === 'new' && (
                        <div>
                            <label className="block text-xs text-slate-500 mb-1 font-medium">Neuer Task-Name (Other)</label>
                            <input type="text" value={newTaskName} onChange={e => setNewTaskName(e.target.value)}
                                autoFocus
                                placeholder="z.B. Meeting, Workshop, …"
                                className="w-full p-2 border border-slate-300 rounded-md text-sm"/>
                            <p className="text-xs text-slate-400 mt-1">Wird als Other-Task gespeichert und zur Liste hinzugefügt.</p>
                        </div>
                    )}

                    {formData.type !== 'new' && (
                        <div>
                            <label className="block text-xs text-slate-500 mb-1 font-medium uppercase tracking-wide">Auswahl</label>
                            {formData.type === 'project' && (
                                <select value={formData.reference} onChange={e => setFormData({...formData, reference: e.target.value})} className="w-full p-2 border border-slate-300 rounded-md text-sm">
                                    {projects.filter(p => ['active','planned'].includes(computeAutoStatus(p))).map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
                                </select>
                            )}
                            {formData.type === 'basic' && (
                                <select value={formData.reference} onChange={e => setFormData({...formData, reference: e.target.value})} className="w-full p-2 border border-slate-300 rounded-md text-sm">
                                    {hardcodedBasicTasks.map(t => <option key={t} value={t}>{t}</option>)}
                                </select>
                            )}
                            {formData.type === 'other' && (
                                <select value={formData.reference} onChange={e => setFormData({...formData, reference: e.target.value})} className="w-full p-2 border border-slate-300 rounded-md text-sm">
                                    {otherTasks.length > 0
                                        ? otherTasks.map(t => <option key={t} value={t}>{t}</option>)
                                        : <option value="">— Noch keine Other-Tasks (+ Neu verwenden) —</option>}
                                </select>
                            )}
                            {formData.type === 'support' && (
                                <select value={formData.reference} onChange={e => setFormData({...formData, reference: e.target.value})} className="w-full p-2 border border-slate-300 rounded-md text-sm">
                                    {activeSupportTasks.map(t => <option key={t} value={t}>{t}</option>)}
                                </select>
                            )}
                            {formData.type === 'training' && (
                                <select value={formData.reference} onChange={e => setFormData({...formData, reference: e.target.value})} className="w-full p-2 border border-slate-300 rounded-md text-sm">
                                    {activeTrainingTasks.map(t => <option key={t} value={t}>{t}</option>)}
                                </select>
                            )}
                            {formData.type === 'offtime' && (
                                <select value={formData.reference} onChange={e => setFormData({...formData, reference: e.target.value})} className="w-full p-2 border border-slate-300 rounded-md text-sm">
                                    {activeOfftimeTasks.map(t => <option key={t} value={t}>{t}</option>)}
                                </select>
                            )}
                        </div>
                    )}

                    <div>
                        <label className="block text-xs text-slate-500 mb-2 font-medium uppercase tracking-wide">
                            Auslastung: <span className="text-gea-600 font-medium">{pct}%</span>
                            <span className="text-slate-400 ml-2">({formData.hours ?? HOURS_PER_WEEK}h)</span>
                        </label>
                        <input type="range" min="0" max="200" step="10"
                            value={pct}
                            onChange={e => setFormData({...formData, hours: Math.round(parseInt(e.target.value) / 100 * empWeeklyHours)})}
                            className="w-full accent-gea-600"/>
                        <div className="flex justify-between text-xs text-slate-400 mt-1">
                            <span>0%</span><span>50%</span><span>100%</span><span>150%</span><span>200%</span>
                        </div>
                    </div>

                    <div>
                        <label className="block text-xs text-slate-500 mb-1 font-medium uppercase tracking-wide">Kommentar (optional)</label>
                        <textarea
                            value={formData.comment || ''}
                            onChange={e => setFormData({...formData, comment: e.target.value})}
                            placeholder="Notiz zu dieser Planung…"
                            rows={2}
                            className="w-full p-2 border border-slate-300 rounded-md text-sm resize-none focus:outline-none focus:ring-1 focus:ring-gea-400"
                        />
                    </div>

                    <div className="border-t border-slate-100 pt-3">
                        {!formData.id && (
                        <label className="flex items-center gap-2 cursor-pointer select-none">
                            <input type="checkbox"
                                checked={recurRule.enabled}
                                onChange={e => setRecurRule(r => ({ ...r, enabled: e.target.checked }))}
                                className="rounded accent-gea-600"/>
                            <span className="text-xs font-medium uppercase tracking-wide text-slate-500 flex items-center gap-1">
                                <IconRepeat size={12}/> Wiederkehrend (Regel)
                            </span>
                        </label>
                        )}
                        {recurRule.enabled && !formData.id && (
                            <div className="mt-2 space-y-2">
                                <div className="flex items-center gap-3">
                                    <div>
                                        <label className="block text-xs text-slate-400 mb-1">Alle X Wochen</label>
                                        <input type="number" min="1" max="52"
                                            value={recurRule.everyXWeeks}
                                            onChange={e => setRecurRule(r => ({ ...r, everyXWeeks: Math.max(1, parseInt(e.target.value)||1) }))}
                                            className="w-20 p-2 border border-slate-300 rounded-md text-sm text-center"/>
                                    </div>
                                    <div className="flex-1">
                                        <label className="block text-xs text-slate-400 mb-1">Bis Woche</label>
                                        <input type="week"
                                            value={recurRule.endWeek}
                                            min={addWeeks(formData.week, 1)}
                                            onChange={e => setRecurRule(r => ({ ...r, endWeek: e.target.value }))}
                                            className="w-full p-2 border border-slate-300 rounded text-sm focus:outline-none focus:ring-1 focus:ring-gea-400"/>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
                <div className="p-4 bg-slate-50 border-t border-slate-100 flex justify-between">
                    {formData.id ? (
                        <div className="flex gap-1">
                            <button onClick={() => onDelete(formData.id)} className="text-rose-600 text-sm hover:bg-rose-50 px-3 py-2 rounded font-medium">Löschen</button>
                            {formData.ruleId && onDeleteSeries && (
                                <button onClick={() => onDeleteSeries(formData.id)} className="text-rose-500 text-xs hover:bg-rose-50 px-2 py-1 rounded font-medium border border-rose-200 flex items-center gap-1" title="Diese und alle späteren Instanzen der Serie löschen">
                                    <IconRepeat size={11}/> Serie ab hier löschen
                                </button>
                            )}
                        </div>
                    ) : <div/>}
                    <div className="flex gap-2">
                        <button onClick={onClose} className="px-4 py-2 text-sm text-slate-600 bg-white border border-slate-300 rounded-md hover:bg-slate-50 font-medium">Abbrechen</button>
                        <button onClick={handleSave} className="px-4 py-2 text-sm text-white bg-gea-600 rounded-md hover:bg-gea-700 font-medium">Speichern</button>
                    </div>
                </div>
            </div>
        </div>
    );
};

const CopyModal = ({
    copyContext,
    activeEmps,
    empsByCategory,
    empCategories,
    weeks,
    projectById,
    assignments,
    setAssignments,
    onClose,
}) => {
    const { assignment } = copyContext;

    const [selWeeks, setSelWeeks] = useState({});
    const [selEmps, setSelEmps] = useState({});
    const [collapsedTeams, setCollapsedTeams] = useState(() => {
        const init = {};
        (empCategories || []).forEach(cat => { init[cat] = true; });
        return init;
    });

    const toggleWeek = (wId) => setSelWeeks(prev => ({...prev, [wId]: !prev[wId]}));
    const toggleEmp = (eId) => setSelEmps(prev => ({...prev, [eId]: !prev[eId]}));
    const toggleTeam = (cat) => setCollapsedTeams(prev => ({...prev, [cat]: !prev[cat]}));
    const toggleAllWeeks = () => {
        const allSelected = weeks.every(w => selWeeks[w.id]);
        const next = {};
        weeks.forEach(w => { next[w.id] = !allSelected; });
        setSelWeeks(next);
    };
    const toggleAllInTeam = (cat) => {
        const catEmps = empsByCategory?.get(cat) || [];
        const allSel = catEmps.every(e => selEmps[e.id]);
        setSelEmps(prev => {
            const next = {...prev};
            catEmps.forEach(e => { next[e.id] = !allSel; });
            return next;
        });
    };

    let label = assignment.reference;
    if (assignment.type === 'project') {
        const p = projectById.get(assignment.reference);
        label = p ? p.name : assignment.reference;
    }

    const handleCopy = () => {
        const targetWeeks = weeks.filter(w => selWeeks[w.id]).map(w => w.id);
        const targetEmps = activeEmps.filter(e => selEmps[e.id]).map(e => e.id);
        if (targetWeeks.length === 0 || targetEmps.length === 0) return;
        const newAssignments = [];
        targetEmps.forEach(empId => {
            targetWeeks.forEach(week => {
                if (empId === assignment.empId && week === assignment.week) return;
                const exists = assignments.some(a => a.empId === empId && a.week === week && a.reference === assignment.reference && a.type === assignment.type);
                if (!exists) {
                    newAssignments.push({ ...assignment, id: makeId('ass'), empId, week });
                }
            });
        });
        setAssignments(prev => [...prev, ...newAssignments]);
        onClose();
    };

    const pct = Math.round((assignment.hours ?? HOURS_PER_WEEK) / HOURS_PER_WEEK * 100);
    const selEmpCount = Object.values(selEmps).filter(Boolean).length;
    const selWeekCount = Object.values(selWeeks).filter(Boolean).length;

    // Use team grouping if available, otherwise fall back to flat list
    const useTeams = empsByCategory && empCategories && empCategories.length > 0;

    return (
        <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
            <div className="bg-white rounded-xl shadow-xl w-full max-w-4xl max-h-[90vh] flex flex-col overflow-hidden">
                <ModalHeader title="Task kopieren" subtitle={`"${label}" · ${pct}%`} onClose={onClose}/>
                <div className="flex-1 overflow-y-auto p-6 space-y-6">

                    {/* Employee selection – grouped by team */}
                    <div>
                        <h4 className="text-sm font-medium text-slate-700 mb-3">Mitarbeiter auswählen</h4>
                        {useTeams ? (
                            <div className="space-y-2 border border-slate-200 rounded-lg overflow-hidden">
                                {empCategories.map(cat => {
                                    const catEmps = empsByCategory.get(cat) || [];
                                    if (catEmps.length === 0) return null;
                                    const isCollapsed = collapsedTeams[cat];
                                    const selInTeam = catEmps.filter(e => selEmps[e.id]).length;
                                    const allInTeam = catEmps.every(e => selEmps[e.id]);
                                    return (
                                        <div key={cat} className="border-b border-slate-100 last:border-0">
                                            <div className="flex items-center gap-2 px-3 py-2 bg-slate-50 hover:bg-slate-100 transition-colors">
                                                <button onClick={() => toggleTeam(cat)} className="flex items-center gap-2 flex-1 text-left">
                                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={`text-slate-400 transition-transform ${isCollapsed ? '-rotate-90' : ''}`}><polyline points="6 9 12 15 18 9"/></svg>
                                                    <span className="text-xs font-semibold text-slate-600 uppercase tracking-wide">{cat}</span>
                                                    {selInTeam > 0 && <span className="ml-1 text-xs bg-gea-100 text-gea-700 px-1.5 py-0.5 rounded-full font-medium">{selInTeam}/{catEmps.length}</span>}
                                                </button>
                                                <button onClick={() => toggleAllInTeam(cat)} className={`text-xs font-medium px-2 py-0.5 rounded transition-colors ${allInTeam ? 'text-gea-600 hover:text-gea-800' : 'text-slate-500 hover:text-gea-600'}`}>
                                                    {allInTeam ? 'Alle ab' : 'Alle'}
                                                </button>
                                            </div>
                                            {!isCollapsed && (
                                                <div className="flex flex-wrap gap-2 px-3 py-2.5 bg-white">
                                                    {catEmps.map(e => (
                                                        <button key={e.id} onClick={() => toggleEmp(e.id)}
                                                            className={`px-3 py-1.5 rounded-full text-sm border font-medium transition-colors ${selEmps[e.id] ? 'bg-gea-600 text-white border-gea-600' : 'bg-white text-slate-600 border-slate-300 hover:border-gea-400'}`}>
                                                            {e.name}
                                                        </button>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                    );
                                })}
                            </div>
                        ) : (
                            <div className="flex flex-wrap gap-2">
                                {activeEmps.map(e => (
                                    <button key={e.id} onClick={() => toggleEmp(e.id)}
                                        className={`px-3 py-1.5 rounded-full text-sm border font-medium transition-colors ${selEmps[e.id] ? 'bg-gea-600 text-white border-gea-600' : 'bg-white text-slate-600 border-slate-300 hover:border-gea-400'}`}>
                                        {e.name}
                                    </button>
                                ))}
                            </div>
                        )}
                    </div>

                    {/* Week selection */}
                    <div>
                        <div className="flex justify-between items-center mb-3">
                            <h4 className="text-sm font-medium text-slate-700">Wochen auswählen</h4>
                            <button onClick={toggleAllWeeks} className="text-xs text-gea-600 hover:text-gea-700 font-medium">
                                Alle {weeks.every(w => selWeeks[w.id]) ? 'abwählen' : 'auswählen'}
                            </button>
                        </div>
                        <div className="flex flex-wrap gap-1.5 max-h-48 overflow-y-auto">
                            {weeks.map(w => {
                                const isSource = w.id === assignment.week;
                                return (
                                    <button key={w.id} onClick={() => toggleWeek(w.id)}
                                        title={isSource ? 'Ursprungswoche (für andere MA kopierbar)' : ''}
                                        className={`px-2.5 py-1 rounded text-xs border font-medium transition-colors ${selWeeks[w.id] ? 'bg-gea-600 text-white border-gea-600' : isSource ? 'bg-amber-50 text-amber-700 border-amber-300 hover:border-gea-400' : 'bg-white text-slate-600 border-slate-200 hover:border-gea-300'}`}>
                                        {w.label}{isSource ? ' ★' : ''}
                                    </button>
                                );
                            })}
                        </div>
                    </div>
                </div>
                <div className="p-4 bg-slate-50 border-t border-slate-100 flex justify-between items-center">
                    <span className="text-xs text-slate-400">
                        {selEmpCount} MA × {selWeekCount} KW = {selEmpCount * selWeekCount} Einträge
                    </span>
                    <div className="flex gap-2">
                        <button onClick={onClose} className="px-4 py-2 text-sm text-slate-600 bg-white border border-slate-300 rounded-md hover:bg-slate-50 font-medium">Abbrechen</button>
                        <button onClick={handleCopy} className="px-4 py-2 text-sm text-white bg-gea-600 rounded-md hover:bg-gea-700 font-medium flex items-center gap-2">
                            <IconCopy size={15}/> Kopieren
                        </button>
                    </div>
                </div>
            </div>
        </div>
    );
};

const CostItemModal = ({
    projectId,
    existingItem,
    assignments,
    employees,
    costItems,
    setCostItems,
    onClose,
}) => {
    const projAssignments = assignments.filter(a => a.reference === projectId);
    const empIds = [...new Set(projAssignments.map(a => a.empId))];
    const projEmployees = employees.filter(e => empIds.includes(e.id));

    const kwRangeFromDates = (from, to) => {
        if (!from) return null;
        const kwFrom = parseInt(getWeekString(new Date(from)).split('-W')[1]);
        const kwTo = to ? parseInt(getWeekString(new Date(to)).split('-W')[1]) : kwFrom;
        return kwFrom === kwTo ? `KW${kwFrom}` : `KW${kwFrom}–${kwTo}`;
    };

    const [form, setForm] = useState({
        empId: existingItem?.empId || projEmployees[0]?.id || '',
        type: existingItem?.type || 'Reisekosten',
        description: existingItem?.description || '',
        dateFrom: existingItem?.dateFrom || '',
        dateTo: existingItem?.dateTo || '',
        hours: existingItem?.hours != null ? String(existingItem.hours) : '',
        hourlyRate: existingItem?.hourlyRate != null ? String(existingItem.hourlyRate) : '',
        amount: existingItem?.amount != null ? String(existingItem.amount) : '',
    });

    const [extraCosts, setExtraCosts] = useState(
        existingItem?.extraCosts || []
    );

    const updateExtra = (i, field, val) =>
        setExtraCosts(prev => prev.map((c, idx) => idx === i ? {...c, [field]: val} : c));
    const addExtra = () =>
        setExtraCosts(prev => [...prev, { id: makeId('ec'), type: '', amount: '' }]);
    const removeExtra = (i) =>
        setExtraCosts(prev => prev.filter((_, idx) => idx !== i));

    const autoAmount = (form.hours !== '' && form.hourlyRate !== '')
        ? (parseFloat(form.hours) || 0) * (parseFloat(form.hourlyRate) || 0)
        : null;

    const handleSave = () => {
        if (!form.empId) return;
        const mainAmount = autoAmount !== null ? autoAmount : parseFloat(form.amount) || 0;
        const extraTotal = extraCosts.reduce((s, c) => s + (parseFloat(c.amount) || 0), 0);
        const item = {
            id: existingItem?.id || makeId('ci'),
            projectId,
            empId: form.empId,
            type: form.type,
            description: form.description,
            dateFrom: form.dateFrom || null,
            dateTo: form.dateTo || null,
            week: form.dateFrom ? getWeekString(new Date(form.dateFrom)) : null,
            hours: form.hours !== '' ? parseFloat(form.hours) : null,
            hourlyRate: form.hourlyRate !== '' ? parseFloat(form.hourlyRate) : null,
            amount: mainAmount + extraTotal,
            mainAmount,
            extraCosts: extraCosts.filter(c => c.type || c.amount).map(c => ({
                ...c, amount: parseFloat(c.amount) || 0
            })),
        };
        if (existingItem) {
            setCostItems(costItems.map(c => c.id === existingItem.id ? item : c));
        } else {
            setCostItems([...costItems, item]);
        }
        onClose();
    };

    const handleDelete = () => {
        setCostItems(costItems.filter(c => c.id !== existingItem.id));
        onClose();
    };

    const kwLabel = kwRangeFromDates(form.dateFrom, form.dateTo);

    return (
        <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
            <div className="bg-white rounded-xl shadow-xl w-full max-w-lg overflow-hidden">
                <ModalHeader
                    title={existingItem ? 'Kostenpunkt bearbeiten' : 'Kostenpunkt erfassen'}
                    onClose={onClose}
                />
                <div className="p-6 space-y-4 overflow-y-auto max-h-[80vh]">
                    {/* Mitarbeiter */}
                    <div>
                        <label className="block text-xs text-slate-500 mb-1 font-medium">Mitarbeiter</label>
                        <select value={form.empId} onChange={e => setForm({...form, empId: e.target.value})}
                            className="w-full p-2 border border-slate-300 rounded-md text-sm">
                            <option value="">Bitte wählen…</option>
                            {projEmployees.map(e => <option key={e.id} value={e.id}>{e.name}</option>)}
                            {employees.filter(e => !empIds.includes(e.id)).map(e =>
                                <option key={e.id} value={e.id}>{e.name} (nicht verplant)</option>
                            )}
                        </select>
                    </div>

                    {/* Typ */}
                    <div>
                        <label className="block text-xs text-slate-500 mb-1 font-medium">Art</label>
                        <select value={form.type} onChange={e => setForm({...form, type: e.target.value})}
                            className="w-full p-2 border border-slate-300 rounded-md text-sm">
                            <option value="Reisekosten">Reisekosten</option>
                            <option value="Dienstleistung">Dienstleistung</option>
                            <option value="Sonstiges">Sonstiges</option>
                        </select>
                    </div>

                    {/* Beschreibung */}
                    <div>
                        <label className="block text-xs text-slate-500 mb-1 font-medium">Beschreibung</label>
                        <input type="text" value={form.description}
                            onChange={e => setForm({...form, description: e.target.value})}
                            placeholder="z.B. Vor-Ort-Einsatz"
                            className="w-full p-2 border border-slate-300 rounded-md text-sm"/>
                    </div>

                    {/* Zeitraum */}
                    <div>
                        <label className="block text-xs text-slate-500 mb-1 font-medium">
                            Zeitraum (optional)
                            {kwLabel && <span className="ml-2 text-gea-600 font-medium">{kwLabel}</span>}
                        </label>
                        <div className="grid grid-cols-2 gap-3">
                            <div>
                                <span className="block text-xs text-slate-400 mb-1">Von</span>
                                <input type="date" value={form.dateFrom}
                                    onChange={e => setForm({...form, dateFrom: e.target.value})}
                                    className="w-full p-2 border border-slate-300 rounded-md text-sm"/>
                            </div>
                            <div>
                                <span className="block text-xs text-slate-400 mb-1">Bis</span>
                                <input type="date" value={form.dateTo}
                                    min={form.dateFrom}
                                    onChange={e => setForm({...form, dateTo: e.target.value})}
                                    className="w-full p-2 border border-slate-300 rounded-md text-sm"/>
                            </div>
                        </div>
                    </div>

                    {/* Stunden + Rate + Betrag */}
                    <div className="grid grid-cols-3 gap-3">
                        <div>
                            <label className="block text-xs text-slate-500 mb-1 font-medium">Stunden (opt.)</label>
                            <input type="number" min="0" step="0.5" value={form.hours}
                                onChange={e => setForm({...form, hours: e.target.value})}
                                className="w-full p-2 border border-slate-300 rounded-md text-sm" placeholder="z.B. 40"/>
                        </div>
                        <div>
                            <label className="block text-xs text-slate-500 mb-1 font-medium">€/Std. (opt.)</label>
                            <input type="number" min="0" step="1" value={form.hourlyRate}
                                onChange={e => setForm({...form, hourlyRate: e.target.value})}
                                className="w-full p-2 border border-slate-300 rounded-md text-sm" placeholder={`${DEFAULT_HOURLY_RATE}`}/>
                        </div>
                        <div>
                            <label className="block text-xs text-slate-500 mb-1 font-medium">
                                Betrag (€){autoAmount !== null && <span className="ml-1 text-gea-600">= {autoAmount.toFixed(2)}</span>}
                            </label>
                            <input type="number" min="0" step="0.01"
                                value={autoAmount !== null ? autoAmount.toFixed(2) : form.amount}
                                onChange={e => setForm({...form, amount: e.target.value})}
                                disabled={autoAmount !== null}
                                className={`w-full p-2 border border-slate-300 rounded-md text-sm ${autoAmount !== null ? 'bg-slate-50 text-slate-400' : ''}`}
                                placeholder="0.00"/>
                        </div>
                    </div>

                    {/* Zusatzkosten */}
                    <div className="border border-slate-200 rounded-lg overflow-hidden">
                        <div className="px-4 py-3 bg-slate-50 border-b border-slate-200 flex items-center justify-between">
                            <span className="text-xs font-medium text-slate-600">Weitere Kosten</span>
                            <button onClick={addExtra}
                                className="text-xs text-gea-600 hover:text-gea-700 font-medium flex items-center gap-1">
                                <IconPlus size={12}/> Hinzufügen
                            </button>
                        </div>
                        {extraCosts.length === 0 ? (
                            <div className="px-4 py-3 text-xs text-slate-400">
                                Noch keine Zusatzkosten. Auf <strong>+ Hinzufügen</strong> klicken.
                            </div>
                        ) : (
                            <div className="p-3 space-y-2">
                                {extraCosts.map((c, i) => (
                                    <div key={c.id} className="flex gap-2 items-center">
                                        <input type="text" value={c.type}
                                            onChange={e => updateExtra(i, 'type', e.target.value)}
                                            placeholder="Kostenart (z.B. Dienstleistung)"
                                            className="flex-1 p-2 border border-slate-300 rounded text-sm"/>
                                        <input type="number" min="0" step="0.01" value={c.amount}
                                            onChange={e => updateExtra(i, 'amount', e.target.value)}
                                            placeholder="€"
                                            className="w-28 p-2 border border-slate-300 rounded text-sm"/>
                                        <button onClick={() => removeExtra(i)}
                                            className="text-slate-400 hover:text-rose-500 p-1 flex-shrink-0"><IconX size={14}/></button>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
                <div className="p-4 bg-slate-50 border-t border-slate-100 flex justify-between">
                    {existingItem ? (
                        <button onClick={handleDelete} className="text-rose-600 text-sm hover:bg-rose-50 px-3 py-2 rounded font-medium">Löschen</button>
                    ) : <div/>}
                    <div className="flex gap-2">
                        <button onClick={onClose} className="px-4 py-2 text-sm text-slate-600 bg-white border border-slate-300 rounded-md hover:bg-slate-50 font-medium">Abbrechen</button>
                        <button onClick={handleSave} className="px-4 py-2 text-sm text-white bg-gea-600 rounded-md hover:bg-gea-700 font-medium">Speichern</button>
                    </div>
                </div>
            </div>
        </div>
    );
};

const DepsSection = () => {
    const [latest, setLatest] = React.useState({});
    const [checking, setChecking] = React.useState(false);
    const [checked, setChecked] = React.useState(false);

    const checkUpdates = async () => {
        setChecking(true);
        const results = {};
        await Promise.all(DEPS_LIST.map(async dep => {
            try {
                const r = await fetch(`https://registry.npmjs.org/${encodeURIComponent(dep.pkg)}/latest`, { cache: 'no-store' });
                if (!r.ok) throw new Error('http ' + r.status);
                const d = await r.json();
                results[dep.pkg] = d.version || '–';
            } catch(e) {
                results[dep.pkg] = '–';
            }
        }));
        setLatest(results);
        setChecking(false);
        setChecked(true);
    };

    return (
        <div className="mt-8 text-left border border-slate-200 rounded-lg overflow-hidden">
            <div className="flex items-center justify-between px-4 py-3 bg-slate-50 border-b border-slate-200">
                <div>
                    <span className="text-sm font-semibold text-slate-700">Verwendete Bibliotheken</span>
                    <p className="text-xs text-slate-400 mt-0.5">Externe Skripte, die beim Laden der Seite eingebunden werden (CDN).</p>
                </div>
                <button onClick={checkUpdates} disabled={checking}
                    className="text-xs px-3 py-1.5 bg-white border border-slate-300 rounded-md text-slate-600 hover:border-gea-400 hover:text-gea-700 transition-colors disabled:opacity-50 flex items-center gap-1.5">
                    {checking ? <><svg className="animate-spin" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>Prüfe…</> : 'Auf Updates prüfen'}
                </button>
            </div>
            <table className="w-full text-xs">
                <thead>
                    <tr className="text-left text-slate-500 border-b border-slate-100">
                        <th className="px-4 py-2 font-medium">Bibliothek</th>
                        <th className="px-4 py-2 font-medium">Geladen</th>
                        {checked && <th className="px-4 py-2 font-medium">Aktuell</th>}
                        <th className="px-4 py-2 font-medium">Quelle</th>
                    </tr>
                </thead>
                <tbody className="divide-y divide-slate-50">
                    {DEPS_LIST.map(dep => {
                        const loaded = dep.getLoaded();
                        const latestVer = latest[dep.pkg];
                        const isUpToDate = latestVer && loaded && latestVer === loaded;
                        const isOutdated = latestVer && loaded && latestVer !== loaded && loaded !== '(Play CDN)';
                        return (
                            <tr key={dep.pkg} className="hover:bg-slate-50">
                                <td className="px-4 py-2.5 font-medium text-slate-700">
                                    <span className="flex items-center gap-1.5">
                                        {dep.name}
                                        <span className="relative group/tip cursor-help">
                                            <span className="inline-flex items-center justify-center w-3.5 h-3.5 rounded-full bg-slate-200 text-slate-500 text-xs font-bold leading-none select-none">?</span>
                                            <span className="pointer-events-none absolute left-5 top-0 z-50 w-64 bg-slate-800 text-white text-xs rounded-lg px-3 py-2 opacity-0 group-hover/tip:opacity-100 transition-opacity shadow-lg" style={{whiteSpace:'normal'}}>
                                                {dep.desc}
                                            </span>
                                        </span>
                                    </span>
                                </td>
                                <td className="px-4 py-2.5">
                                    {loaded
                                        ? <span className="font-mono text-slate-600">{loaded}</span>
                                        : <span className="text-slate-400">–</span>}
                                </td>
                                {checked && (
                                    <td className="px-4 py-2.5">
                                        {latestVer && latestVer !== '–'
                                            ? <span className={`font-mono px-1.5 py-0.5 rounded text-xs ${isUpToDate ? 'bg-emerald-50 text-emerald-700' : isOutdated ? 'bg-amber-50 text-amber-700' : 'bg-slate-100 text-slate-500'}`}>
                                                {latestVer} {isUpToDate ? '✓' : isOutdated ? '↑' : ''}
                                              </span>
                                            : <span className="text-slate-400">–</span>}
                                    </td>
                                )}
                                <td className="px-4 py-2.5 max-w-xs">
                                    <a href={dep.cdnUrl} target="_blank" rel="noopener noreferrer"
                                        className="text-gea-600 hover:text-gea-800 underline truncate block font-mono" style={{maxWidth:'220px'}}>
                                        {dep.cdnUrl.replace('https://', '')}
                                    </a>
                                </td>
                            </tr>
                        );
                    })}
                </tbody>
            </table>
            <div className="px-4 py-2.5 bg-slate-50 border-t border-slate-100">
                <p className="text-xs text-slate-400">Alle Verbindungen erfolgen über <strong className="text-slate-500">HTTPS</strong>. Quellen: <strong className="text-slate-500">unpkg.com</strong>, <strong className="text-slate-500">cdn.tailwindcss.com</strong>. Die App läuft vollständig im Browser – kein Backend, keine Telemetrie.</p>
            </div>
        </div>
    );
};

    const [basicTasksMeta, setBasicTasksMeta] = useState({});       // { [taskName]: { createdAt: ISO, permanent: bool, color?: string } }

    // Ansichten-Steuerung für Projekt-Details
    const [selectedProjectDetails, setSelectedProjectDetails] = useState(null);

    // Zeitspanne für Auslastungs-Berechnung
    const [weeksAhead, setWeeksAhead] = useState(DEFAULT_WEEKS_AHEAD);

    // Modals
    const [isAssignModalOpen, setIsAssignModalOpen] = useState(false);
    const [assignContext, setAssignContext] = useState(null); 
    
    const [isCostItemModalOpen, setIsCostItemModalOpen] = useState(false);
    const [editingCostItem, setEditingCostItem] = useState(null);

    const [isCopyModalOpen, setIsCopyModalOpen] = useState(false);
    const [copyContext, setCopyContext] = useState(null);
    const [isDeleteMode, setIsDeleteMode] = useState(false);
    const [pastProjectsExpanded, setPastProjectsExpanded] = useState(false);

    const [isInvoiceModalOpen, setIsInvoiceModalOpen] = useState(false);
    const [invoiceSelection, setInvoiceSelection] = useState({ emps: {}, costs: {} });
    const [invoiceRecipient, setInvoiceRecipient] = useState('');
    const [isProjFormOpen, setIsProjFormOpen] = useState(false);
    const [isHelpModalOpen, setIsHelpModalOpen] = useState(false);
    const [timelineYear, setTimelineYear] = useState(new Date().getFullYear());
    const currentWeekColRef = useRef(null);
    const resourceScrollRef = useRef(null);
    const timelineScrollRef = useRef(null);

    // Scroll current week to the left edge (right after sticky column)
    const scrollToCurrentWeek = (containerRef, stickyWidth) => {
        const container = containerRef?.current;
        const th = currentWeekColRef?.current;
        if (!container || !th) return;
        const thRect = th.getBoundingClientRect();
        const cRect = container.getBoundingClientRect();
        container.scrollLeft = container.scrollLeft + (thRect.left - cRect.left) - stickyWidth;
    };

    // Forms
    const [empForm, setEmpForm] = useState({ name: '', category: '', weeklyHours: HOURS_PER_WEEK });
    const [editingEmpId, setEditingEmpId] = useState(null);
    const [projForm, setProjForm] = useState({ name: '', category: '', projectNumber: '', address: '', startWeek: '', ibnWeek: '', color: 'gea', hourlyRate: DEFAULT_HOURLY_RATE, billable: true });
    const [editingProjectId, setEditingProjectId] = useState(null);

    // Category Forms
    const [newEmpCat, setNewEmpCat] = useState('');
    const [newProjCat, setNewProjCat] = useState('');
    const [newBasicTask, setNewBasicTask] = useState('');
    const [newOfftimeTask, setNewOfftimeTask] = useState('');
    const [expandedSetupCats, setExpandedSetupCats] = useState({ basic: true, other: false, support: false, training: false, offtime: false, empCats: false, projCats: false });

    // SharePoint / FS sync
    const syncStatusRef = useRef(SP_CONTEXT ? 'connecting' : 'local');
    const isRemoteUpdateRef = useRef(false);
    const spSaveTimer = useRef(null);
    const [syncStatus, setSyncStatusState] = useState(SP_CONTEXT ? 'connecting' : 'local');
    const setSyncStatus = (s) => { syncStatusRef.current = s; setSyncStatusState(s); };

    // File System sync (OneDrive lokal)
    const dirHandleRef = useRef(null);
    const [fsStatus, setFsStatus] = useState(FS_MODE ? 'checking' : 'off');
    // fsStatus: 'checking' | 'needs-setup' | 'needs-permission' | 'connected' | 'off'

    // Team-split sync state
    const spFileTimestampsRef = useRef({}); // { 'file.json': 'ISO', ... } for SP polling
    const fsFileTimestampsRef = useRef({}); // { 'file.json': <ms>, ... } for FS polling
    const lastSavedSpRef = useRef({});      // { filename: JSON string } for diff-based writes
    const lastSavedFsRef = useRef({});      // same for FS
    const employeesRef = useRef([]);
    const empCategoriesRef = useRef(DEFAULT_TEAMS);

    // --- INIT ---
    useEffect(() => {
        const loadData = async () => {
            let parsedData = null;
            let currentEmpCats = DEFAULT_TEAMS;

            // 0. Try File System (local OneDrive folder)
            if (FS_MODE) {
                const handle = await idbGetHandle();
                if (handle) {
                    dirHandleRef.current = handle;
                    const perm = await handle.queryPermission({ mode: 'readwrite' });
                    if (perm === 'granted') {
                        try {
                            const { state, timestamps } = await loadSplitStateFs(handle);
                            if (state && (state.employees.length || state.assignments.length || state.projects.length)) {
                                parsedData = state;
                                fsFileTimestampsRef.current = timestamps;
                                isRemoteUpdateRef.current = true;
                            }
                        } catch(e) { console.warn('[FS] load failed', e); }
                        setFsStatus('connected');
                    } else {
                        setFsStatus('needs-permission'); // Popup erscheint
                    }
                } else {
                    setFsStatus('needs-setup'); // Popup erscheint
                }
            }

            // 1. Try SharePoint first (wins over local data if available)
            if (SP_CONTEXT) {
                const runLoad = async () => {
                    const { state, timestamps } = await loadSplitStateSp(SP_CONTEXT);
                    // Treat "all empty" as fresh install → fall through to
                    // localStorage / generateInitialData so the app has
                    // sensible defaults to seed the new files.
                    if (state && (state.employees.length || state.assignments.length || state.projects.length)) {
                        parsedData = state;
                        spFileTimestampsRef.current = timestamps;
                        isRemoteUpdateRef.current = true; // Loaded from SP – don't write back
                    } else {
                        spFileTimestampsRef.current = timestamps || {};
                    }
                };
                try {
                    await runLoad();
                    setSyncStatus('idle');
                } catch(e) {
                    if (e instanceof SpAuthError) {
                        // Session expired between page load and our first
                        // REST call – try a silent refresh before giving up.
                        setSyncStatus('reconnecting');
                        const ok = await spEnsureSession(SP_CONTEXT, { interactive: false });
                        if (ok) {
                            try { await runLoad(); setSyncStatus('idle'); }
                            catch(e2) { console.warn('[SP] load retry failed', e2); setSyncStatus('needs-auth'); }
                        } else {
                            setSyncStatus('needs-auth');
                        }
                    } else {
                        console.warn('[SP] load failed', e);
                        setSyncStatus('offline');
                    }
                }
            }

            // 2. Fallback to localStorage
            if (!parsedData) {
                const savedData = localStorage.getItem('teamMasterProData');
                if (savedData) { try { parsedData = JSON.parse(savedData); } catch(e) {} }
            }

            // 3. Apply data
            if (parsedData) {
                setEmployees(parsedData.employees || []);
                setProjects(parsedData.projects || []);
                setAssignments(parsedData.assignments || []);
                setExpenses(parsedData.expenses || []);
                // Load costItems or migrate old expenses
                if (parsedData.costItems) {
                    setCostItems(parsedData.costItems);
                } else if (parsedData.expenses && parsedData.expenses.length > 0) {
                    setCostItems(migrateExpensesToCostItems(parsedData.expenses));
                }
                if (parsedData.empCategories) {
                    // Migrate old team name 'ME' → 'CSS'
                    const migratedCats = parsedData.empCategories.map(c => c === 'ME' ? 'CSS' : c);
                    if (!migratedCats.includes('I&C')) migratedCats.splice(migratedCats.indexOf('Other'), 0, 'I&C');
                    setEmpCategories(migratedCats);
                    currentEmpCats = migratedCats;
                    // Also migrate employees
                    if (parsedData.employees) {
                        parsedData.employees = parsedData.employees.map(e => e.category === 'ME' ? {...e, category: 'CSS'} : e);
                    }
                }
                if (parsedData.projCategories) setProjCategories(parsedData.projCategories);
                if (parsedData.basicTasks) {
                    const loadedMeta     = parsedData.basicTasksMeta     || {};
                    const loadedInactive = parsedData.inactiveBasicTasks || [];
                    const expiryMs = BASIC_TASK_EXPIRY_WEEKS * 7 * 24 * 60 * 60 * 1000;
                    const now = Date.now();
                    // Skip tasks that are marked permanent or have no createdAt
                    const toExpire = parsedData.basicTasks.filter(t =>
                        loadedMeta[t] && !loadedMeta[t].permanent && loadedMeta[t].createdAt &&
                        (now - new Date(loadedMeta[t].createdAt).getTime()) > expiryMs
                    );
                    if (toExpire.length > 0) {
                        setBasicTasks(parsedData.basicTasks.filter(t => !toExpire.includes(t)));
                        setInactiveBasicTasks([...loadedInactive, ...toExpire.map(t => ({ name: t, createdAt: loadedMeta[t].createdAt }))]);
                    } else {
                        setBasicTasks(parsedData.basicTasks);
                        setInactiveBasicTasks(loadedInactive);
                    }
                    setBasicTasksMeta(parsedData.basicTasksMeta || {});
                }
                if (parsedData.offtimeTasks) setOfftimeTasks(parsedData.offtimeTasks);
                if (parsedData.inactiveOfftimeTasks) setInactiveOfftimeTasks(parsedData.inactiveOfftimeTasks);
                if (parsedData.inactiveSupportTasks) setInactiveSupportTasks(parsedData.inactiveSupportTasks);
                if (parsedData.inactiveTrainingTasks) setInactiveTrainingTasks(parsedData.inactiveTrainingTasks);
                if (parsedData.invoiceRecipient) setInvoiceRecipient(parsedData.invoiceRecipient);

                // Seed diff snapshots so the first save cycle is a no-op for
                // files that are already in sync.
                try {
                    seedLastSaved(parsedData, lastSavedSpRef.current);
                    seedLastSaved(parsedData, lastSavedFsRef.current);
                } catch(e) { console.warn('[SEED] snapshot seeding failed', e); }
            } else {
                const init = generateInitialData(currentEmpCats);
                setEmployees(init.employees);
                setProjects(init.projects);
                setAssignments(init.assignments);
                setExpenses(init.expenses);
            }

            const w = [];
            const today = new Date();
            // Anchor to Monday of the current ISO week so the resource view
            // is consistent with the timeline tab (which also starts on Monday).
            const todayDow = today.getDay() || 7; // 1=Mon … 7=Sun
            const thisMonday = new Date(today.getFullYear(), today.getMonth(), today.getDate() - todayDow + 1);
            // Use 54 iterations to cover 53-week ISO years; deduplicate by ID.
            const seenIds = new Set();
            for(let i=0; i<54; i++) {
                const d = new Date(thisMonday.getFullYear(), thisMonday.getMonth(), thisMonday.getDate() + (i*7));
                const weekId = getWeekString(d);
                if (seenIds.has(weekId)) continue;
                seenIds.add(weekId);
                if (w.length >= 54) break;
                const kw = parseInt(weekId.split('-W')[1], 10);
                w.push({
                    id: weekId,
                    label: `KW ${kw}`,
                    sub: `${d.getDate()}.${d.getMonth()+1}.`,
                    month: `${MONTH_NAMES[d.getMonth()]} ${d.getFullYear()}`
                });
            }
            setWeeks(w);
            setEmpForm(prev => ({...prev, category: currentEmpCats[0] || ''}));
            setProjForm(prev => ({...prev, startWeek: w[0].id, ibnWeek: w[10]?.id || w[w.length-1].id}));
        };
        loadData();
    }, []);

    // Keep refs aligned with state so polling closures see fresh data.
    useEffect(() => { employeesRef.current = employees; }, [employees]);
    useEffect(() => { empCategoriesRef.current = empCategories; }, [empCategories]);

    // Save on change. localStorage runs at ~400 ms, SharePoint at 1.5 s. The
    // SharePoint write is split per entity / team; saveSplitState() only
    // writes files whose content actually changed (diff against the last
    // saved snapshot), so Chef A editing CMS only touches assignments-CMS.json
    // while Chef B editing AS only touches assignments-AS.json – no conflicts.
    const localSaveTimer = useRef(null);
    useEffect(() => {
        if (employees.length === 0) return;

        // Skip writes triggered by remote updates (SharePoint polling or initial load)
        if (isRemoteUpdateRef.current) {
            isRemoteUpdateRef.current = false;
            return;
        }

        const stateData = {
            employees, projects, assignments, expenses, costItems,
            empCategories, projCategories, basicTasks, basicTasksMeta, inactiveBasicTasks,
            offtimeTasks, inactiveOfftimeTasks, inactiveSupportTasks, inactiveTrainingTasks,
            invoiceRecipient
        };

        if (localSaveTimer.current) clearTimeout(localSaveTimer.current);
        localSaveTimer.current = setTimeout(() => {
            try {
                localStorage.setItem('teamMasterProData', JSON.stringify(stateData));
            } catch(e) {
                console.warn('[LS] save failed', e);
            }
            if (FS_MODE && dirHandleRef.current) {
                saveSplitState(stateData, lastSavedFsRef.current,
                    (filename, payload) => fsSaveFile(dirHandleRef.current, filename, payload)
                ).then(async () => {
                    fsFileTimestampsRef.current = await fsGetFolderTimestamps(dirHandleRef.current);
                }).catch(err => {
                    console.warn('[FS] save failed', err);
                });
            }
        }, 400);

        if (SP_CONTEXT) {
            if (spSaveTimer.current) clearTimeout(spSaveTimer.current);
            spSaveTimer.current = setTimeout(async () => {
                // Don't clobber a known-broken auth state – the user will
                // retry the save by clicking "neu verbinden".
                if (syncStatusRef.current === 'needs-auth') return;
                const runSave = async () => {
                    await spEnsureFolder(SP_CONTEXT, PLANNER_DATA_DIR);
                    await saveSplitState(stateData, lastSavedSpRef.current,
                        (filename, payload) => spSaveFile(SP_CONTEXT, filename, payload)
                    );
                    spFileTimestampsRef.current = await spGetFolderTimestamps(SP_CONTEXT);
                };
                setSyncStatus('syncing');
                try {
                    await runSave();
                    setSyncStatus('idle');
                } catch(e) {
                    if (e instanceof SpAuthError) {
                        // Session expired while idle – try silent re-auth and
                        // replay the save exactly once. lastSavedSpRef is only
                        // updated per successful file write, so interrupted
                        // writes are naturally retried on the next save.
                        setSyncStatus('reconnecting');
                        const ok = await spEnsureSession(SP_CONTEXT, { interactive: false });
                        if (ok) {
                            try { await runSave(); setSyncStatus('idle'); }
                            catch(e2) { console.warn('[SP] save retry failed', e2); setSyncStatus('needs-auth'); }
                        } else {
                            setSyncStatus('needs-auth');
                        }
                    } else {
                        console.warn('[SP] save failed', e);
                        setSyncStatus('offline');
                    }
                }
            }, 1500);
        }
    }, [employees, projects, assignments, expenses, costItems, empCategories, projCategories, basicTasks, basicTasksMeta, inactiveBasicTasks, offtimeTasks, inactiveOfftimeTasks, inactiveSupportTasks, inactiveTrainingTasks, invoiceRecipient]);

    // Flush pending local save before the page unloads so a fast tab close
    // doesn't drop the most recent edits.
    useEffect(() => {
        const flush = () => {
            if (!localSaveTimer.current) return;
            clearTimeout(localSaveTimer.current);
            localSaveTimer.current = null;
            try {
                const stateData = {
                    employees, projects, assignments, expenses, costItems,
                    empCategories, projCategories, basicTasks, basicTasksMeta, inactiveBasicTasks,
                    offtimeTasks, inactiveOfftimeTasks, inactiveSupportTasks, inactiveTrainingTasks,
                    invoiceRecipient
                };
                localStorage.setItem('teamMasterProData', JSON.stringify(stateData));
            } catch(e) {}
        };
        window.addEventListener('beforeunload', flush);
        return () => window.removeEventListener('beforeunload', flush);
    }, [employees, projects, assignments, expenses, costItems, empCategories, projCategories, basicTasks, basicTasksMeta, inactiveBasicTasks, offtimeTasks, inactiveOfftimeTasks, inactiveSupportTasks, inactiveTrainingTasks, invoiceRecipient]);

    const applyRemoteSnapshot = (data, { notify = true } = {}) => {
        isRemoteUpdateRef.current = true;
        setEmployees(data.employees || []);
        setProjects(data.projects || []);
        setAssignments(data.assignments || []);
        setExpenses(data.expenses || []);
        if (data.costItems) setCostItems(data.costItems);
        else if (data.expenses && data.expenses.length > 0) setCostItems(migrateExpensesToCostItems(data.expenses));
        if (data.empCategories) setEmpCategories(data.empCategories);
        if (data.projCategories) setProjCategories(data.projCategories);
        if (data.basicTasks) setBasicTasks(data.basicTasks);
        if (data.basicTasksMeta !== undefined) setBasicTasksMeta(data.basicTasksMeta);
        if (data.inactiveBasicTasks) setInactiveBasicTasks(data.inactiveBasicTasks);
        if (data.offtimeTasks) setOfftimeTasks(data.offtimeTasks);
        if (data.invoiceRecipient !== undefined) setInvoiceRecipient(data.invoiceRecipient);
        // Also re-seed the snapshots so the save cascade triggered by these
        // setStates doesn't rewrite identical data back to the server.
        try {
            seedLastSaved(data, lastSavedSpRef.current);
            seedLastSaved(data, lastSavedFsRef.current);
        } catch(e) { console.warn('[SEED] snapshot seeding failed in applyRemoteSnapshot', e); }
        if (notify) {
            setSyncStatus('updated');
            setTimeout(() => { if (syncStatusRef.current === 'updated') setSyncStatus('idle'); }, 2000);
        }
    };

    // SharePoint polling – pick up changes from other users every 5 seconds.
    // One folder-list call returns timestamps for all files; if any changed
    // we reload the complete split state and apply it.
    const pollFailuresRef = useRef(0);
    useEffect(() => {
        if (!SP_CONTEXT) return;
        const poll = async () => {
            if (document.visibilityState === 'hidden') return;
            const st = syncStatusRef.current;
            if (st === 'syncing' || st === 'connecting' || st === 'reconnecting' || st === 'needs-auth') return;
            try {
                const newTs = await spGetFolderTimestamps(SP_CONTEXT);
                const prev = spFileTimestampsRef.current;
                const changed = Object.keys(newTs).some(f => newTs[f] !== prev[f]);
                if (changed) {
                    const { state, timestamps } = await loadSplitStateSp(SP_CONTEXT);
                    spFileTimestampsRef.current = timestamps;
                    applyRemoteSnapshot(state);
                }
                pollFailuresRef.current = 0;
                // Recover from a prior 'offline' as soon as the next poll
                // succeeds – no need to wait for a user edit.
                if (syncStatusRef.current === 'offline') setSyncStatus('idle');
            } catch(e) {
                if (e instanceof SpAuthError) {
                    // Session expired – drive the recovery pipeline. Silent
                    // refresh succeeds while the user's Entra session is
                    // alive, otherwise we surface the manual reconnect CTA.
                    setSyncStatus('reconnecting');
                    const ok = await spEnsureSession(SP_CONTEXT, { interactive: false });
                    setSyncStatus(ok ? 'idle' : 'needs-auth');
                    pollFailuresRef.current = 0;
                } else {
                    pollFailuresRef.current += 1;
                    if (pollFailuresRef.current >= 3 && syncStatusRef.current === 'idle') {
                        setSyncStatus('offline');
                    }
                }
            }
        };
        const interval = setInterval(poll, 5000);
        return () => clearInterval(interval);
    }, []);

    // Safety net: falls der initiale SharePoint-Handshake den Status
    // nicht auf 'idle' flippt (z.B. wegen eines geschluckten Fetches
    // oder Browser-Quirks), aber Saves trotzdem durchgehen, nach 10 s
    // auf 'idle' umstellen, damit die UI nicht dauerhaft „Verbindet ..."
    // zeigt.
    useEffect(() => {
        if (!SP_CONTEXT) return;
        const t = setTimeout(() => {
            if (syncStatusRef.current === 'connecting') setSyncStatus('idle');
        }, 10000);
        return () => clearTimeout(t);
    }, []);

    // File System polling – Änderungen von Kollegen alle 5 Sek. erkennen.
    useEffect(() => {
        if (!FS_MODE) return;
        const poll = async () => {
            if (document.visibilityState === 'hidden') return;
            if (!dirHandleRef.current) return;
            try {
                const newTs = await fsGetFolderTimestamps(dirHandleRef.current);
                const prev = fsFileTimestampsRef.current;
                const changed = Object.keys(newTs).some(f => newTs[f] !== prev[f]);
                if (changed) {
                    const { state, timestamps } = await loadSplitStateFs(dirHandleRef.current);
                    fsFileTimestampsRef.current = timestamps;
                    applyRemoteSnapshot(state);
                }
            } catch(e) { /* Transient errors ignored */ }
        };
        const interval = setInterval(poll, 5000);
        return () => clearInterval(interval);
    }, []);

    // Shared helper: after any kind of successful re-auth we want to pull the
    // latest remote snapshot so the UI can't show stale data.
    const refreshSpSnapshot = async () => {
        try {
            const { state, timestamps } = await loadSplitStateSp(SP_CONTEXT);
            spFileTimestampsRef.current = timestamps;
            if (state && (state.employees.length || state.assignments.length || state.projects.length)) {
                applyRemoteSnapshot(state, { notify: false });
            }
            return true;
        } catch(e) {
            console.warn('[SP] snapshot refresh failed', e);
            return false;
        }
    };

    // Manual reconnect button on the status pill. Must run inside a click
    // handler so the browser allows the popup used for interactive re-auth.
    const reconnectSharePoint = async () => {
        if (!SP_CONTEXT) return;
        setSyncStatus('reconnecting');
        const ok = await spEnsureSession(SP_CONTEXT, { interactive: true });
        if (!ok) { setSyncStatus('needs-auth'); return; }
        const loaded = await refreshSpSnapshot();
        setSyncStatus(loaded ? 'idle' : 'needs-auth');
    };

    // Ensure form defaults align with categories
    useEffect(() => {
        if (!empForm.category && empCategories.length > 0) {
            setEmpForm(prev => ({...prev, category: empCategories[0]}));
        }
        if (!projForm.category && projCategories.length > 0) {
            setProjForm(prev => ({...prev, category: projCategories[0]}));
        }
    }, [empCategories, projCategories]);

    // Auto-scroll to current week when switching to resource or project tab
    useEffect(() => {
        if (activeTab === 'resource') {
            const timer = setTimeout(() => scrollToCurrentWeek(resourceScrollRef, 288), 80);
            return () => clearTimeout(timer);
        }
        if (activeTab === 'project') {
            const timer = setTimeout(() => scrollToCurrentWeek(timelineScrollRef, 256), 80);
            return () => clearTimeout(timer);
        }
    }, [activeTab]);

    // --- LOGIC ---
    const employeeById = useMemo(() => {
        const m = new Map();
        employees.forEach(e => m.set(e.id, e));
        return m;
    }, [employees]);

    const projectById = useMemo(() => {
        const m = new Map();
        projects.forEach(p => m.set(p.id, p));
        return m;
    }, [projects]);

    const assignmentsByEmpWeek = useMemo(() => {
        const m = new Map();
        assignments.forEach(a => {
            const key = a.empId + '\u0000' + a.week;
            let arr = m.get(key);
            if (!arr) { arr = []; m.set(key, arr); }
            arr.push(a);
        });
        return m;
    }, [assignments]);

    const assignmentsByProject = useMemo(() => {
        const m = new Map();
        assignments.forEach(a => {
            let arr = m.get(a.reference);
            if (!arr) { arr = []; m.set(a.reference, arr); }
            arr.push(a);
        });
        return m;
    }, [assignments]);

    const assignmentsByProjectWeek = useMemo(() => {
        const m = new Map();
        assignments.forEach(a => {
            const key = a.reference + '\u0000' + a.week;
            let arr = m.get(key);
            if (!arr) { arr = []; m.set(key, arr); }
            arr.push(a);
        });
        return m;
    }, [assignments]);

    const costItemsByProject = useMemo(() => {
        const m = new Map();
        costItems.forEach(c => {
            let arr = m.get(c.projectId);
            if (!arr) { arr = []; m.set(c.projectId, arr); }
            arr.push(c);
        });
        return m;
    }, [costItems]);

    const getEmpWeeklyHours = useCallback((empId) => {
        return employeeById.get(empId)?.weeklyHours ?? HOURS_PER_WEEK;
    }, [employeeById]);

    const projectStatusById = useMemo(() => {
        const now = getWeekString(new Date());
        const m = new Map();
        projects.forEach(p => {
            let status;
            if (p.costsSubmitted) status = 'costs_submitted';
            else if (p.projectCompleted) status = 'completed';
            else {
                const projCosts = costItemsByProject.get(p.id) || [];
                const projAss = assignmentsByProject.get(p.id) || [];
                if (p.ibnWeek < now && projAss.length > 0 && projCosts.length === 0) status = 'missing_costs';
                else if (p.startWeek <= now) status = 'active';
                else status = 'planned';
            }
            m.set(p.id, status);
        });
        return m;
    }, [projects, assignmentsByProject, costItemsByProject]);

    const computeAutoStatus = useCallback((p) => {
        return projectStatusById.get(p.id) ?? 'planned';
    }, [projectStatusById]);

    // Derived collections – memoized so render functions don't rebuild them
    // on every keystroke / polling tick.
    const activeEmployees = useMemo(
        () => employees.filter(e => e.active !== false),
        [employees]
    );

    const activeEmpsByCategory = useMemo(() => {
        const m = new Map();
        activeEmployees.forEach(e => {
            let arr = m.get(e.category);
            if (!arr) { arr = []; m.set(e.category, arr); }
            arr.push(e);
        });
        // Sort employees alphabetically within each category
        m.forEach(arr => arr.sort((a, b) => a.name.localeCompare(b.name, 'de')));
        return m;
    }, [activeEmployees]);

    const activeEmpCategories = useMemo(
        () => Array.from(activeEmpsByCategory.keys()).sort((a, b) =>
            a === 'Other' ? 1 : b === 'Other' ? -1 : a.localeCompare(b, 'de')
        ),
        [activeEmpsByCategory]
    );

    const projectsByCategory = useMemo(() => {
        const m = new Map();
        projects.forEach(p => {
            let arr = m.get(p.category);
            if (!arr) { arr = []; m.set(p.category, arr); }
            arr.push(p);
        });
        return m;
    }, [projects]);

    const projCategoriesFromProjects = useMemo(
        () => Array.from(projectsByCategory.keys()),

    // Cache weeks per year – generateWeeksForYear does Easter math + 54
    // iterations, expensive to redo on every render.
    const weeksByYearCacheRef = useRef(new Map());
    const getWeeksForYear = useCallback((year) => {
        const cache = weeksByYearCacheRef.current;
        if (!cache.has(year)) cache.set(year, generateWeeksForYear(year));
        return cache.get(year);
    }, []);
    const timelineWeeks = useMemo(() => getWeeksForYear(timelineYear), [timelineYear, getWeeksForYear]);

    const getUtilization = useCallback((empId, week) => {
        const weeklyHours = getEmpWeeklyHours(empId);
        const weekAss = assignmentsByEmpWeek.get(empId + '\u0000' + week) || [];
        let total = 0;
        let isOfftime = false;
        for (let i = 0; i < weekAss.length; i++) {
            const a = weekAss[i];
            total += ((a.hours ?? (a.percent / 100 * weeklyHours)) / weeklyHours) * 100;
            if (a.type === 'offtime') isOfftime = true;
        }
        return { total, isOfftime, assignments: weekAss };
    }, [assignmentsByEmpWeek, getEmpWeeklyHours]);

    const toggleCategory = (cat) => {
        setCollapsedCategories(prev => ({...prev, [cat]: !prev[cat]}));
