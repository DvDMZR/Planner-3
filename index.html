    const toggleProjCategory = (cat) => {
        setCollapsedProjCategories(prev => ({...prev, [cat]: !prev[cat]}));
    };

    const toggleEmpSetup = (cat) => {
        setCollapsedEmpSetup(prev => ({...prev, [cat]: !prev[cat]}));
    };

    const handleSaveAssignment = (data) => {
        if (Array.isArray(data)) {
            setAssignments(prev => [...prev, ...data]);
        } else if (data.id) {
            setAssignments(assignments.map(a => a.id === data.id ? data : a));
        } else {
            setAssignments([...assignments, { ...data, id: makeId('ass') }]);
        }
        setIsAssignModalOpen(false);
    };

    const handleDeleteAssignment = (id) => {
        setAssignments(prev => prev.filter(a => a.id !== id));
        setIsAssignModalOpen(false);
    };

    const handleDeleteAssignmentSeries = (id) => {
        const ass = assignments.find(a => a.id === id);
        if (!ass) { setIsAssignModalOpen(false); return; }
        setAssignments(prev => prev.filter(a => !(a.ruleId === ass.ruleId && a.week >= ass.week)));
        setIsAssignModalOpen(false);
    };

    const handleDrop = (e, targetWeek, targetEmpIdOrProjId, isResourceView = false) => {
        e.preventDefault();
        const assignmentId = e.dataTransfer.getData('assignmentId');
        if (assignmentId) {
            // Move existing assignment chip; clear comment when reassigning to different employee
            setAssignments(assignments.map(a => {
                if (a.id !== assignmentId) return a;
                const newEmpId = isResourceView ? targetEmpIdOrProjId : a.empId;
                const isReassigned = newEmpId !== a.empId;
                const updated = { ...a, week: targetWeek, empId: newEmpId };
                if (isReassigned) delete updated.comment;
                return updated;
            }));
            return;
        }
        const empId = e.dataTransfer.getData('empId');
        if (!empId) return;
        const newAss = {
            id: makeId('ass'),
            empId: isResourceView ? targetEmpIdOrProjId : empId,
            week: targetWeek,
            type: 'project',
            reference: isResourceView ? '' : targetEmpIdOrProjId,
            hours: HOURS_PER_WEEK
        };
        if (!isResourceView) {
            setAssignments([...assignments, newAss]);
        } else {
            // In resource view: open modal to pick type/reference
            setAssignContext({ empId: targetEmpIdOrProjId, week: targetWeek });
            setIsAssignModalOpen(true);
        }
    };

    const exportData = () => {
        const data = JSON.stringify({
            employees, projects, assignments, expenses, costItems,
            empCategories, projCategories, basicTasks, basicTasksMeta, inactiveBasicTasks,
            offtimeTasks, invoiceRecipient,
            schemaVersion: SCHEMA_VERSION
        }, null, 2);
        const blob = new Blob([data], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `Einsatzplanung3.0_Backup_${new Date().toISOString().split('T')[0]}.json`;
        a.click();
    };

    const importData = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            try {
                const parsed = JSON.parse(event.target.result);
                if (parsed.employees) setEmployees(parsed.employees);
                if (parsed.projects) setProjects(parsed.projects);
                if (parsed.assignments) setAssignments(parsed.assignments);
                if (parsed.expenses) setExpenses(parsed.expenses);
                if (parsed.costItems) {
                    setCostItems(parsed.costItems);
                } else if (parsed.expenses && parsed.expenses.length > 0) {
                    setCostItems(migrateExpensesToCostItems(parsed.expenses));
                }
                if (parsed.empCategories) setEmpCategories(parsed.empCategories);
                if (parsed.projCategories) setProjCategories(parsed.projCategories);
                if (parsed.basicTasks) setBasicTasks(parsed.basicTasks);
                if (parsed.basicTasksMeta) setBasicTasksMeta(parsed.basicTasksMeta);
                if (parsed.inactiveBasicTasks) setInactiveBasicTasks(parsed.inactiveBasicTasks);
                if (parsed.offtimeTasks) setOfftimeTasks(parsed.offtimeTasks);
            } catch (err) {
                alert('Fehler beim Importieren der Daten: Die Datei konnte nicht gelesen werden.');
            }
        };
        reader.readAsText(file);
    };

    const buildInvoiceData = (proj, selection) => {
        const projAss = assignmentsByProject.get(proj.id) || [];
        const hoursByEmp = new Map();
        for (let i = 0; i < projAss.length; i++) {
            const a = projAss[i];
            const h = a.hours ?? ((a.percent ?? 100) / 100 * HOURS_PER_WEEK);
            hoursByEmp.set(a.empId, (hoursByEmp.get(a.empId) || 0) + h);
        }

        const laborLines = [];
        let total = 0;
        const rate = proj.hourlyRate ?? DEFAULT_HOURLY_RATE;
        hoursByEmp.forEach((hours, empId) => {
            if (hours <= 0 || proj.billable === false) return;
            const cost = hours * rate;
            const included = !selection || selection.emps[empId];
            if (included) total += cost;
            laborLines.push({
                empId,
                emp: employeeById.get(empId),
                hours, rate, cost,
                included,
            });
        });

        const costLines = [];
        const projCosts = costItemsByProject.get(proj.id) || [];
        projCosts.forEach(ci => {
            const included = !selection || selection.costs[ci.id];
            if (included) total += ci.amount || 0;
            costLines.push({
                ci,
                emp: employeeById.get(ci.empId),
                included,
            });
        });

        return { laborLines, costLines, total };
    };

    const openInvoiceModal = () => {
        const proj = projectById.get(selectedProjectDetails);
        if (!proj) return;
        const projAss = assignmentsByProject.get(proj.id) || [];
        const empIds = [...new Set(projAss.map(a => a.empId))];
        const projCosts = costItemsByProject.get(proj.id) || [];

        const initialEmps = {};
        empIds.forEach(id => initialEmps[id] = true);

        const initialCosts = {};
        projCosts.forEach(c => initialCosts[c.id] = true);

        setInvoiceSelection({ emps: initialEmps, costs: initialCosts });
        setIsInvoiceModalOpen(true);
    };

    const handleInvoiceExport = () => {
        const proj = projectById.get(selectedProjectDetails);
        if (!proj) return;
        const { laborLines, costLines, total } = buildInvoiceData(proj, invoiceSelection);

        const rows = [];
        rows.push(["Rechnung für Projekt:", proj.name]);
        rows.push(["Projektnummer:", proj.projectNumber || '']);
        if (proj.address) rows.push(["Adresse:", proj.address]);
        rows.push(["Datum:", new Date().toLocaleDateString('de-DE')]);
        rows.push([]);
        rows.push(["Position", "Mitarbeiter", "Details", "Menge", "Einzelpreis", "Gesamt"]);

        laborLines.forEach(l => {
            if (!l.included) return;
            rows.push(["Dienstleistung", l.emp?.name || 'Unbekannt', "Arbeitszeit", `${l.hours} Std.`, `${l.rate} EUR`, `${l.cost.toFixed(2)} EUR`]);
        });
        costLines.forEach(({ ci, emp, included }) => {
            if (!included) return;
            rows.push([ci.type, emp?.name || 'Unbekannt', ci.description || '', "1", `${(ci.amount || 0).toFixed(2)} EUR`, `${(ci.amount || 0).toFixed(2)} EUR`]);
        });

        rows.push([]);
        rows.push(["", "", "", "", "Gesamt Netto:", `${total.toFixed(2)} EUR`]);

        const csvContent = "\uFEFF" + rows.map(e => e.join(";")).join("\n");
        const encodedUri = encodeURI("data:text/csv;charset=utf-8," + csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", `Rechnung_${proj.name.replace(/\s+/g, '_')}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);

        setIsInvoiceModalOpen(false);
        setProjects(prev => prev.map(p => p.id === selectedProjectDetails ? {...p, invoiceStatus: 'exportiert'} : p));
    };

    const handleInvoiceSendEmail = () => {

        if (!proj) return;
        const { laborLines, costLines, total } = buildInvoiceData(proj, invoiceSelection);
        const rows = [];
        laborLines.forEach(l => {
            if (!l.included) return;
            rows.push(`  - ${l.emp?.name || 'Unbekannt'}: ${l.hours} Std. x ${l.rate} EUR/h = ${l.cost.toFixed(2)} EUR`);
        });
        costLines.forEach(({ ci, included }) => {
            if (!included) return;
            rows.push(`  - ${ci.type}${ci.description ? ' (' + ci.description + ')' : ''}: ${(ci.amount || 0).toFixed(2)} EUR`);
        });

        const subject = encodeURIComponent(`Rechnung: ${proj.name} - ${new Date().toLocaleDateString('de-DE')}`);
        const body = encodeURIComponent(
            `Guten Tag,\n\nanbei sende ich die Rechnung fuer folgendes Projekt:\n\n` +
            `Projekt: ${proj.name}\n` +
            `Projektnummer: ${proj.projectNumber || '-'}\n` +
            `Datum: ${new Date().toLocaleDateString('de-DE')}\n\n` +
            `Positionen:\n${rows.join('\n')}\n\n` +
            `Gesamtsumme (Netto): ${total.toFixed(2)} EUR\n\n` +

    // --- SUB-COMPONENTS ---

    const ProjFormModal = () => {
        if (!isProjFormOpen) return null;
        const isEditing = !!editingProjectId;
        const emptyForm = () => {
            const nextColorId = PROJECT_COLORS[projects.length % PROJECT_COLORS.length].id;
            return { name: '', category: projCategories[0] || '', projectNumber: '', address: '', startWeek: weeks[0]?.id || '', ibnWeek: weeks[10]?.id || '', color: nextColorId };
        };
        const save = () => {
            if (!projForm.name.trim()) return;
            if (projForm.startWeek && projForm.ibnWeek && projForm.ibnWeek < projForm.startWeek) {
                alert('IBN-Woche darf nicht vor der Start-Woche liegen.');

                setProjects(projects.map(p => p.id === editingProjectId ? { ...p, ...projForm } : p));
                setEditingProjectId(null);
            } else {
                setProjects([...projects, { id: makeId('p'), ...projForm, billable: true, hourlyRate: DEFAULT_HOURLY_RATE }]);

            setProjForm(emptyForm());
            setIsProjFormOpen(false);
        };
        const cancel = () => {
            setEditingProjectId(null);
            setProjForm(emptyForm());
            setIsProjFormOpen(false);
        };
        return (
            <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                <div className="bg-white rounded-xl shadow-xl w-full max-w-lg overflow-hidden">
                    <ModalHeader title={isEditing ? 'Projekt bearbeiten' : 'Neues Projekt'} onClose={cancel}/>
                    <div className="p-6 space-y-4">
                        <div className="grid grid-cols-2 gap-4">
                            <div className="col-span-2">
                                <label className="block text-xs text-slate-700 mb-1 font-semibold">Name</label>
                                <input type="text" value={projForm.name} onChange={e => setProjForm({...projForm, name: e.target.value})} className="w-full p-2 border border-slate-400 rounded text-sm focus:outline-none focus:ring-2 focus:ring-gea-400 focus:border-gea-500" autoFocus/>
                            </div>
                            <div className="col-span-2">
                                <label className="block text-xs text-slate-700 mb-1 font-semibold">Adresse</label>
                                <input type="text" value={projForm.address || ''} onChange={e => setProjForm({...projForm, address: e.target.value})} placeholder="Straße, PLZ Ort, Land" className="w-full p-2 border border-slate-400 rounded text-sm focus:outline-none focus:ring-2 focus:ring-gea-400 focus:border-gea-500"/>
                            </div>
                            <div>
                                <label className="block text-xs text-slate-700 mb-1 font-semibold">Projektnr.</label>
                                <input type="text" maxLength={15} value={projForm.projectNumber} onChange={e => setProjForm({...projForm, projectNumber: e.target.value})} placeholder="GEA-2024-00001" className="w-full p-2 border border-slate-400 rounded text-sm font-mono focus:outline-none focus:ring-2 focus:ring-gea-400 focus:border-gea-500"/>
                            </div>
                            <div>
                                <label className="block text-xs text-slate-700 mb-1 font-semibold">Kategorie</label>
                                <select value={projForm.category} onChange={e => setProjForm({...projForm, category: e.target.value})} className="w-full p-2 border border-slate-400 rounded text-sm focus:outline-none focus:ring-2 focus:ring-gea-400">
                                    {projCategories.map(c => <option key={c} value={c}>{c}</option>)}
                                </select>
                            </div>
                            <div>
                                <label className="block text-xs text-slate-700 mb-1 font-semibold">Start (KW)</label>
                                <input type="week" value={projForm.startWeek} onChange={e => setProjForm({...projForm, startWeek: e.target.value})} className="w-full p-2 border border-slate-400 rounded text-sm focus:outline-none focus:ring-2 focus:ring-gea-400"/>
                            </div>
                            <div>
                                <label className="block text-xs text-slate-700 mb-1 font-semibold">IBN (KW)</label>
                                <input type="week" value={projForm.ibnWeek} onChange={e => setProjForm({...projForm, ibnWeek: e.target.value})} className="w-full p-2 border border-slate-400 rounded text-sm focus:outline-none focus:ring-2 focus:ring-gea-400"/>
                            </div>

                                                                        color = TRAINING_CHIP_COLOR.chip;
                                                                        dotColor = TRAINING_CHIP_COLOR.dot;
                                                                    } else if (a.type === 'other') {
                                                                        const taskMeta = basicTasksMeta[a.reference];
                                                                        if (taskMeta?.color) {
                                                                            const tc = resolveProjectColor(taskMeta.color);
                                                                            color = tc.chip; dotColor = tc.dot;
                                                                        } else {
                                                                            color = 'bg-slate-50 border-slate-200 text-slate-700';
                                                                            dotColor = 'bg-slate-400';
                                                                        }
                                                                    } else if (a.type === 'offtime') {
                                                                        color = 'bg-slate-100 border-slate-300 text-slate-600';
                                                                        dotColor = 'bg-slate-500';
                                                                    } else if (a.type === 'basic') {
                                                                        const taskMeta = basicTasksMeta?.[a.reference];
                                                                        if (taskMeta?.color) {
                                                                            const tc = resolveProjectColor(taskMeta.color);
                                                                            color = tc.chip; dotColor = tc.dot;
                                                                        }
                                                                    }
                                                                    const empWH = emp.weeklyHours ?? HOURS_PER_WEEK;
                                                                    const pct = Math.round((a.hours ?? (a.percent ?? 100) / 100 * empWH) / empWH * 100);

                                                                        <div key={a.id}

                                                                            title={a.comment || undefined}

                                                                            onClick={e => { e.stopPropagation(); if (isDeleteMode) { handleDeleteAssignment(a.id); } else { setAssignContext({ empId: emp.id, week: w.id, existing: a }); setIsAssignModalOpen(true); } }}
                                                                            className={`text-[11px] rounded-md border flex justify-between items-stretch shadow-sm transition-all group/chip overflow-hidden ${isDeleteMode ? 'cursor-pointer hover:bg-rose-50 hover:border-rose-300 hover:text-rose-700 hover:line-through' : 'hover:shadow hover:-translate-y-0.5 cursor-grab active:cursor-grabbing'} ${color}`}>
                                                                            <div className="flex items-center gap-1.5 min-w-0">
                                                                                <div className={`w-1 flex-shrink-0 self-stretch ${dotColor}`}></div>

                                                                                    className="opacity-0 group-hover/chip:opacity-100 text-slate-400 hover:text-gea-600 transition-opacity p-0.5 rounded"

                                                                                </button>
                                                                            </div>

                                                                    );
                                                                })}

                                                                        onClick={e => { e.stopPropagation(); setAssignContext({ empId: emp.id, week: w.id }); setIsAssignModalOpen(true); }}

                                                        </td>
                                                    );
                                                })}
                                            </tr>
                                        ))}

                                        </div>
                                        <span className="text-xs bg-white px-2 py-0.5 rounded-full border border-slate-200 text-slate-500 font-medium shadow-[2px_0_5px_-2px_rgba(0,0,0,0.05)]">
                                            {catEmps.length}

                                                    onDragStart={(e) => e.dataTransfer.setData('empId', emp.id)}
                                                    className="p-2.5 bg-white border border-slate-200 rounded-lg shadow-sm cursor-grab active:cursor-grabbing hover:border-gea-300 transition-colors flex items-center gap-2"
                                                >
                                                    <div className="min-w-0">
                                                        <div className="text-sm text-slate-900 font-medium truncate">{emp.name}</div>
                                                    </div>
                                                </div>

                                        </div>
                                    )}
                                </div>
                            );
                        })}
                    </div>
                </div>

                <div className="flex-1 flex flex-col overflow-hidden">
                    <div className="p-4 border-b border-slate-200 bg-white flex justify-between items-center">
                        <h3 className="text-slate-900 text-lg font-medium">Projekt-Planung</h3>
                        <div className="flex items-center gap-3">
                            <select value={timelineYear} onChange={e => setTimelineYear(Number(e.target.value))}
                                className="border border-slate-300 rounded px-2 py-1.5 text-sm bg-white text-slate-700 focus:outline-none focus:ring-1 focus:ring-gea-400">
                                {Array.from({length: 7}, (_, i) => currentYear - 1 + i).map(y => <option key={y} value={y}>{y}</option>)}

                            <button onClick={() => {

                                Heute

                            <span className="text-xs text-slate-500">Zieh Mitarbeiter von links in die Kalenderwochen.</span>

                    </div>
                    
                    <div ref={timelineScrollRef} className="flex-1 overflow-auto relative">

    const renderUtilization = () => {
        const visibleWeeks = weeks.slice(0, weeksAhead);
        const months = [];
        const weeksByMonth = {};

        visibleWeeks.forEach(w => {
            if (!weeksByMonth[w.month]) {
                weeksByMonth[w.month] = [];
                months.push(w.month);
            }
            weeksByMonth[w.month].push(w.id);
        });

        const activeCategories = activeEmpCategories;

        return (
            <div className="flex-1 flex flex-col h-full bg-white overflow-hidden">
                <div className="p-6 border-b border-slate-200 flex justify-between items-center">
                    <div>
                        <h2 className="text-xl text-slate-900 font-medium">Auslastung (Heatmap)</h2>
                        <p className="text-sm text-slate-500">Monatsweise Übersicht der durchschnittlichen Kapazitätsauslastung.</p>
                    </div>
                    <div className="flex gap-4 items-center bg-slate-50 p-3 rounded-lg border border-slate-200">
                        <span className="text-sm text-slate-700 font-medium">Vorschau:</span>
                        <select value={weeksAhead} onChange={e=>setWeeksAhead(Number(e.target.value))} className="p-2 border border-slate-300 rounded text-sm bg-white">
                            <option value={4}>4 Wochen</option>
                            <option value={8}>8 Wochen</option>
                            <option value={12}>12 Wochen</option>
                            <option value={24}>24 Wochen</option>
                            <option value={52}>52 Wochen</option>

                    </div>
                </div>
                <div className="flex-1 overflow-auto p-6">
                    <table className="w-full border-collapse text-sm">
                        <thead>
                            <tr>
                                <th className="p-2 border-b border-slate-200 text-left w-48 text-slate-500 font-medium">Mitarbeiter</th>
                                <th className="p-2 border-b border-slate-200 text-center w-32 text-gea-600 bg-gea-50 rounded-t-lg font-medium">Ø Zeitraum</th>
                                {months.map(m => <th key={m} className="p-2 border-b border-slate-200 text-center text-slate-500 font-medium">{m}</th>)}
                            </tr>
                        </thead>
                        <tbody>
                            {activeCategories.map(category => {
                                const isCollapsed = collapsedCategories[category];
                                const catEmps = activeEmpsByCategory.get(category) || [];

                                return (
                                    <React.Fragment key={category}>
                                        <tr className="bg-slate-200/70 border-t-2 border-b border-slate-300 cursor-pointer hover:bg-slate-300/50 transition-colors group" onClick={() => toggleCategory(category)}>
                                            <td className="p-3 text-slate-700 sticky left-0 z-10 bg-inherit border-r border-l-4 border-l-gea-500 border-slate-300 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.08)]">
                                                <div className="flex items-center gap-2 text-sm uppercase tracking-wider font-medium">
                                                    <span className="text-slate-400 group-hover:text-gea-500 transition-colors">
                                                        {isCollapsed ? <IconChevronRight size={16}/> : <IconChevronDown size={16}/>}
                                                    </span>
                                                    {category}
                                                    <span className="ml-auto text-xs bg-white px-2 py-0.5 rounded-full border border-slate-200 text-slate-500 font-medium">
                                                        {catEmps.length}
                                                    </span>
                                                </div>
                                            </td>
                                            <td className="border-b border-slate-300 bg-slate-200/70"></td>
                                            {months.map(m => <td key={`header-${category}-${m}`} className="border-b border-slate-300 bg-slate-200/70"></td>)}
                                        </tr>

                                        {!isCollapsed && catEmps.map(emp => {
                                            let totalPercentAll = 0;
                                            visibleWeeks.forEach(w => {
                                                totalPercentAll += getUtilization(emp.id, w.id).total;
                                            });
                                            const avgAll = visibleWeeks.length === 0 ? 0 : Math.round(totalPercentAll / visibleWeeks.length);

                                            return (
                                                <tr key={emp.id} className="border-b border-slate-300 hover:bg-slate-50 transition-colors">
                                                    <td className="p-2 text-slate-900 font-medium pl-6">{emp.name}</td>
                                                    
                                                    <td className="p-2 border-r border-slate-300">
                                                        <div className="w-full h-8 rounded flex items-center justify-center text-xs bg-gea-50 text-gea-700 border border-gea-100 font-medium">
                                                            {avgAll}%
                                                        </div>
                                                    </td>

                                                    {months.map(m => {
                                                        const monthWeeks = weeksByMonth[m];
                                                        let monthTotal = 0;
                                                        let hasOfftime = false;

                                                        monthWeeks.forEach(wId => {
                                                            const { total, isOfftime } = getUtilization(emp.id, wId);
                                                            monthTotal += total;
                                                            if (isOfftime) hasOfftime = true;

                                                        )

    const renderProjectDetails = () => {
        const proj = projectById.get(selectedProjectDetails);
        if (!proj) return null;

        const projAssignments = (assignmentsByProject.get(proj.id) || []).filter(a => a.type === 'project');

        const projCostItems = costItemsByProject.get(proj.id) || [];

        const presenceWeeks = [...new Set(projAssignments.map(a => a.week))].sort();

        // Totals
        let totalHours = 0;
        let totalLaborCost = 0;
        let totalOtherCost = 0;
        assignedEmpIds.forEach(empId => {

            if (proj.billable !== false) totalLaborCost += h * (proj.hourlyRate ?? DEFAULT_HOURLY_RATE);

                            <span className="flex items-center gap-1"><div className={`w-2 h-2 rounded-full ${resolveProjectColor(proj.color).dot}`}></div>{proj.category}</span>
                            <span>·</span><span>{proj.startWeek} – {proj.ibnWeek}</span>
                            {proj.address && <><span>·</span><span>{proj.address}</span></>}
                        </div>
                    </div>

                    {/* Status + checkboxes */}
                    <div className="flex items-center gap-3 flex-wrap">
                        <StatusBadge status={computeAutoStatus(proj)}/>
                        <label className="flex items-center gap-2 cursor-pointer select-none">
                            <input type="checkbox"
                                checked={!!proj.projectCompleted}
                                onChange={e => setProjects(projects.map(p => p.id === proj.id ? {...p, projectCompleted: e.target.checked} : p))}
                                className="w-4 h-4 text-gea-600 rounded"/>
                            <span className="text-sm font-medium text-slate-700">Projekt abgeschlossen</span>
                        </label>
                        <label className="flex items-center gap-2 cursor-pointer select-none">
                            <input type="checkbox"
                                checked={!!proj.costsSubmitted}
                                onChange={e => setProjects(projects.map(p => p.id === proj.id ? {...p, costsSubmitted: e.target.checked} : p))}
                                className="w-4 h-4 text-gea-600 rounded"/>
                            <span className="text-sm font-medium text-slate-700">Kosten übermittelt</span>
                        </label>
                        <button onClick={() => {
                            setProjForm({ name: proj.name, category: proj.category || projCategories[0] || '', projectNumber: proj.projectNumber || '', address: proj.address || '', startWeek: proj.startWeek, ibnWeek: proj.ibnWeek, color: resolveProjectColor(proj.color).id });
                            setEditingProjectId(proj.id);
                            setIsProjFormOpen(true);
                        }} className="bg-white border border-slate-300 hover:bg-gea-50 hover:border-gea-400 text-slate-700 px-3 py-2 rounded-lg text-sm flex items-center gap-2 font-medium transition-colors">
                            <IconEdit size={15}/> Bearbeiten
                        </button>
                        <button onClick={openInvoiceModal} className="bg-white border border-slate-300 hover:bg-slate-50 text-slate-700 px-3 py-2 rounded-lg text-sm flex items-center gap-2 font-medium transition-colors">
                            <IconFileText size={15}/> Rechnung
                        </button>
                        <button onClick={() => { setEditingCostItem(null); setIsCostItemModalOpen(true); }}
                            className="bg-gea-600 hover:bg-gea-700 text-white px-3 py-2 rounded-lg text-sm flex items-center gap-2 font-medium transition-colors">
                            <IconPlus size={15}/> Kostenpunkt
                        </button>
                    </div>
                </div>

                <div className="p-6 max-w-7xl mx-auto w-full space-y-6">

                    {/* Employee Presence Overview */}
                    {assignedEmpIds.length > 0 && presenceWeeks.length > 0 && (
                        <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                            <div className="p-4 bg-slate-50 border-b border-slate-200 flex justify-between items-center">
                                <h3 className="text-slate-900 text-base font-medium">Mitarbeiter-Anwesenheit</h3>
                                <span className="text-xs text-slate-400">{presenceWeeks.length} Wochen</span>

                                    <thead>
                                        <tr>
                                            <th className="p-3 text-left text-slate-500 font-medium border-r border-slate-200 bg-slate-50 w-40 sticky left-0">Mitarbeiter</th>
                                            {presenceWeeks.map(w => (
                                                <th key={w} className="p-2 text-center text-slate-500 font-medium border-r border-slate-200 bg-slate-50 min-w-[52px]">
                                                    KW{w.split('-W')[1]}
                                                </th>
                                            ))}
                                            <th className="p-2 text-center text-slate-500 font-medium bg-slate-50 min-w-[60px]">Stunden</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100">
                                        {assignedEmpIds.map(empId => {
                                            const emp = employeeById.get(empId);
                                            const empAss = projAssignments.filter(a => a.empId === empId);
                                            const empHours = empAss.reduce((acc, a) => acc + (a.hours ?? (a.percent / 100 * HOURS_PER_WEEK)), 0);
                                            return (
                                                <tr key={empId} className="hover:bg-slate-50">
                                                    <td className="p-3 text-slate-800 font-medium border-r border-slate-200 sticky left-0 bg-white">{emp?.name || 'Unbekannt'}</td>
