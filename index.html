                                                                            <div key={a.id} 
                                                                                onClick={(e) => { e.stopPropagation(); setAssignContext({ empId: a.empId, week: w.id, existing: a }); setIsAssignModalOpen(true); }}
                                                                                className={`text-[10px] px-1.5 py-1 rounded flex justify-between items-center text-white shadow-sm cursor-pointer hover:opacity-90 transition-opacity ${proj.color}`}>
                                                                                <span className="truncate font-medium">{emp?.name || 'Unbekannt'}</span>
                                                                                <span className="opacity-90 ml-1 font-medium">{a.hours ?? Math.round((a.percent ?? 100) / 100 * HOURS_PER_WEEK)}h</span>
                                                                            </div>
                                                                        );
                                                                    })}
                                                                </div>
                                                            </td>
                                                        );
                                                    })}
                                                </tr>
                                            ))}
                                        </React.Fragment>
                                    );
                                })}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        );
    };

    const renderUtilization = () => {
        const visibleWeeks = weeks.slice(0, weeksAhead);
        const months = [];
        const weeksByMonth = {};

        visibleWeeks.forEach(w => {
            if (!weeksByMonth[w.month]) {
                weeksByMonth[w.month] = [];
                months.push(w.month);
            }
            weeksByMonth[w.month].push(w.id);
        });

        const activeCategories = [...new Set(employees.filter(e => e.active).map(e => e.category))];

        return (
            <div className="flex-1 flex flex-col h-full bg-white overflow-hidden">
                <div className="p-6 border-b border-slate-200 flex justify-between items-center">
                    <div>
                        <h2 className="text-xl text-slate-900 font-medium">Auslastung (Heatmap)</h2>
                        <p className="text-sm text-slate-500">Monatsweise Übersicht der durchschnittlichen Kapazitätsauslastung.</p>
                    </div>
                    <div className="flex gap-4 items-center bg-slate-50 p-3 rounded-lg border border-slate-200">
                        <span className="text-sm text-slate-700 font-medium">Vorschau:</span>
                        <select value={weeksAhead} onChange={e=>setWeeksAhead(Number(e.target.value))} className="p-2 border border-slate-300 rounded text-sm bg-white">
                            <option value={4}>4 Wochen</option>
                            <option value={8}>8 Wochen</option>
                            <option value={12}>12 Wochen</option>
                            <option value={24}>24 Wochen</option>
                            <option value={52}>52 Wochen</option>
                        </select>
                    </div>
                </div>
                <div className="flex-1 overflow-auto p-6">
                    <table className="w-full border-collapse text-sm">
                        <thead>
                            <tr>
                                <th className="p-2 border-b border-slate-200 text-left w-48 text-slate-500 font-medium">Mitarbeiter</th>
                                <th className="p-2 border-b border-slate-200 text-center w-32 text-gea-600 bg-gea-50 rounded-t-lg font-medium">Ø Zeitraum</th>
                                {months.map(m => <th key={m} className="p-2 border-b border-slate-200 text-center text-slate-500 font-medium">{m}</th>)}
                            </tr>
                        </thead>
                        <tbody>
                            {activeCategories.map(category => {
                                const isCollapsed = collapsedCategories[category];
                                const catEmps = employees.filter(e => e.active && e.category === category);
                                
                                return (
                                    <React.Fragment key={category}>
                                        <tr className="bg-slate-50/80 border-b border-slate-200 cursor-pointer hover:bg-slate-100 transition-colors group" onClick={() => toggleCategory(category)}>
                                            <td className="p-3 text-slate-700 sticky left-0 z-10 bg-inherit border-r border-slate-200 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.05)]">
                                                <div className="flex items-center gap-2 text-sm uppercase tracking-wider font-medium">
                                                    <span className="text-slate-400 group-hover:text-gea-500 transition-colors">
                                                        {isCollapsed ? <IconChevronRight size={16}/> : <IconChevronDown size={16}/>}
                                                    </span>
                                                    {category}
                                                    <span className="ml-auto text-xs bg-white px-2 py-0.5 rounded-full border border-slate-200 text-slate-500 font-medium">
                                                        {catEmps.length}
                                                    </span>
                                                </div>
                                            </td>
                                            <td className="border-r border-slate-300 bg-slate-50/40"></td>
                                            {months.map(m => <td key={`header-${category}-${m}`} className="border-r border-slate-300 bg-slate-50/40"></td>)}
                                        </tr>

                                        {!isCollapsed && catEmps.map(emp => {
                                            let totalPercentAll = 0;
                                            visibleWeeks.forEach(w => {
                                                totalPercentAll += getUtilization(emp.id, w.id).total;
                                            });
                                            const avgAll = visibleWeeks.length === 0 ? 0 : Math.round(totalPercentAll / visibleWeeks.length);

                                            return (
                                                <tr key={emp.id} className="border-b border-slate-300 hover:bg-slate-50 transition-colors">
                                                    <td className="p-2 text-slate-900 font-medium pl-6">{emp.name}</td>
                                                    
                                                    <td className="p-2 border-r border-slate-300">
                                                        <div className="w-full h-8 rounded flex items-center justify-center text-xs bg-gea-50 text-gea-700 border border-gea-100 font-medium">
                                                            {avgAll}%
                                                        </div>
                                                    </td>

                                                    {months.map(m => {
                                                        const monthWeeks = weeksByMonth[m];
                                                        let monthTotal = 0;
                                                        let hasOfftime = false;

                                                        monthWeeks.forEach(wId => {
                                                            const { total, isOfftime } = getUtilization(emp.id, wId);
                                                            monthTotal += total;
                                                            if (isOfftime) hasOfftime = true;
                                                        });
                                                        
                                                        const avgMonth = monthWeeks.length === 0 ? 0 : Math.round(monthTotal / monthWeeks.length);

                                                        let bgColor = 'bg-slate-50';
                                                        let textColor = 'text-slate-400';
                                                        
                                                        if (avgMonth === 0 && hasOfftime) { bgColor = 'bg-slate-200'; textColor = 'text-slate-600'; }
                                                        else if (avgMonth > 100) { bgColor = 'bg-rose-500'; textColor = 'text-white'; }
                                                        else if (avgMonth === 100) { bgColor = 'bg-emerald-500'; textColor = 'text-white'; }
                                                        else if (avgMonth > 0) { bgColor = 'bg-gea-200'; textColor = 'text-gea-800'; }

                                                        const label = avgMonth > 0 ? `${avgMonth}%` : (hasOfftime ? 'OFF' : '-');

                                                        return (
                                                            <td key={m} className="p-1 border-r border-slate-300 last:border-0">
                                                                <div className={`w-full h-8 rounded flex items-center justify-center text-xs transition-colors ${bgColor} ${textColor} ${hasOfftime && avgMonth === 0 ? 'diagonal-stripes' : ''} font-medium`}>
                                                                    {label}
                                                                </div>
                                                            </td>
                                                        )
                                                    })}
                                                </tr>
                                            )
                                        })}
                                    </React.Fragment>
                                );
                            })}
                        </tbody>
                    </table>
                </div>
            </div>
        );
    };

    const renderProjectDetails = () => {
        const proj = projects.find(p => p.id === selectedProjectDetails);
        if (!proj) return null;

        const projAssignments = assignments.filter(a => a.reference === proj.id && a.type === 'project');
        const assignedEmpIds = [...new Set(projAssignments.map(a => a.empId))];
        const projCostItems = costItems.filter(c => c.projectId === proj.id);

        // Presence grid: sorted weeks that have at least one assignment
        const presenceWeeks = [...new Set(projAssignments.map(a => a.week))].sort();

        // Totals
        let totalHours = 0;
        let totalLaborCost = 0;
        let totalOtherCost = 0;
        assignedEmpIds.forEach(empId => {
            const empAss = projAssignments.filter(a => a.empId === empId);
            const h = empAss.reduce((acc, a) => acc + (a.hours ?? (a.percent / 100 * HOURS_PER_WEEK)), 0);
            totalHours += h;
            if (proj.billable !== false) totalLaborCost += h * (proj.hourlyRate ?? DEFAULT_HOURLY_RATE);
        });
        projCostItems.forEach(ci => { totalOtherCost += ci.amount || 0; });
        const grandTotal = totalLaborCost + totalOtherCost;

        return (
            <div className="flex-1 overflow-auto bg-slate-50 flex flex-col">
                {/* Header */}
                <div className="p-5 border-b border-slate-200 bg-white flex items-center gap-4 flex-wrap">
                    <button onClick={() => setSelectedProjectDetails(null)} className="p-2 text-slate-400 hover:text-slate-700 bg-slate-100 hover:bg-slate-200 rounded-full transition-colors flex-shrink-0">
                        <IconArrowLeft size={20}/>
                    </button>
                    <div className="flex-1 min-w-0">
                        <div className="flex items-center gap-3 flex-wrap">
                            <h2 className="text-2xl text-slate-900 font-medium truncate">{proj.name}</h2>
                            {proj.projectNumber && <span className="text-xs font-mono bg-slate-100 text-slate-500 px-2 py-0.5 rounded border border-slate-200">{proj.projectNumber}</span>}
                        </div>
                        <div className="text-sm text-slate-500 flex items-center gap-2 mt-1 flex-wrap">
                            <span className="flex items-center gap-1"><div className={`w-2 h-2 rounded-full ${proj.color}`}></div>{proj.category}</span>
                            <span>·</span><span>{proj.startWeek} – {proj.ibnWeek}</span>
                        </div>
                    </div>

                    {/* Status + costsSubmitted */}
                    <div className="flex items-center gap-3 flex-wrap">
                        <select value={proj.status || 'active'}
                            onChange={e => setProjects(projects.map(p => p.id === proj.id ? {...p, status: e.target.value} : p))}
                            className="p-2 border border-slate-300 rounded-md text-sm bg-white font-medium">
                            {PROJECT_STATUSES.map(s => <option key={s.value} value={s.value}>{s.label}</option>)}
                        </select>
                        <label className="flex items-center gap-2 cursor-pointer select-none">
                            <input type="checkbox"
                                checked={!!proj.costsSubmitted}
                                onChange={e => setProjects(projects.map(p => p.id === proj.id ? {...p, costsSubmitted: e.target.checked, status: e.target.checked ? 'costs_submitted' : (proj.status === 'costs_submitted' ? 'completed' : proj.status)} : p))}
                                className="w-4 h-4 text-gea-600 rounded"/>
                            <span className="text-sm font-medium text-slate-700">Kosten übermittelt</span>
                        </label>
                        <button onClick={openInvoiceModal} className="bg-white border border-slate-300 hover:bg-slate-50 text-slate-700 px-3 py-2 rounded-lg text-sm flex items-center gap-2 font-medium transition-colors">
                            <IconFileText size={15}/> Rechnung
                        </button>
                        <button onClick={() => { setEditingCostItem(null); setIsCostItemModalOpen(true); }}
                            className="bg-gea-600 hover:bg-gea-700 text-white px-3 py-2 rounded-lg text-sm flex items-center gap-2 font-medium transition-colors">
                            <IconPlus size={15}/> Kostenpunkt
                        </button>
                    </div>
                </div>

                <div className="p-6 max-w-7xl mx-auto w-full space-y-6">

                    {/* Employee Presence Overview */}
                    {assignedEmpIds.length > 0 && presenceWeeks.length > 0 && (
                        <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                            <div className="p-4 bg-slate-50 border-b border-slate-200 flex justify-between items-center">
                                <h3 className="text-slate-900 text-base font-medium">Mitarbeiter-Anwesenheit</h3>
                                <span className="text-xs text-slate-400">{presenceWeeks.length} Wochen</span>
                            </div>
                            <div className="overflow-x-auto">
                                <table className="text-xs border-collapse w-full">
                                    <thead>
                                        <tr>
                                            <th className="p-3 text-left text-slate-500 font-medium border-r border-slate-200 bg-slate-50 w-40 sticky left-0">Mitarbeiter</th>
                                            {presenceWeeks.map(w => (
                                                <th key={w} className="p-2 text-center text-slate-500 font-medium border-r border-slate-200 bg-slate-50 min-w-[52px]">
                                                    KW{w.split('-W')[1]}
                                                </th>
                                            ))}
                                            <th className="p-2 text-center text-slate-500 font-medium bg-slate-50 min-w-[60px]">Stunden</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100">
                                        {assignedEmpIds.map(empId => {
                                            const emp = employees.find(e => e.id === empId);
                                            const empAss = projAssignments.filter(a => a.empId === empId);
                                            const empHours = empAss.reduce((acc, a) => acc + (a.hours ?? (a.percent / 100 * HOURS_PER_WEEK)), 0);
                                            return (
                                                <tr key={empId} className="hover:bg-slate-50">
                                                    <td className="p-3 text-slate-800 font-medium border-r border-slate-200 sticky left-0 bg-white">{emp?.name || 'Unbekannt'}</td>
                                                    {presenceWeeks.map(w => {
                                                        const a = empAss.find(x => x.week === w);
                                                        return (
                                                            <td key={w} className="p-1 text-center border-r border-slate-100">
                                                                {a ? (
                                                                    <div className="mx-auto w-9 h-7 rounded flex items-center justify-center bg-gea-100 text-gea-700 font-medium leading-none">
                                                                        {a.hours ?? Math.round((a.percent ?? 100) / 100 * HOURS_PER_WEEK)}h
                                                                    </div>
                                                                ) : (
                                                                    <div className="mx-auto w-9 h-7 rounded bg-slate-50"></div>
                                                                )}
                                                            </td>
                                                        );
                                                    })}
                                                    <td className="p-2 text-center text-slate-900 font-medium">{empHours}h</td>
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}

                    {/* Cost Items Table */}
                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                        <div className="p-4 bg-slate-50 border-b border-slate-200 flex justify-between items-center">
                            <h3 className="text-slate-900 text-base font-medium">Kostenpunkte</h3>
                            <button onClick={() => { setEditingCostItem(null); setIsCostItemModalOpen(true); }}
                                className="text-gea-600 text-sm font-medium hover:text-gea-700 flex items-center gap-1">
                                <IconPlus size={15}/> Hinzufügen
                            </button>
                        </div>
                        {projCostItems.length === 0 ? (
                            <div className="p-10 text-center text-slate-400 text-sm">
                                Noch keine Kostenpunkte erfasst.
                            </div>
                        ) : (
                            <table className="w-full text-left text-sm">
                                <thead className="bg-slate-50 border-b border-slate-200">
                                    <tr>
                                        <th className="p-3 text-slate-500 font-medium">Mitarbeiter</th>
                                        <th className="p-3 text-slate-500 font-medium">Art</th>
                                        <th className="p-3 text-slate-500 font-medium">Beschreibung</th>
                                        <th className="p-3 text-slate-500 font-medium text-center">KW</th>
                                        <th className="p-3 text-slate-500 font-medium text-right">Std.</th>
                                        <th className="p-3 text-slate-500 font-medium text-right">€/Std.</th>
                                        <th className="p-3 text-slate-500 font-medium text-right">Betrag</th>
                                        <th className="p-3 text-slate-500 font-medium text-right">Details</th>
                                        <th className="p-3"></th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100">
                                    {projCostItems.map(ci => {
                                        const emp = employees.find(e => e.id === ci.empId);
                                        return (
                                            <tr key={ci.id} className="hover:bg-slate-50 transition-colors">
                                                <td className="p-3 text-slate-800 font-medium">{emp?.name || '–'}</td>
                                                <td className="p-3">
                                                    <span className={`text-xs px-2 py-0.5 rounded-full font-medium ${
                                                        ci.type === 'Dienstleistung' ? 'bg-blue-100 text-blue-700' :
                                                        ci.type === 'Reisekosten' ? 'bg-amber-100 text-amber-700' :
                                                        'bg-slate-100 text-slate-600'
                                                    }`}>{ci.type}</span>
                                                </td>
                                                <td className="p-3 text-slate-600">{ci.description || '–'}</td>
                                                <td className="p-3 text-center text-slate-500 text-xs">{ci.week ? `KW${ci.week.split('-W')[1]}` : '–'}</td>
                                                <td className="p-3 text-right text-slate-600">{ci.hours != null ? `${ci.hours}h` : '–'}</td>
                                                <td className="p-3 text-right text-slate-600">{ci.hourlyRate != null ? `${ci.hourlyRate} €` : '–'}</td>
                                                <td className="p-3 text-right text-slate-900 font-medium">{(ci.amount || 0).toFixed(2)} €</td>
                                                <td className="p-3 text-right text-xs text-slate-400">
                                                    {ci.type === 'Reisekosten' && (ci.travelAmount != null || ci.hotelAmount != null) && (
                                                        <span>F:{(ci.travelAmount||0).toFixed(0)}€ H:{(ci.hotelAmount||0).toFixed(0)}€</span>
                                                    )}
                                                </td>
                                                <td className="p-3 text-right">
                                                    <button onClick={() => { setEditingCostItem(ci); setIsCostItemModalOpen(true); }}
                                                        className="text-gea-600 text-xs font-medium hover:text-gea-700">Bearbeiten</button>
                                                </td>
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                        )}
                    </div>

                    {/* Summary */}
                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                        <div className="p-4 bg-slate-50 border-b border-slate-200">
                            <h3 className="text-slate-900 text-base font-medium">Zusammenfassung</h3>
                        </div>
                        <div className="p-6 grid grid-cols-2 gap-6 md:grid-cols-4">
                            <div className="text-center">
                                <p className="text-xs text-slate-500 mb-1 font-medium uppercase tracking-wide">Stunden gesamt</p>
                                <p className="text-2xl text-slate-900 font-medium">{totalHours}h</p>
                            </div>
                            <div className="text-center">
                                <p className="text-xs text-slate-500 mb-1 font-medium uppercase tracking-wide">Lohnkosten</p>
                                <p className="text-2xl text-slate-900 font-medium">{totalLaborCost.toFixed(2)} €</p>
                                {proj.billable === false && <p className="text-xs text-slate-400 mt-1">nicht berechnet</p>}
                            </div>
                            <div className="text-center">
                                <p className="text-xs text-slate-500 mb-1 font-medium uppercase tracking-wide">Kostenpunkte</p>
                                <p className="text-2xl text-slate-900 font-medium">{totalOtherCost.toFixed(2)} €</p>
                            </div>
                            <div className="text-center bg-gea-50 rounded-lg p-3 border border-gea-200">
                                <p className="text-xs text-gea-700 mb-1 font-medium uppercase tracking-wide">Gesamtkosten</p>
                                <p className="text-2xl text-gea-700 font-medium">{grandTotal.toFixed(2)} €</p>
                            </div>
                        </div>
                        <div className="px-6 pb-6 flex items-center gap-4">
                            <label className="flex items-center gap-2 cursor-pointer select-none">
                                <input type="checkbox" checked={proj.billable !== false}
                                    onChange={() => setProjects(projects.map(p => p.id === proj.id ? {...p, billable: !p.billable} : p))}
                                    className="w-4 h-4 text-gea-600 rounded"/>
                                <span className="text-sm text-slate-700">Arbeitszeit berechnen</span>
                            </label>
                            {proj.billable !== false && (
                                <div className="flex items-center gap-2">
                                    <span className="text-sm text-slate-500">Std.-Satz (Projekt-Standard):</span>
                                    <input type="number" min="0" step="1"
                                        value={proj.hourlyRate ?? DEFAULT_HOURLY_RATE}
                                        onChange={e => setProjects(projects.map(p => p.id === proj.id ? {...p, hourlyRate: parseFloat(e.target.value) || 0} : p))}
                                        className="w-20 p-1.5 border border-slate-300 rounded text-sm text-center font-medium"/>
                                    <span className="text-sm text-slate-400">€/h</span>
                                </div>
                            )}
                        </div>
                    </div>
                </div>

                {isCostItemModalOpen && (
                    <CostItemModal
                        projectId={proj.id}
                        existingItem={editingCostItem}
                        onClose={() => { setIsCostItemModalOpen(false); setEditingCostItem(null); }}
                    />
                )}
            </div>
        );
    };

    const renderSetupProj = () => {
        if (selectedProjectDetails) {
            return renderProjectDetails();
        }

        const handleSaveProject = () => {
            if(!projForm.name.trim()) return;
            if (editingProjectId) {
                setProjects(projects.map(p => p.id === editingProjectId ? { ...p, ...projForm } : p));
                setEditingProjectId(null);
            } else {
                setProjects([...projects, { id: `p-${Date.now()}`, ...projForm, billable: true, hourlyRate: DEFAULT_HOURLY_RATE }]);
            }
            setProjForm({ name: '', category: projCategories[0] || '', projectNumber: '', startWeek: weeks[0]?.id || '', ibnWeek: weeks[10]?.id || '', color: 'bg-gea-500', status: 'active' });
        };

        const handleEditProject = (p) => {
            setProjForm({ name: p.name, category: p.category || projCategories[0] || '', projectNumber: p.projectNumber || '', startWeek: p.startWeek, ibnWeek: p.ibnWeek, color: p.color || 'bg-gea-500', status: p.status || 'active' });
            setEditingProjectId(p.id);
        };

        const cancelEditProject = () => {
            setEditingProjectId(null);
            setProjForm({ name: '', category: projCategories[0] || '', projectNumber: '', startWeek: weeks[0]?.id || '', ibnWeek: weeks[10]?.id || '', color: 'bg-gea-500', status: 'active' });
        };

        return (
            <div className="flex-1 overflow-auto p-8 bg-slate-50">
                <div className="max-w-5xl mx-auto bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                    <div className="p-6 border-b border-slate-200 bg-slate-50">
                        <h2 className="text-xl text-slate-900 font-medium">Projekte</h2>
                    </div>
                    <div className="p-6 border-b border-slate-200 grid grid-cols-8 gap-4 items-end bg-white">
                        <div className="col-span-2">
                            <label className="block text-xs text-slate-500 mb-1 font-medium">Name</label>
                            <input type="text" value={projForm.name} onChange={e=>setProjForm({...projForm, name: e.target.value})} className="w-full p-2 border border-slate-300 rounded text-sm"/>
                        </div>
                        <div>
                            <label className="block text-xs text-slate-500 mb-1 font-medium">Projektnummer</label>
                            <input type="text" maxLength={10} value={projForm.projectNumber} onChange={e=>setProjForm({...projForm, projectNumber: e.target.value})} placeholder="z.B. P-2024-001" className="w-full p-2 border border-slate-300 rounded text-sm font-mono"/>
                        </div>
                        <div>
                            <label className="block text-xs text-slate-500 mb-1 font-medium">Kategorie</label>
                            <select value={projForm.category} onChange={e=>setProjForm({...projForm, category: e.target.value})} className="w-full p-2 border border-slate-300 rounded text-sm">
                                {projCategories.map(c => <option key={c} value={c}>{c}</option>)}
                            </select>
                        </div>
                        <div>
                            <label className="block text-xs text-slate-500 mb-1 font-medium">Start (KW)</label>
                            <input type="week" value={projForm.startWeek} onChange={e=>setProjForm({...projForm, startWeek: e.target.value})} className="w-full p-2 border border-slate-300 rounded text-sm"/>
                        </div>
                        <div>
                            <label className="block text-xs text-slate-500 mb-1 font-medium">IBN (KW)</label>
                            <input type="week" value={projForm.ibnWeek} onChange={e=>setProjForm({...projForm, ibnWeek: e.target.value})} className="w-full p-2 border border-slate-300 rounded text-sm"/>
                        </div>
                        <div>
                            <label className="block text-xs text-slate-500 mb-1 font-medium">Status</label>
                            <select value={projForm.status || 'active'} onChange={e => setProjForm({...projForm, status: e.target.value})} className="w-full p-2 border border-slate-300 rounded text-sm">
                                {PROJECT_STATUSES.map(s => <option key={s.value} value={s.value}>{s.label}</option>)}
                            </select>
                        </div>
                        <div className="flex gap-2">
                            {editingProjectId && (
                                <button
                                    onClick={cancelEditProject}
                                    className="bg-slate-200 text-slate-600 px-4 py-2 rounded text-sm hover:bg-slate-300 h-[38px] w-full font-medium transition-colors">
                                    Abbruch
                                </button>
                            )}
                            <button
                                onClick={handleSaveProject}
                                className="bg-gea-600 text-white px-4 py-2 rounded text-sm hover:bg-gea-700 h-[38px] w-full font-medium transition-colors">
                                {editingProjectId ? 'Speichern' : 'Erstellen'}
                            </button>
                        </div>
                    </div>
                    <table className="w-full text-left text-sm">
                        <thead className="bg-slate-50">
                            <tr><th className="p-4 text-slate-500 font-medium">Name</th><th className="p-4 text-slate-500 font-medium">Projektnr.</th><th className="p-4 text-slate-500 font-medium">Kategorie</th><th className="p-4 text-slate-500 font-medium">Status</th><th className="p-4 text-slate-500 font-medium">Zeitraum</th><th className="p-4"></th></tr>
                        </thead>
                        <tbody className="divide-y divide-slate-300">
                            {projects.map(p => (
                                <tr key={p.id} className="hover:bg-slate-50 transition-colors">
                                    <td className="p-4 text-slate-900 flex items-center gap-2 font-medium">
                                        <div className={`w-3 h-3 rounded-full ${p.color}`}></div>{p.name}
                                    </td>
                                    <td className="p-4 text-slate-500 font-mono text-xs">{p.projectNumber || '–'}</td>
                                    <td className="p-4 text-slate-600">{p.category}</td>
                                    <td className="p-4"><StatusBadge status={p.status} /></td>
                                    <td className="p-4 text-slate-600">{p.startWeek} bis {p.ibnWeek}</td>
                                    <td className="p-4 text-right flex justify-end gap-3">
                                        <button onClick={() => setSelectedProjectDetails(p.id)} className="text-emerald-600 text-xs font-medium hover:text-emerald-700">Details / Kosten</button>
                                        <button onClick={() => handleEditProject(p)} className="text-gea-600 text-xs font-medium hover:text-gea-700">Bearbeiten</button>
                                        <button onClick={() => {
                                            setProjects(projects.filter(x => x.id !== p.id));
                                            setAssignments(assignments.filter(a => a.reference !== p.id));
                                        }} className="text-rose-600 text-xs font-medium hover:text-rose-700">Löschen</button>
                                    </td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            </div>
        );
    };

    const renderSetupEmp = () => {
        const handleSaveEmp = () => {
            if(!empForm.name.trim()) return;
            if (editingEmpId) {
                setEmployees(employees.map(e => e.id === editingEmpId ? { ...e, name: empForm.name, category: empForm.category } : e));
                setEditingEmpId(null);
            } else {
                setEmployees([...employees, { id: `emp-${Date.now()}`, name: empForm.name, category: empForm.category, active: true }]);
            }
            setEmpForm({name: '', category: empCategories[0] || ''});
        };

        const handleEditEmp = (e) => {
            setEmpForm({ name: e.name, category: e.category });
            setEditingEmpId(e.id);
        };

        const cancelEditEmp = () => {
            setEditingEmpId(null);
            setEmpForm({name: '', category: empCategories[0] || ''});
        };

        return (
            <div className="flex-1 overflow-auto p-8 bg-slate-50">
                <div className="max-w-4xl mx-auto space-y-6">
                    
                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                        <div className="p-6 border-b border-slate-200 bg-slate-50">
                            <h2 className="text-xl text-slate-900 font-medium">Mitarbeiterverwaltung</h2>
                        </div>
                        <div className="p-6 flex gap-4 items-end bg-white">
                            <div className="flex-1">
                                <label className="block text-xs text-slate-500 mb-1 font-medium">Name</label>
                                <input type="text" value={empForm.name} onChange={e=>setEmpForm({...empForm, name: e.target.value})} className="w-full p-2 border border-slate-300 rounded text-sm"/>
                            </div>
                            <div className="w-48">
                                <label className="block text-xs text-slate-500 mb-1 font-medium">Kategorie</label>
                                <select value={empForm.category} onChange={e=>setEmpForm({...empForm, category: e.target.value})} className="w-full p-2 border border-slate-300 rounded text-sm">
                                    {empCategories.map(c => <option key={c} value={c}>{c}</option>)}
                                </select>
                            </div>
                            <div className="flex gap-2">
                                {editingEmpId && (
                                    <button 
                                        onClick={cancelEditEmp}
                                        className="bg-slate-200 text-slate-600 px-4 py-2 rounded text-sm hover:bg-slate-300 h-[38px] font-medium transition-colors">
                                        Abbruch
                                    </button>
                                )}
                                <button 
                                    onClick={handleSaveEmp}
                                    className="bg-gea-600 text-white px-4 py-2 rounded text-sm hover:bg-gea-700 h-[38px] font-medium transition-colors">
                                    {editingEmpId ? 'Speichern' : 'Hinzufügen'}
                                </button>
                            </div>
                        </div>
                    </div>

                    <div className="space-y-4">
                        {empCategories.map(category => {
                            const isCollapsed = collapsedEmpSetup[category];
                            const catEmps = employees.filter(e => e.category === category);

                            return (
                                <div key={category} className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                                    <button
                                        onClick={() => toggleEmpSetup(category)}
                                        className="w-full p-4 bg-slate-50 border-b border-slate-200 flex items-center gap-2 hover:bg-slate-100 transition-colors"
                                    >
                                        <span className="text-slate-500">
                                            {isCollapsed ? <IconChevronRight size={20}/> : <IconChevronDown size={20}/>}
                                        </span>
                                        <h3 className="text-lg text-slate-900 font-medium">{category}</h3>
                                        <span className="ml-2 px-2 py-0.5 bg-white border border-slate-200 rounded-full text-xs text-slate-500 font-medium">
                                            {catEmps.length}
                                        </span>
                                    </button>

                                    {!isCollapsed && (
                                        catEmps.length > 0 ? (
                                            <table className="w-full text-left text-sm">
                                                <thead className="bg-slate-50/50">
                                                    <tr>
                                                        <th className="p-4 text-slate-500 font-medium">Name</th>
                                                        <th className="p-4 text-slate-500 font-medium">Status</th>
                                                        <th className="p-4"></th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-300">
                                                    {catEmps.map(e => (
                                                        <tr key={e.id} className="hover:bg-slate-50 transition-colors">
                                                            <td className="p-4 text-slate-900 font-medium">{e.name}</td>
                                                            <td className="p-4">
                                                                <span className={`px-2 py-1 rounded text-xs font-medium ${e.active ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-200 text-slate-600'}`}>
                                                                    {e.active ? 'Aktiv' : 'Inaktiv'}
                                                                </span>
                                                            </td>
                                                            <td className="p-4 text-right flex justify-end gap-3">
                                                                <button onClick={() => handleEditEmp(e)} className="text-gea-600 text-xs font-medium hover:text-gea-700">Bearbeiten</button>
                                                                <button onClick={() => setEmployees(employees.map(x => x.id === e.id ? {...x, active: !x.active} : x))} className="text-gea-600 text-xs font-medium hover:text-gea-700">Toggle Status</button>
                                                            </td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        ) : (
                                            <div className="p-4 text-sm text-slate-400 text-center bg-white">
                                                Keine Mitarbeiter in dieser Kategorie.
                                            </div>
                                        )
                                    )}
                                </div>
                            );
                        })}
                    </div>
                </div>
            </div>
        );
    };

    const renderSetupCats = () => {
        return (
            <div className="flex-1 overflow-auto p-8 bg-slate-50">
                <div className="max-w-4xl mx-auto space-y-6">
                    
                    {/* Basic Tasks */}
                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                        <button 
                            onClick={() => setExpandedSetupCats(prev => ({...prev, basic: !prev.basic}))}
                            className="w-full p-4 border-b border-slate-200 bg-slate-50 flex justify-between items-center hover:bg-slate-100 transition-colors"
                        >
                            <h2 className="text-lg text-slate-900 font-medium">Standard-Aufgaben (Basic Tasks)</h2>
                            <div className="text-slate-500">
                                {expandedSetupCats.basic ? <IconChevronDown size={20}/> : <IconChevronRight size={20}/>}
                            </div>
                        </button>
                        {expandedSetupCats.basic && (
                            <div>
                                <div className="p-4 flex gap-2 border-b border-slate-300">
                                    <input type="text" value={newBasicTask} onChange={e=>setNewBasicTask(e.target.value)} placeholder="Neuer Basic Task" className="flex-1 p-2 border border-slate-300 rounded text-sm"/>
                                    <button onClick={() => { if(newBasicTask.trim() && !basicTasks.includes(newBasicTask)) { setBasicTasks([...basicTasks, newBasicTask.trim()]); setNewBasicTask(''); } }} className="bg-gea-600 text-white px-3 py-2 rounded text-sm font-medium hover:bg-gea-700">Hinzufügen</button>
                                </div>
                                <ul className="divide-y divide-slate-300">
                                    {basicTasks.map(task => (
                                        <li key={task} className="p-4 flex justify-between items-center text-sm">
                                            <span className="text-slate-800">{task}</span>
                                            <button onClick={() => setBasicTasks(basicTasks.filter(t => t !== task))} className="text-rose-500 hover:text-rose-700"><IconX size={16}/></button>
                                        </li>
                                    ))}
                                </ul>
                            </div>
                        )}
                    </div>

                    {/* Offtime */}
                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                        <button 
                            onClick={() => setExpandedSetupCats(prev => ({...prev, offtime: !prev.offtime}))}
                            className="w-full p-4 border-b border-slate-200 bg-slate-50 flex justify-between items-center hover:bg-slate-100 transition-colors"
                        >
                            <h2 className="text-lg text-slate-900 font-medium">Abwesenheiten (Offtime)</h2>
                            <div className="text-slate-500">
                                {expandedSetupCats.offtime ? <IconChevronDown size={20}/> : <IconChevronRight size={20}/>}
                            </div>
                        </button>
                        {expandedSetupCats.offtime && (
                            <div>
                                <div className="p-4 flex gap-2 border-b border-slate-300">
                                    <input type="text" value={newOfftimeTask} onChange={e=>setNewOfftimeTask(e.target.value)} placeholder="Neue Abwesenheitsart" className="flex-1 p-2 border border-slate-300 rounded text-sm"/>
                                    <button onClick={() => { if(newOfftimeTask.trim() && !offtimeTasks.includes(newOfftimeTask)) { setOfftimeTasks([...offtimeTasks, newOfftimeTask.trim()]); setNewOfftimeTask(''); } }} className="bg-gea-600 text-white px-3 py-2 rounded text-sm font-medium hover:bg-gea-700">Hinzufügen</button>
                                </div>
                                <ul className="divide-y divide-slate-300">
                                    {offtimeTasks.map(task => (
                                        <li key={task} className="p-4 flex justify-between items-center text-sm">
                                            <span className="text-slate-800">{task}</span>
                                            <button onClick={() => setOfftimeTasks(offtimeTasks.filter(t => t !== task))} className="text-rose-500 hover:text-rose-700"><IconX size={16}/></button>
                                        </li>
                                    ))}
                                </ul>
                            </div>
                        )}
                    </div>

                </div>
            </div>
        );
    };

    const renderData = () => (
        <div className="flex-1 p-8 bg-slate-50 flex items-center justify-center">
            <div className="max-w-md w-full bg-white rounded-xl shadow-sm border border-slate-200 p-8 text-center">
                <IconSettings size={48} className="mx-auto text-slate-300 mb-6"/>
                <h2 className="text-xl text-slate-900 mb-2 font-medium">Datenverwaltung</h2>
                <p className="text-sm text-slate-500 mb-8">Exportiere deine Planung als JSON-Backup oder stelle Daten aus einem Backup wieder her.</p>
                
                <div className="space-y-4">
                    <button onClick={exportData} className="w-full bg-gea-600 hover:bg-gea-700 text-white py-3 rounded-lg flex justify-center items-center gap-2 font-medium transition-colors">
                        <IconDownload size={20}/> Vollständiges Backup (JSON)
                    </button>
                    
                    <div className="relative">
                        <input type="file" accept=".json" onChange={importData} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                        <button className="w-full bg-white border-2 border-dashed border-slate-300 hover:border-gea-400 text-slate-600 py-3 rounded-lg flex justify-center items-center gap-2 font-medium transition-colors">
                            <IconUpload size={20}/> Daten Importieren (JSON)
                        </button>
                    </div>
                    
                    <button onClick={() => {
                        if(confirm('Alle Daten unwiderruflich löschen?')) {
                            localStorage.removeItem('teamMasterProData');
                            window.location.reload();
                        }
                    }} className="w-full mt-8 text-rose-500 hover:bg-rose-50 py-3 rounded-lg text-sm font-medium transition-colors">
                        System zurücksetzen
                    </button>
                </div>
            </div>
        </div>
    );

    return (
        <div className="flex h-screen w-full font-sans text-slate-800 bg-white overflow-hidden">
            <style dangerouslySetInnerHTML={{__html: `
                .diagonal-stripes {
                    background-image: repeating-linear-gradient(45deg, #f8fafc, #f8fafc 5px, #f1f5f9 5px, #f1f5f9 10px);
                }
            `}} />
            
            {renderSidebar()}
            
            {activeTab === 'resource' && renderResourceView()}
            {activeTab === 'project' && renderProjectTimeline()}
            {activeTab === 'utilization' && renderUtilization()}
            {activeTab === 'setup_emp' && renderSetupEmp()}
            {activeTab === 'setup_proj' && renderSetupProj()}
            {activeTab === 'setup_cats' && renderSetupCats()}
            {activeTab === 'data' && renderData()}

            {isAssignModalOpen && <AssignmentModal />}
            {isCopyModalOpen && <CopyModal />}
            {isInvoiceModalOpen && <InvoiceModal />}
        </div>
    );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>

</body>
</html>
