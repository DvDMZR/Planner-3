<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Einsatzplanung 3.0</title>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    
    <!-- Babel für JSX Kompilierung im Browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        .diagonal-stripes {
            background-image: repeating-linear-gradient(45deg, #f8fafc, #f8fafc 5px, #f1f5f9 5px, #f1f5f9 10px);
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
        }
    </style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

// --- INLINE ICONS ---
const IconUsers = ({ className, size=20 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" /><circle cx="9" cy="7" r="4" /><path d="M22 21v-2a4 4 0 0 0-3-3.87" /><path d="M16 3.13a4 4 0 0 1 0 7.75" /></svg>;
const IconBriefcase = ({ className, size=20 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="20" height="14" x="2" y="7" rx="2" ry="2" /><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16" /></svg>;
const IconCalendar = ({ className, size=20 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>;
const IconBarChart = ({ className, size=20 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="20" x2="12" y2="10"></line><line x1="18" y1="20" x2="18" y2="4"></line><line x1="6" y1="20" x2="6" y2="16"></line></svg>;
const IconSettings = ({ className, size=20 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>;
const IconPlus = ({ className, size=20 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
const IconX = ({ className, size=20 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;
const IconDownload = ({ className, size=20 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>;
const IconUpload = ({ className, size=20 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>;
const IconChevronDown = ({ size=20, className }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="6 9 12 15 18 9"></polyline></svg>;
const IconChevronRight = ({ size=20, className }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="9 18 15 12 9 6"></polyline></svg>;
const IconArrowLeft = ({ size=20, className }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>;
const IconFileText = ({ className, size=20 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>;
const IconList = ({ className, size=20 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>;

// --- KONFIGURATION ---
const EXPENSE_TYPES = ['Travelcosts', 'Hotel', 'Other'];
const DEFAULT_HOURLY_RATE = 80;
const HOURS_PER_WEEK = 40;
const WEEKS_IN_YEAR = 52;
const DEFAULT_WEEKS_AHEAD = 12;

// Hilfsfunktion KW
const getWeekString = (date) => {
    const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
    d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay()||7));
    const yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
    const kw = Math.ceil(( ( (d - yearStart) / 86400000) + 1)/7);
    return `${d.getUTCFullYear()}-W${kw.toString().padStart(2, '0')}`;
};

// --- DUMMY DATA GENERATOR ---
const generateInitialData = (empCats) => {
    const emps = Array.from({ length: 5 }, (_, i) => ({
        id: `emp-${i}`,
        name: `Mitarbeiter ${i + 1}`,
        category: empCats[i % empCats.length],
        active: true
    }));

    return { employees: emps, projects: [], assignments: [], expenses: [] };
};

// --- MAIN APP ---
function App() {
    // --- STATE ---
    const [activeTab, setActiveTab] = useState('resource'); 
    
    const [employees, setEmployees] = useState([]);
    const [projects, setProjects] = useState([]);
    const [assignments, setAssignments] = useState([]); 
    const [expenses, setExpenses] = useState([]);
    
    // Dynamic Categories
    const [empCategories, setEmpCategories] = useState(['CMS', 'AS', 'ME', 'HM', 'Other']);
    const [projCategories, setProjCategories] = useState(['AMS', 'AFS', 'CMS', 'Other']);
    const [basicTasks, setBasicTasks] = useState(['Office', '24/7', 'Ticketing', 'Other']);
    const [offtimeTasks, setOfftimeTasks] = useState(['Vacation', 'Sickness', 'Gleitzeit', 'Other']);

    const [weeks, setWeeks] = useState([]);
    const [selectedProject, setSelectedProject] = useState(null);
    const [collapsedCategories, setCollapsedCategories] = useState({});
    const [collapsedProjCategories, setCollapsedProjCategories] = useState({});
    const [collapsedEmpSetup, setCollapsedEmpSetup] = useState({});

    // Ansichten-Steuerung für Projekt-Details
    const [selectedProjectDetails, setSelectedProjectDetails] = useState(null);

    // Zeitspanne für Auslastungs-Berechnung
    const [weeksAhead, setWeeksAhead] = useState(DEFAULT_WEEKS_AHEAD);

    // Modals
    const [isAssignModalOpen, setIsAssignModalOpen] = useState(false);
    const [assignContext, setAssignContext] = useState(null); 
    
    const [isExpenseModalOpen, setIsExpenseModalOpen] = useState(false);
    const [expenseForm, setExpenseForm] = useState({ empId: '', type: 'Travelcosts', amount: '' });
    
    const [isInvoiceModalOpen, setIsInvoiceModalOpen] = useState(false);
    const [invoiceSelection, setInvoiceSelection] = useState({ emps: {}, expenses: {} });

    // Forms
    const [empForm, setEmpForm] = useState({ name: '', category: '' });
    const [editingEmpId, setEditingEmpId] = useState(null);
    const [projForm, setProjForm] = useState({ name: '', category: '', startWeek: '', ibnWeek: '', color: 'bg-indigo-500', hourlyRate: DEFAULT_HOURLY_RATE, billable: true });
    const [editingProjectId, setEditingProjectId] = useState(null);

    // Category Forms
    const [newEmpCat, setNewEmpCat] = useState('');
    const [newProjCat, setNewProjCat] = useState('');
    const [newBasicTask, setNewBasicTask] = useState('');
    const [newOfftimeTask, setNewOfftimeTask] = useState('');
    const [expandedSetupCats, setExpandedSetupCats] = useState({ basic: true, offtime: false });

    // --- INIT ---
    useEffect(() => {
        const savedData = localStorage.getItem('teamMasterProData');
        let currentEmpCats = ['CMS', 'AS', 'ME', 'HM', 'Other'];
        
        if (savedData) {
            const parsed = JSON.parse(savedData);
            setEmployees(parsed.employees || []);
            setProjects(parsed.projects || []);
            setAssignments(parsed.assignments || []);
            setExpenses(parsed.expenses || []);
            if (parsed.empCategories) { setEmpCategories(parsed.empCategories); currentEmpCats = parsed.empCategories; }
            if (parsed.projCategories) setProjCategories(parsed.projCategories);
            if (parsed.basicTasks) setBasicTasks(parsed.basicTasks);
            if (parsed.offtimeTasks) setOfftimeTasks(parsed.offtimeTasks);
        } else {
            const init = generateInitialData(currentEmpCats);
            setEmployees(init.employees);
            setProjects(init.projects);
            setAssignments(init.assignments);
            setExpenses(init.expenses);
        }

        const MONTH_NAMES = ['Januar', 'Februar', 'März', 'April', 'Mai', 'Juni', 'Juli', 'August', 'September', 'Oktober', 'November', 'Dezember'];
        const w = [];
        const today = new Date();
        for(let i=0; i<WEEKS_IN_YEAR; i++) {
            const d = new Date(today.getFullYear(), today.getMonth(), today.getDate() + (i*7));
            d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay()||7));
            const yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
            const kw = Math.ceil(( ( (d - yearStart) / 86400000) + 1)/7);
            
            w.push({ 
                id: `${d.getFullYear()}-W${kw.toString().padStart(2, '0')}`, 
                label: `KW ${kw}`,
                sub: `${d.getDate()}.${d.getMonth()+1}.`,
                month: `${MONTH_NAMES[d.getMonth()]} ${d.getFullYear()}`
            });
        }
        setWeeks(w);
        
        setEmpForm(prev => ({...prev, category: currentEmpCats[0] || ''}));
        setProjForm(prev => ({...prev, startWeek: w[0].id, ibnWeek: w[10]?.id || w[w.length-1].id}));
    }, []);

    // Save on change
    useEffect(() => {
        if (employees.length > 0) {
            localStorage.setItem('teamMasterProData', JSON.stringify({ 
                employees, projects, assignments, expenses,
                empCategories, projCategories, basicTasks, offtimeTasks
            }));
        }
    }, [employees, projects, assignments, expenses, empCategories, projCategories, basicTasks, offtimeTasks]);

    // Ensure form defaults align with categories
    useEffect(() => {
        if (!empForm.category && empCategories.length > 0) {
            setEmpForm(prev => ({...prev, category: empCategories[0]}));
        }
        if (!projForm.category && projCategories.length > 0) {
            setProjForm(prev => ({...prev, category: projCategories[0]}));
        }
    }, [empCategories, projCategories]);

    // --- LOGIC ---
    const getUtilization = (empId, week) => {
        const weekAss = assignments.filter(a => a.empId === empId && a.week === week);
        let total = 0;
        let isOfftime = false;
        weekAss.forEach(a => {
            total += a.percent;
            if (a.type === 'offtime') isOfftime = true;
        });
        return { total, isOfftime, assignments: weekAss };
    };

    const toggleCategory = (cat) => {
        setCollapsedCategories(prev => ({...prev, [cat]: !prev[cat]}));
    };

    const toggleProjCategory = (cat) => {
        setCollapsedProjCategories(prev => ({...prev, [cat]: !prev[cat]}));
    };

    const toggleEmpSetup = (cat) => {
        setCollapsedEmpSetup(prev => ({...prev, [cat]: !prev[cat]}));
    };

    const handleSaveAssignment = (data) => {
        if (data.id) {
            setAssignments(assignments.map(a => a.id === data.id ? data : a));
        } else {
            setAssignments([...assignments, { ...data, id: `ass-${Date.now()}` }]);
        }
        setIsAssignModalOpen(false);
    };

    const handleDeleteAssignment = (id) => {
        setAssignments(assignments.filter(a => a.id !== id));
        setIsAssignModalOpen(false);
    };

    const handleDrop = (e, targetWeek, projectId) => {
        e.preventDefault();
        const empId = e.dataTransfer.getData('empId');
        if (!empId) return;

        const newAss = {
            id: `ass-${Date.now()}`,
            empId,
            week: targetWeek,
            type: 'project',
            reference: projectId,
            percent: 100
        };
        setAssignments([...assignments, newAss]);
    };

    const exportData = () => {
        const data = JSON.stringify({ employees, projects, assignments, expenses, empCategories, projCategories, basicTasks, offtimeTasks }, null, 2);
        const blob = new Blob([data], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `Einsatzplanung3.0_Backup_${new Date().toISOString().split('T')[0]}.json`;
        a.click();
    };

    const importData = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            try {
                const parsed = JSON.parse(event.target.result);
                if (parsed.employees) setEmployees(parsed.employees);
                if (parsed.projects) setProjects(parsed.projects);
                if (parsed.assignments) setAssignments(parsed.assignments);
                if (parsed.expenses) setExpenses(parsed.expenses);
                if (parsed.empCategories) setEmpCategories(parsed.empCategories);
                if (parsed.projCategories) setProjCategories(parsed.projCategories);
                if (parsed.basicTasks) setBasicTasks(parsed.basicTasks);
                if (parsed.offtimeTasks) setOfftimeTasks(parsed.offtimeTasks);
            } catch (err) {
                alert('Fehler beim Importieren der Daten: Die Datei konnte nicht gelesen werden.');
            }
        };
        reader.readAsText(file);
    };

    const openInvoiceModal = () => {
        const projAssignments = assignments.filter(a => a.reference === selectedProjectDetails);
        const empIds = [...new Set(projAssignments.map(a => a.empId))];
        const projExpenses = expenses.filter(e => e.projectId === selectedProjectDetails);

        const initialEmps = {};
        empIds.forEach(id => initialEmps[id] = true);

        const initialExpenses = {};
        projExpenses.forEach(e => initialExpenses[e.id] = true);

        setInvoiceSelection({ emps: initialEmps, expenses: initialExpenses });
        setIsInvoiceModalOpen(true);
    };

    const handleInvoiceExport = () => {
        const proj = projects.find(p => p.id === selectedProjectDetails);
        const rate = proj.hourlyRate ?? DEFAULT_HOURLY_RATE;
        const rows = [];
        
        rows.push(["Rechnung für Projekt:", proj.name]);
        rows.push(["Kunde:", proj.client]);
        rows.push(["Datum:", new Date().toLocaleDateString('de-DE')]);
        rows.push([]);
        rows.push(["Position", "Mitarbeiter", "Details", "Menge", "Einzelpreis", "Gesamt"]);

        let total = 0;

        Object.keys(invoiceSelection.emps).forEach(empId => {
            if (invoiceSelection.emps[empId]) {
                const emp = employees.find(e => e.id === empId);
                const empAss = assignments.filter(a => a.reference === proj.id && a.empId === empId);
                const hours = empAss.reduce((acc, a) => acc + (a.percent / 100 * HOURS_PER_WEEK), 0);
                if (hours > 0 && proj.billable !== false) {
                    const cost = hours * rate;
                    total += cost;
                    rows.push(["Dienstleistung", emp?.name || 'Unbekannt', "Arbeitszeit", `${hours} Std.`, `${rate} EUR`, `${cost.toFixed(2)} EUR`]);
                }
            }
        });

        const projExps = expenses.filter(e => e.projectId === proj.id);
        projExps.forEach(exp => {
            if (invoiceSelection.expenses[exp.id]) {
                const emp = employees.find(e => e.id === exp.empId);
                total += exp.amount;
                rows.push(["Auslage", emp?.name || 'Unbekannt', exp.type, "1", `${exp.amount.toFixed(2)} EUR`, `${exp.amount.toFixed(2)} EUR`]);
            }
        });

        rows.push([]);
        rows.push(["", "", "", "", "Gesamt Netto:", `${total.toFixed(2)} EUR`]);

        const csvContent = "\uFEFF" + rows.map(e => e.join(";")).join("\n");
        const encodedUri = encodeURI("data:text/csv;charset=utf-8," + csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", `Rechnung_${proj.name.replace(/\s+/g, '_')}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        
        setIsInvoiceModalOpen(false);
    };

    // --- SUB-COMPONENTS ---
    const ModalHeader = ({ title, subtitle, onClose }) => (
        <div className="p-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
            <div>
                <h3 className="text-slate-900 text-lg font-medium">{title}</h3>
                {subtitle && <p className="text-sm text-slate-500">{subtitle}</p>}
            </div>
            <button onClick={onClose} className="text-slate-400 hover:text-slate-600"><IconX size={20}/></button>
        </div>
    );

    const AssignmentModal = () => {
        if (!isAssignModalOpen || !assignContext) return null;
        
        const [formData, setFormData] = useState(assignContext.existing || {
            empId: assignContext.empId,
            week: assignContext.week,
            type: 'project',
            reference: projects.length > 0 ? projects[0].id : '',
            percent: 100
        });

        const emp = employees.find(e => e.id === formData.empId);

        return (
            <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                <div className="bg-white rounded-xl shadow-xl w-full max-w-md overflow-hidden">
                    <ModalHeader title="Planung bearbeiten" onClose={() => setIsAssignModalOpen(false)} />
                    <div className="p-6 space-y-4">
                        <div className="text-sm text-slate-500 mb-4">
                            Mitarbeiter: <span className="text-slate-900 font-medium">{emp?.name}</span> <br/>
                            Woche: <span className="text-slate-900 font-medium">{formData.week}</span>
                        </div>

                        <div>
                            <label className="block text-sm text-slate-700 mb-1 font-medium">Typ</label>
                            <select 
                                value={formData.type} 
                                onChange={(e) => {
                                    const type = e.target.value;
                                    let ref = '';
                                    if(type === 'project') ref = projects[0]?.id || '';
                                    else if(type === 'basic') ref = basicTasks[0] || '';
                                    else if(type === 'offtime') ref = offtimeTasks[0] || '';
                                    setFormData({...formData, type, reference: ref});
                                }}
                                className="w-full p-2 border border-slate-300 rounded-md text-sm">
                                <option value="project">Projekt</option>
                                <option value="basic">Basic Task</option>
                                <option value="offtime">Offtime (Urlaub/Krank)</option>
                            </select>
                        </div>

                        <div>
                            <label className="block text-sm text-slate-700 mb-1 font-medium">Referenz</label>
                            {formData.type === 'project' && (
                                <select value={formData.reference} onChange={(e) => setFormData({...formData, reference: e.target.value})} className="w-full p-2 border border-slate-300 rounded-md text-sm">
                                    {projects.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
                                </select>
                            )}
                            {formData.type === 'basic' && (
                                <select value={formData.reference} onChange={(e) => setFormData({...formData, reference: e.target.value})} className="w-full p-2 border border-slate-300 rounded-md text-sm">
                                    {basicTasks.map(t => <option key={t} value={t}>{t}</option>)}
                                </select>
                            )}
                            {formData.type === 'offtime' && (
                                <select value={formData.reference} onChange={(e) => setFormData({...formData, reference: e.target.value})} className="w-full p-2 border border-slate-300 rounded-md text-sm">
                                    {offtimeTasks.map(t => <option key={t} value={t}>{t}</option>)}
                                </select>
                            )}
                        </div>

                        <div>
                            <label className="block text-sm text-slate-700 mb-1 font-medium">Auslastung (%)</label>
                            <input 
                                type="number" min="0" max="100" step="10"
                                value={formData.percent}
                                onChange={(e) => setFormData({...formData, percent: parseInt(e.target.value) || 0})}
                                className="w-full p-2 border border-slate-300 rounded-md text-sm"
                            />
                        </div>
                    </div>
                    <div className="p-4 bg-slate-50 border-t border-slate-100 flex justify-between">
                        {formData.id ? (
                            <button onClick={() => handleDeleteAssignment(formData.id)} className="text-rose-600 text-sm hover:bg-rose-50 px-3 py-2 rounded font-medium">Löschen</button>
                        ) : <div></div>}
                        <div className="flex gap-2">
                            <button onClick={() => setIsAssignModalOpen(false)} className="px-4 py-2 text-sm text-slate-600 bg-white border border-slate-300 rounded-md hover:bg-slate-50 font-medium">Abbrechen</button>
                            <button onClick={() => handleSaveAssignment(formData)} className="px-4 py-2 text-sm text-white bg-indigo-600 rounded-md hover:bg-indigo-700 font-medium">Speichern</button>
                        </div>
                    </div>
                </div>
            </div>
        );
    };

    const ExpenseModal = () => {
        if (!isExpenseModalOpen || !selectedProjectDetails) return null;
        
        const projAssignments = assignments.filter(a => a.reference === selectedProjectDetails);
        const empIds = [...new Set(projAssignments.map(a => a.empId))];
        const projEmployees = employees.filter(e => empIds.includes(e.id));

        const handleSave = () => {
            if (!expenseForm.empId || !expenseForm.amount) return;
            setExpenses([...expenses, {
                id: `exp-${Date.now()}`,
                projectId: selectedProjectDetails,
                empId: expenseForm.empId,
                type: expenseForm.type,
                amount: parseFloat(expenseForm.amount) || 0
            }]);
            setIsExpenseModalOpen(false);
            setExpenseForm({ empId: '', type: 'Travelcosts', amount: '' });
        };

        return (
            <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                <div className="bg-white rounded-xl shadow-xl w-full max-w-md overflow-hidden">
                    <ModalHeader title="Reisekosten erfassen" onClose={() => setIsExpenseModalOpen(false)} />
                    <div className="p-6 space-y-4">
                        <div>
                            <label className="block text-sm text-slate-700 mb-1 font-medium">Mitarbeiter</label>
                            <select 
                                value={expenseForm.empId} 
                                onChange={(e) => setExpenseForm({...expenseForm, empId: e.target.value})}
                                className="w-full p-2 border border-slate-300 rounded-md text-sm">
                                <option value="">Bitte wählen...</option>
                                {projEmployees.map(e => <option key={e.id} value={e.id}>{e.name}</option>)}
                            </select>
                        </div>
                        <div>
                            <label className="block text-sm text-slate-700 mb-1 font-medium">Kostenart</label>
                            <select 
                                value={expenseForm.type} 
                                onChange={(e) => setExpenseForm({...expenseForm, type: e.target.value})}
                                className="w-full p-2 border border-slate-300 rounded-md text-sm">
                                {EXPENSE_TYPES.map(t => <option key={t} value={t}>{t}</option>)}
                            </select>
                        </div>
                        <div>
                            <label className="block text-sm text-slate-700 mb-1 font-medium">Betrag (€)</label>
                            <input 
                                type="number" step="0.01"
                                value={expenseForm.amount}
                                onChange={(e) => setExpenseForm({...expenseForm, amount: e.target.value})}
                                className="w-full p-2 border border-slate-300 rounded-md text-sm"
                            />
                        </div>
                    </div>
                    <div className="p-4 bg-slate-50 border-t border-slate-100 flex justify-end gap-2">
                        <button onClick={() => setIsExpenseModalOpen(false)} className="px-4 py-2 text-sm text-slate-600 bg-white border border-slate-300 rounded-md hover:bg-slate-50 font-medium">Abbrechen</button>
                        <button onClick={handleSave} className="px-4 py-2 text-sm text-white bg-indigo-600 rounded-md hover:bg-indigo-700 font-medium">Speichern</button>
                    </div>
                </div>
            </div>
        );
    };

    const InvoiceModal = () => {
        if (!isInvoiceModalOpen || !selectedProjectDetails) return null;

        const proj = projects.find(p => p.id === selectedProjectDetails);
        const rate = proj.hourlyRate ?? DEFAULT_HOURLY_RATE;

        const projAssignments = assignments.filter(a => a.reference === selectedProjectDetails);
        const empIds = [...new Set(projAssignments.map(a => a.empId))];
        const projExpenses = expenses.filter(e => e.projectId === selectedProjectDetails);

        let currentTotal = 0;

        return (
            <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                <div className="bg-white rounded-xl shadow-xl w-full max-w-2xl max-h-[90vh] flex flex-col overflow-hidden">
                    <ModalHeader title="Rechnung konfigurieren" subtitle={`Projekt: ${proj.name}`} onClose={() => setIsInvoiceModalOpen(false)} />
                    
                    <div className="flex-1 overflow-y-auto p-6 space-y-6">
                        {proj.billable !== false && (
                            <div>
                                <h4 className="text-slate-700 text-base mb-3 border-b border-slate-100 pb-2 font-medium">Dienstleistungen (Arbeitszeit)</h4>
                                <div className="space-y-2">
                                    {empIds.map(empId => {
                                        const emp = employees.find(e => e.id === empId);
                                        const empAss = projAssignments.filter(a => a.empId === empId);
                                        const hours = empAss.reduce((acc, a) => acc + (a.percent / 100 * HOURS_PER_WEEK), 0);
                                        if (hours === 0) return null;
                                        
                                        const cost = hours * rate;
                                        if (invoiceSelection.emps[empId]) currentTotal += cost;

                                        return (
                                            <label key={empId} className="flex items-center gap-3 p-3 border border-slate-200 rounded-lg hover:bg-slate-50 cursor-pointer transition-colors">
                                                <input 
                                                    type="checkbox" 
                                                    checked={!!invoiceSelection.emps[empId]}
                                                    onChange={(e) => setInvoiceSelection({
                                                        ...invoiceSelection, 
                                                        emps: {...invoiceSelection.emps, [empId]: e.target.checked}
                                                    })}
                                                    className="w-5 h-5 text-indigo-600 rounded"
                                                />
                                                <div className="flex-1 text-sm text-slate-800 font-medium">{emp?.name || 'Unbekannt'}</div>
                                                <div className="text-sm text-slate-500">{hours} Std.</div>
                                                <div className="text-sm text-slate-900 w-24 text-right font-medium">{cost.toFixed(2)} €</div>
                                            </label>
                                        );
                                    })}
                                    {empIds.length === 0 && <p className="text-sm text-slate-400">Keine Arbeitszeiten erfasst.</p>}
                                </div>
                            </div>
                        )}

                        <div>
                            <h4 className="text-slate-700 text-base mb-3 border-b border-slate-100 pb-2 font-medium">Auslagen & Reisekosten</h4>
                            <div className="space-y-2">
                                {projExpenses.map(exp => {
                                    const emp = employees.find(e => e.id === exp.empId);
                                    if (invoiceSelection.expenses[exp.id]) currentTotal += exp.amount;

                                    return (
                                        <label key={exp.id} className="flex items-center gap-3 p-3 border border-slate-200 rounded-lg hover:bg-slate-50 cursor-pointer transition-colors">
                                            <input 
                                                type="checkbox" 
                                                checked={!!invoiceSelection.expenses[exp.id]}
                                                onChange={(e) => setInvoiceSelection({
                                                    ...invoiceSelection, 
                                                    expenses: {...invoiceSelection.expenses, [exp.id]: e.target.checked}
                                                })}
                                                className="w-5 h-5 text-indigo-600 rounded"
                                            />
                                            <div className="flex-1 text-sm text-slate-800 font-medium">
                                                {exp.type} <span className="text-slate-400 font-normal">({emp?.name || 'Unbekannt'})</span>
                                            </div>
                                            <div className="text-sm text-slate-900 w-24 text-right font-medium">{exp.amount.toFixed(2)} €</div>
                                        </label>
                                    );
                                })}
                                {projExpenses.length === 0 && <p className="text-sm text-slate-400">Keine Reisekosten erfasst.</p>}
                            </div>
                        </div>
                    </div>

                    <div className="p-6 bg-slate-50 border-t border-slate-100 flex justify-between items-center">
                        <div>
                            <p className="text-sm text-slate-500">Gesamtsumme (Netto)</p>
                            <p className="text-xl text-indigo-600 font-medium">{currentTotal.toFixed(2)} €</p>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={() => setIsInvoiceModalOpen(false)} className="px-4 py-2 text-sm text-slate-600 bg-white border border-slate-300 rounded-md hover:bg-slate-50 font-medium">Abbrechen</button>
                            <button onClick={handleInvoiceExport} className="px-4 py-2 text-sm text-white bg-indigo-600 rounded-md hover:bg-indigo-700 flex items-center gap-2 font-medium">
                                <IconFileText size={16} /> Excel Export
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        );
    };

    // --- VIEWS ---

    const renderSidebar = () => (
        <aside className="w-56 bg-slate-900 text-slate-300 flex flex-col h-full shrink-0">
            <div className="p-6 flex items-center gap-3 border-b border-slate-800">
                <div className="bg-indigo-500 text-white p-2 rounded-lg"><IconBriefcase size={20} /></div>
                <h1 className="text-white text-xl tracking-tight font-medium">Einsatzplanung 3.0</h1>
            </div>
            <nav className="flex-1 py-4 space-y-1 px-3">
                <div className="text-xs text-slate-500 uppercase tracking-wider mb-2 px-3 mt-4 font-medium">Planung</div>
                <button onClick={() => { setActiveTab('resource'); setSelectedProjectDetails(null); }} className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm transition-colors font-medium ${activeTab === 'resource' ? 'bg-indigo-600 text-white' : 'hover:bg-slate-800 hover:text-white'}`}><IconUsers size={18}/> Ressourcen</button>
                <button onClick={() => { setActiveTab('project'); setSelectedProject(projects[0]); setSelectedProjectDetails(null); }} className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm transition-colors font-medium ${activeTab === 'project' ? 'bg-indigo-600 text-white' : 'hover:bg-slate-800 hover:text-white'}`}><IconBriefcase size={18}/> Projekte</button>
                <button onClick={() => { setActiveTab('utilization'); setSelectedProjectDetails(null); }} className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm transition-colors font-medium ${activeTab === 'utilization' ? 'bg-indigo-600 text-white' : 'hover:bg-slate-800 hover:text-white'}`}><IconBarChart size={18}/> Auslastung</button>
                
                <div className="text-xs text-slate-500 uppercase tracking-wider mb-2 px-3 mt-8 font-medium">Verwaltung</div>
                <button onClick={() => { setActiveTab('setup_emp'); setSelectedProjectDetails(null); }} className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm transition-colors font-medium ${activeTab === 'setup_emp' ? 'bg-slate-800 text-white' : 'hover:bg-slate-800 hover:text-white'}`}>Mitarbeiter</button>
                <button onClick={() => { setActiveTab('setup_proj'); setSelectedProjectDetails(null); }} className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm transition-colors font-medium ${activeTab === 'setup_proj' ? 'bg-slate-800 text-white' : 'hover:bg-slate-800 hover:text-white'}`}>Projekte</button>
                <button onClick={() => { setActiveTab('setup_cats'); setSelectedProjectDetails(null); }} className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm transition-colors font-medium ${activeTab === 'setup_cats' ? 'bg-slate-800 text-white' : 'hover:bg-slate-800 hover:text-white'}`}><IconList size={18}/> Kategorien</button>
                <button onClick={() => { setActiveTab('data'); setSelectedProjectDetails(null); }} className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm transition-colors font-medium ${activeTab === 'data' ? 'bg-slate-800 text-white' : 'hover:bg-slate-800 hover:text-white'}`}><IconSettings size={18}/> System & Export</button>
            </nav>
        </aside>
    );

    const renderResourceView = () => {
        const activeCategories = [...new Set(employees.filter(e => e.active).map(e => e.category))];

        return (
            <div className="flex-1 flex flex-col h-full bg-white overflow-hidden">
                <div className="p-4 border-b border-slate-200 bg-slate-50">
                    <h2 className="text-slate-900 text-xl font-medium">Ressourcenplaner</h2>
                </div>
                <div className="flex-1 overflow-auto relative">
                    <table className="w-full border-collapse text-sm text-left">
                        <thead className="sticky top-0 bg-white z-20 shadow-sm">
                            <tr>
                                <th className="p-4 border-b border-r border-slate-200 w-72 bg-slate-50 sticky left-0 z-30 text-slate-500 uppercase tracking-wider text-xs font-medium">Mitarbeiter</th>
                                {weeks.map(w => <th key={w.id} className="p-3 border-b border-r border-slate-200 min-w-[140px] text-center text-slate-600 bg-slate-50 font-medium">{w.label}</th>)}
                            </tr>
                        </thead>
                        <tbody>
                            {activeCategories.map(category => {
                                const isCollapsed = collapsedCategories[category];
                                const catEmps = employees.filter(e => e.active && e.category === category);
                                
                                return (
                                    <React.Fragment key={category}>
                                        <tr className="bg-slate-50/80 border-b border-slate-200 cursor-pointer hover:bg-slate-100 transition-colors group" onClick={() => toggleCategory(category)}>
                                            <td className="p-3 text-slate-700 sticky left-0 z-10 bg-inherit border-r border-slate-200 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.05)]">
                                                <div className="flex items-center gap-2 text-sm uppercase tracking-wider font-medium">
                                                    <span className="text-slate-400 group-hover:text-indigo-500 transition-colors">
                                                        {isCollapsed ? <IconChevronRight size={16}/> : <IconChevronDown size={16}/>}
                                                    </span>
                                                    {category}
                                                    <span className="ml-auto text-xs bg-white px-2 py-0.5 rounded-full border border-slate-200 text-slate-500 font-medium">
                                                        {catEmps.length}
                                                    </span>
                                                </div>
                                            </td>
                                            {weeks.map(w => <td key={`header-${w.id}`} className="border-r border-slate-100 bg-slate-50/40"></td>)}
                                        </tr>
                                        
                                        {!isCollapsed && catEmps.map(emp => (
                                            <tr key={emp.id} className="hover:bg-slate-50/50 transition-colors">
                                                <td className="p-3 border-b border-r border-slate-200 bg-white sticky left-0 z-10 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.02)]">
                                                    <div className="flex items-center gap-3">
                                                        <div className="w-8 h-8 rounded-full bg-slate-100 text-slate-600 flex items-center justify-center text-xs border border-slate-200 shadow-sm font-medium">
                                                            {emp.name.charAt(0)}
                                                        </div>
                                                        <div className="text-slate-800 font-medium">{emp.name}</div>
                                                    </div>
                                                </td>
                                                {weeks.map(w => {
                                                    const { total, isOfftime, assignments: wAss } = getUtilization(emp.id, w.id);
                                                    const isOverbooked = total > 100;
                                                    return (
                                                        <td key={w.id} 
                                                            className={`p-1.5 border-b border-r border-slate-100 relative cursor-pointer group/cell hover:bg-indigo-50/30 transition-colors ${isOfftime ? 'bg-slate-50 diagonal-stripes' : ''}`}
                                                            onClick={() => setAssignContext({ empId: emp.id, week: w.id })}>
                                                            
                                                            {/* Hover Hint for empty cells */}
                                                            {wAss.length === 0 && !isOfftime && (
                                                                <div className="absolute inset-0 flex items-center justify-center opacity-0 group-hover/cell:opacity-100 text-indigo-300 transition-opacity">
                                                                    <IconPlus size={20} />
                                                                </div>
                                                            )}

                                                            <div className="flex flex-col gap-1.5 min-h-[44px] relative z-10">
                                                                {wAss.map(a => {
                                                                    let label = a.reference;
                                                                    let color = 'bg-white border-slate-200 text-slate-700';
                                                                    let dotColor = 'bg-slate-400';
                                                                    
                                                                    if (a.type === 'project') {
                                                                        const p = projects.find(p => p.id === a.reference);
                                                                        label = p ? p.name : 'Unbekannt';
                                                                        if (p) {
                                                                            color = 'bg-white border-slate-200 text-slate-800';
                                                                            dotColor = p.color; 
                                                                        }
                                                                    } else if (a.type === 'offtime') {
                                                                        color = 'bg-slate-100 border-slate-300 text-slate-600';
                                                                        dotColor = 'bg-slate-500';
                                                                    }

                                                                    return (
                                                                        <div key={a.id} 
                                                                            onClick={(e) => { e.stopPropagation(); setAssignContext({ empId: emp.id, week: w.id, existing: a }); setIsAssignModalOpen(true); }}
                                                                            className={`text-[11px] px-2 py-1.5 rounded-md border flex justify-between items-center shadow-sm hover:shadow hover:-translate-y-0.5 transition-all ${color}`}>
                                                                            <div className="flex items-center gap-1.5 truncate">
                                                                                <div className={`w-2 h-2 rounded-full flex-shrink-0 ${dotColor}`}></div>
                                                                                <span className="truncate font-medium">{label}</span>
                                                                            </div>
                                                                            <span className="opacity-70 ml-2 bg-slate-100/50 px-1 rounded font-medium">{a.percent}%</span>
                                                                        </div>
                                                                    );
                                                                })}
                                                                
                                                                {wAss.length > 0 && !isOfftime && (
                                                                    <div 
                                                                        onClick={(e) => { e.stopPropagation(); setAssignContext({ empId: emp.id, week: w.id }); setIsAssignModalOpen(true); }}
                                                                        className="opacity-0 group-hover/cell:opacity-100 text-[10px] px-2 py-1.5 rounded-md border border-dashed border-indigo-300 text-indigo-600 flex justify-center items-center shadow-sm hover:bg-indigo-50 transition-all mt-0.5"
                                                                    >
                                                                        <IconPlus size={12} className="mr-1" /> weitere
                                                                    </div>
                                                                )}
                                                            </div>
                                                            {isOverbooked && <div className="absolute top-1 right-1 w-2 h-2 bg-rose-500 rounded-full animate-pulse shadow-[0_0_4px_rgba(244,63,94,0.5)] z-20"></div>}
                                                        </td>
                                                    );
                                                })}
                                            </tr>
                                        ))}
                                    </React.Fragment>
                                );
                            })}
                        </tbody>
                    </table>
                </div>
            </div>
        );
    };

    const renderProjectTimeline = () => {
        const activeProjCategories = [...new Set(projects.map(p => p.category))];
        const activeEmpCategories = [...new Set(employees.filter(e => e.active).map(e => e.category))];

        return (
            <div className="flex-1 flex h-full overflow-hidden bg-white">
                <div className="w-72 border-r border-slate-200 flex flex-col bg-slate-50 shrink-0">
                    <div className="p-4 border-b border-slate-200 bg-white">
                        <h3 className="text-slate-900 text-lg font-medium">Mitarbeiter (Drag)</h3>
                        <p className="text-xs text-slate-500 mt-1">Zieh Mitarbeiter in den Kalender</p>
                    </div>
                    <div className="flex-1 overflow-auto">
                        {activeEmpCategories.map(category => {
                            const isCollapsed = collapsedCategories[category];
                            const catEmps = employees.filter(e => e.active && e.category === category);
                            
                            return (
                                <div key={category} className="border-b border-slate-200 bg-slate-50/80">
                                    <div 
                                        onClick={() => toggleCategory(category)}
                                        className="p-3 flex items-center justify-between cursor-pointer hover:bg-slate-100 transition-colors group"
                                    >
                                        <div className="flex items-center gap-2 text-sm uppercase tracking-wider font-medium text-slate-700">
                                            <span className="text-slate-400 group-hover:text-indigo-500 transition-colors">
                                                {isCollapsed ? <IconChevronRight size={16}/> : <IconChevronDown size={16}/>}
                                            </span>
                                            {category}
                                        </div>
                                        <span className="text-xs bg-white px-2 py-0.5 rounded-full border border-slate-200 text-slate-500 font-medium shadow-[2px_0_5px_-2px_rgba(0,0,0,0.05)]">
                                            {catEmps.length}
                                        </span>
                                    </div>
                                    
                                    {!isCollapsed && (
                                        <div className="p-3 pt-0 space-y-2 bg-slate-50">
                                            {catEmps.map(emp => (
                                                <div 
                                                    key={emp.id} 
                                                    draggable
                                                    onDragStart={(e) => e.dataTransfer.setData('empId', emp.id)}
                                                    className="p-2.5 bg-white border border-slate-200 rounded-lg shadow-sm cursor-grab active:cursor-grabbing hover:border-indigo-300 transition-colors flex items-center gap-3"
                                                >
                                                    <div className="w-7 h-7 rounded-full bg-slate-100 text-slate-600 flex items-center justify-center text-xs border border-slate-200 shadow-sm font-medium flex-shrink-0">
                                                        {emp.name.charAt(0)}
                                                    </div>
                                                    <div className="min-w-0">
                                                        <div className="text-sm text-slate-900 font-medium truncate">{emp.name}</div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            );
                        })}
                    </div>
                </div>

                <div className="flex-1 flex flex-col overflow-hidden">
                    <div className="p-4 border-b border-slate-200 bg-white flex justify-between items-center">
                        <h3 className="text-slate-900 text-lg font-medium">Projekt-Planung</h3>
                        <span className="text-xs text-slate-500">Zieh Mitarbeiter von links in die Kalenderwochen der Projekte.</span>
                    </div>
                    
                    <div className="flex-1 overflow-auto relative">
                        <table className="w-full border-collapse text-sm text-left">
                            <thead className="sticky top-0 bg-white z-20 shadow-sm">
                                <tr>
                                    <th className="p-3 border-b border-r border-slate-200 w-64 bg-slate-50 sticky left-0 z-30 text-slate-600 font-medium">Projekt</th>
                                    {weeks.map(w => <th key={w.id} className="p-2 border-b border-r border-slate-200 min-w-[120px] text-center text-slate-600 bg-slate-50 font-medium">{w.label}</th>)}
                                </tr>
                            </thead>
                            <tbody>
                                {projects.length === 0 ? (
                                    <tr>
                                        <td colSpan={weeks.length + 1} className="p-8 text-center text-slate-400">
                                            Noch keine Projekte angelegt.
                                        </td>
                                    </tr>
                                ) : activeProjCategories.map(category => {
                                    const isCollapsed = collapsedProjCategories[category];
                                    const catProjects = projects.filter(p => p.category === category);
                                    
                                    return (
                                        <React.Fragment key={category}>
                                            <tr className="bg-slate-100 border-b border-slate-200 cursor-pointer hover:bg-slate-200 transition-colors" onClick={() => toggleProjCategory(category)}>
                                                <td className="p-3 text-slate-900 sticky left-0 z-10 bg-inherit border-r border-slate-200 font-medium">
                                                    <div className="flex items-center gap-2 text-lg">
                                                        {isCollapsed ? <IconChevronRight size={16}/> : <IconChevronDown size={16}/>}
                                                        {category}
                                                    </div>
                                                </td>
                                                {weeks.map(w => <td key={`header-${category}-${w.id}`} className="border-r border-slate-200"></td>)}
                                            </tr>
                                            
                                            {!isCollapsed && catProjects.map(proj => (
                                                <tr key={proj.id} className="hover:bg-slate-50 transition-colors">
                                                    <td className="p-3 border-b border-r border-slate-200 bg-white sticky left-0 z-10">
                                                        <div className="flex items-center gap-2">
                                                            <div className={`w-3 h-3 rounded-full ${proj.color}`}></div>
                                                            <div className="text-slate-900 font-medium">{proj.name}</div>
                                                        </div>
                                                    </td>
                                                    {weeks.map(w => {
                                                        const isProjectActive = w.id >= proj.startWeek && w.id <= proj.ibnWeek;
                                                        const projAss = assignments.filter(a => a.reference === proj.id && a.week === w.id);
                                                        
                                                        return (
                                                            <td key={w.id} 
                                                                onDragOver={(e) => e.preventDefault()}
                                                                onDrop={(e) => handleDrop(e, w.id, proj.id)}
                                                                className={`p-1 border-b border-r border-slate-100 relative min-w-[120px] align-top transition-colors ${isProjectActive ? 'bg-white hover:bg-slate-50' : 'bg-slate-100 opacity-60'}`}
                                                            >
                                                                <div className="flex flex-col gap-1 min-h-[60px]">
                                                                    {projAss.map(a => {
                                                                        const emp = employees.find(e => e.id === a.empId);
                                                                        return (
                                                                            <div key={a.id} 
                                                                                onClick={(e) => { e.stopPropagation(); setAssignContext({ empId: a.empId, week: w.id, existing: a }); setIsAssignModalOpen(true); }}
                                                                                className={`text-[10px] px-1.5 py-1 rounded flex justify-between items-center text-white shadow-sm cursor-pointer hover:opacity-90 transition-opacity ${proj.color}`}>
                                                                                <span className="truncate font-medium">{emp?.name || 'Unbekannt'}</span>
                                                                                <span className="opacity-90 ml-1 font-medium">{a.percent}%</span>
                                                                            </div>
                                                                        );
                                                                    })}
                                                                </div>
                                                            </td>
                                                        );
                                                    })}
                                                </tr>
                                            ))}
                                        </React.Fragment>
                                    );
                                })}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        );
    };

    const renderUtilization = () => {
        const visibleWeeks = weeks.slice(0, weeksAhead);
        const months = [];
        const weeksByMonth = {};

        visibleWeeks.forEach(w => {
            if (!weeksByMonth[w.month]) {
                weeksByMonth[w.month] = [];
                months.push(w.month);
            }
            weeksByMonth[w.month].push(w.id);
        });

        const activeCategories = [...new Set(employees.filter(e => e.active).map(e => e.category))];

        return (
            <div className="flex-1 flex flex-col h-full bg-white overflow-hidden">
                <div className="p-6 border-b border-slate-200 flex justify-between items-center">
                    <div>
                        <h2 className="text-xl text-slate-900 font-medium">Auslastung (Heatmap)</h2>
                        <p className="text-sm text-slate-500">Monatsweise Übersicht der durchschnittlichen Kapazitätsauslastung.</p>
                    </div>
                    <div className="flex gap-4 items-center bg-slate-50 p-3 rounded-lg border border-slate-200">
                        <span className="text-sm text-slate-700 font-medium">Vorschau:</span>
                        <select value={weeksAhead} onChange={e=>setWeeksAhead(Number(e.target.value))} className="p-2 border border-slate-300 rounded text-sm bg-white">
                            <option value={4}>4 Wochen</option>
                            <option value={8}>8 Wochen</option>
                            <option value={12}>12 Wochen</option>
                            <option value={24}>24 Wochen</option>
                            <option value={52}>52 Wochen</option>
                        </select>
                    </div>
                </div>
                <div className="flex-1 overflow-auto p-6">
                    <table className="w-full border-collapse text-sm">
                        <thead>
                            <tr>
                                <th className="p-2 border-b border-slate-200 text-left w-48 text-slate-500 font-medium">Mitarbeiter</th>
                                <th className="p-2 border-b border-slate-200 text-center w-32 text-indigo-600 bg-indigo-50 rounded-t-lg font-medium">Ø Zeitraum</th>
                                {months.map(m => <th key={m} className="p-2 border-b border-slate-200 text-center text-slate-500 font-medium">{m}</th>)}
                            </tr>
                        </thead>
                        <tbody>
                            {activeCategories.map(category => {
                                const isCollapsed = collapsedCategories[category];
                                const catEmps = employees.filter(e => e.active && e.category === category);
                                
                                return (
                                    <React.Fragment key={category}>
                                        <tr className="bg-slate-50/80 border-b border-slate-200 cursor-pointer hover:bg-slate-100 transition-colors group" onClick={() => toggleCategory(category)}>
                                            <td className="p-3 text-slate-700 sticky left-0 z-10 bg-inherit border-r border-slate-200 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.05)]">
                                                <div className="flex items-center gap-2 text-sm uppercase tracking-wider font-medium">
                                                    <span className="text-slate-400 group-hover:text-indigo-500 transition-colors">
                                                        {isCollapsed ? <IconChevronRight size={16}/> : <IconChevronDown size={16}/>}
                                                    </span>
                                                    {category}
                                                    <span className="ml-auto text-xs bg-white px-2 py-0.5 rounded-full border border-slate-200 text-slate-500 font-medium">
                                                        {catEmps.length}
                                                    </span>
                                                </div>
                                            </td>
                                            <td className="border-r border-slate-100 bg-slate-50/40"></td>
                                            {months.map(m => <td key={`header-${category}-${m}`} className="border-r border-slate-100 bg-slate-50/40"></td>)}
                                        </tr>

                                        {!isCollapsed && catEmps.map(emp => {
                                            let totalPercentAll = 0;
                                            visibleWeeks.forEach(w => {
                                                totalPercentAll += getUtilization(emp.id, w.id).total;
                                            });
                                            const avgAll = visibleWeeks.length === 0 ? 0 : Math.round(totalPercentAll / visibleWeeks.length);

                                            return (
                                                <tr key={emp.id} className="border-b border-slate-100 hover:bg-slate-50 transition-colors">
                                                    <td className="p-2 text-slate-900 font-medium pl-6">{emp.name}</td>
                                                    
                                                    <td className="p-2 border-r border-slate-100">
                                                        <div className="w-full h-8 rounded flex items-center justify-center text-xs bg-indigo-50 text-indigo-700 border border-indigo-100 font-medium">
                                                            {avgAll}%
                                                        </div>
                                                    </td>

                                                    {months.map(m => {
                                                        const monthWeeks = weeksByMonth[m];
                                                        let monthTotal = 0;
                                                        let hasOfftime = false;

                                                        monthWeeks.forEach(wId => {
                                                            const { total, isOfftime } = getUtilization(emp.id, wId);
                                                            monthTotal += total;
                                                            if (isOfftime) hasOfftime = true;
                                                        });
                                                        
                                                        const avgMonth = monthWeeks.length === 0 ? 0 : Math.round(monthTotal / monthWeeks.length);

                                                        let bgColor = 'bg-slate-50';
                                                        let textColor = 'text-slate-400';
                                                        
                                                        if (avgMonth === 0 && hasOfftime) { bgColor = 'bg-slate-200'; textColor = 'text-slate-600'; }
                                                        else if (avgMonth > 100) { bgColor = 'bg-rose-500'; textColor = 'text-white'; }
                                                        else if (avgMonth === 100) { bgColor = 'bg-emerald-500'; textColor = 'text-white'; }
                                                        else if (avgMonth > 0) { bgColor = 'bg-indigo-200'; textColor = 'text-indigo-800'; }

                                                        const label = avgMonth > 0 ? `${avgMonth}%` : (hasOfftime ? 'OFF' : '-');

                                                        return (
                                                            <td key={m} className="p-1 border-r border-slate-100 last:border-0">
                                                                <div className={`w-full h-8 rounded flex items-center justify-center text-xs transition-colors ${bgColor} ${textColor} ${hasOfftime && avgMonth === 0 ? 'diagonal-stripes' : ''} font-medium`}>
                                                                    {label}
                                                                </div>
                                                            </td>
                                                        )
                                                    })}
                                                </tr>
                                            )
                                        })}
                                    </React.Fragment>
                                );
                            })}
                        </tbody>
                    </table>
                </div>
            </div>
        );
    };

    const renderProjectDetails = () => {
        const proj = projects.find(p => p.id === selectedProjectDetails);
        if (!proj) return null;

        const projAssignments = assignments.filter(a => a.reference === proj.id);
        const empIds = [...new Set(projAssignments.map(a => a.empId))];

        const toggleBillable = () => {
            setProjects(projects.map(p => p.id === proj.id ? { ...p, billable: !p.billable } : p));
        };

        const updateRate = (e) => {
            setProjects(projects.map(p => p.id === proj.id ? { ...p, hourlyRate: parseFloat(e.target.value) || 0 } : p));
        };

        let totalProjectHours = 0;
        let totalProjectTravel = 0;
        let totalProjectHotel = 0;
        let totalProjectOther = 0;

        return (
            <div className="flex-1 overflow-auto bg-slate-50 flex flex-col">
                <div className="p-6 border-b border-slate-200 bg-white flex items-center gap-4">
                    <button onClick={() => setSelectedProjectDetails(null)} className="p-2 text-slate-400 hover:text-slate-700 bg-slate-100 hover:bg-slate-200 rounded-full transition-colors">
                        <IconArrowLeft size={20} />
                    </button>
                    <div>
                        <h2 className="text-2xl text-slate-900 font-medium">{proj.name}</h2>
                        <div className="text-sm text-slate-500 flex items-center gap-3 mt-1">
                            <span className="flex items-center gap-1"><div className={`w-2 h-2 rounded-full ${proj.color}`}></div>{proj.category}</span>
                            <span>|</span>
                            <span>{proj.startWeek} bis {proj.ibnWeek}</span>
                        </div>
                    </div>
                </div>

                <div className="p-8 max-w-7xl mx-auto w-full space-y-6">
                    <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 flex gap-8 items-center">
                        <div>
                            <label className="flex items-center gap-2 cursor-pointer">
                                <input type="checkbox" checked={proj.billable !== false} onChange={toggleBillable} className="w-5 h-5 text-indigo-600 rounded" />
                                <span className="text-slate-900 text-lg font-medium">Stundenarbeitszeit berechnen</span>
                            </label>
                            <p className="text-xs text-slate-500 mt-1 ml-7">Wenn deaktiviert, werden keine Lohnkosten für die geleisteten Stunden summiert.</p>
                        </div>

                        {(proj.billable !== false) && (
                            <div className="flex items-center gap-3 ml-auto">
                                <span className="text-slate-700 font-medium">Stundenlohn (€/h):</span>
                                <input type="number" value={proj.hourlyRate ?? DEFAULT_HOURLY_RATE} onChange={updateRate} className="w-24 p-2 border border-slate-300 rounded-md text-slate-900 text-lg text-center font-medium" />
                            </div>
                        )}
                        
                        <div className="ml-auto flex gap-3">
                            <button onClick={openInvoiceModal} className="bg-white border border-slate-300 hover:bg-slate-50 text-slate-700 px-4 py-2 rounded-lg text-sm flex items-center gap-2 font-medium transition-colors">
                                <IconFileText size={16} /> Rechnung erstellen
                            </button>
                            <button onClick={() => setIsExpenseModalOpen(true)} className="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm flex items-center gap-2 font-medium transition-colors">
                                <IconPlus size={16} /> Ausgabe erfassen
                            </button>
                        </div>
                    </div>

                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                        <div className="p-4 bg-slate-50 border-b border-slate-200">
                            <h3 className="text-slate-900 text-lg font-medium">Mitarbeiter & Kosten</h3>
                        </div>
                        <table className="w-full text-left text-sm">
                            <thead className="bg-slate-50 border-b border-slate-200">
                                <tr>
                                    <th className="p-4 text-slate-600 font-medium">Mitarbeiter</th>
                                    <th className="p-4 text-slate-600 font-medium">Zeitraum (KW)</th>
                                    <th className="p-4 text-slate-600 font-medium">Stunden</th>
                                    <th className="p-4 text-slate-600 font-medium">Lohnkosten (€)</th>
                                    <th className="p-4 text-slate-600 font-medium">Reisekosten (€)</th>
                                    <th className="p-4 text-slate-600 font-medium">Hotel (€)</th>
                                    <th className="p-4 text-slate-600 font-medium">Sonstiges (€)</th>
                                    <th className="p-4 text-slate-600 font-medium">Gesamt (€)</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-100">
                                {empIds.length === 0 ? (
                                    <tr><td colSpan="8" className="p-8 text-center text-slate-400">Noch keine Mitarbeiter verplant.</td></tr>
                                ) : empIds.map(empId => {
                                    const emp = employees.find(e => e.id === empId);
                                    const empAss = projAssignments.filter(a => a.empId === empId);
                                    
                                    const weeksAssigned = empAss.map(a => a.week.split('-W')[1]).join(', ');
                                    const hours = empAss.reduce((acc, a) => acc + (a.percent / 100 * HOURS_PER_WEEK), 0);

                                    const laborCost = (proj.billable !== false) ? hours * (proj.hourlyRate ?? DEFAULT_HOURLY_RATE) : 0;
                                    
                                    const empExpenses = expenses.filter(e => e.projectId === proj.id && e.empId === empId);
                                    const travel = empExpenses.filter(e => e.type === 'Travelcosts').reduce((acc, e) => acc + e.amount, 0);
                                    const hotel = empExpenses.filter(e => e.type === 'Hotel').reduce((acc, e) => acc + e.amount, 0);
                                    const other = empExpenses.filter(e => e.type === 'Other').reduce((acc, e) => acc + e.amount, 0);
                                    
                                    const totalExpense = travel + hotel + other;
                                    const totalCost = laborCost + totalExpense;

                                    totalProjectHours += hours;
                                    totalProjectTravel += travel;
                                    totalProjectHotel += hotel;
                                    totalProjectOther += other;

                                    return (
                                        <tr key={empId} className="hover:bg-slate-50 transition-colors">
                                            <td className="p-4 text-slate-900 font-medium">{emp?.name || 'Unbekannt'}</td>
                                            <td className="p-4 text-slate-600 truncate max-w-[120px]">{weeksAssigned}</td>
                                            <td className="p-4 text-slate-900 font-medium">{hours}</td>
                                            <td className="p-4 text-slate-600">{laborCost.toFixed(2)}</td>
                                            <td className="p-4 text-slate-600">{travel.toFixed(2)}</td>
                                            <td className="p-4 text-slate-600">{hotel.toFixed(2)}</td>
                                            <td className="p-4 text-slate-600">{other.toFixed(2)}</td>
